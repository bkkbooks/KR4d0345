  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0345_WYG_014-1a, image: WYG1181/WYG1181-0198a.png}
body:
  text: 文溪集卷十四宋李昴英撰五言律詩送鄭雪屋歸里征衣㸃落紅君去與春同貧到歸時見吟多醉後工不應冠尚鶡自許氣如虹急著看山眼飛帆吸快風送連推黃端簡赴班端簡山谷之後其兄端亮余丙戌同年也別我谷之盤今誰似二難西江詩種好南斗劍光寒千里依蓮重三年食蘗安頭班人品稱春意暖征鞍武夷觀間乘石鏬船又到浙江邊回向初心地皈依古洞天成丹呼鶴舞噴酒起龍眠雨意偏留客杯茶定宿緣建倉解歸詩復徐意一二首恨未澄淸盡孤蹤已不安繆悠臣罪大感激上恩寬鄉國三千里人心百八盤夢歸今始驗為我謝言官其二吏擎雙印出便覺此身輕物我忘恩怨漁樵寄姓名笛聲黃犢背詩興白鷗盟故舊休相訝無書到帝城題雪峯因大夢頂相終朝咬菜根那得許精神自笑形為贅從渠畫不真間雲留片影活佛化千身大夢何時覺癡人問木人贈始興順首座江湖三十載敗笠破袈裟老面阿羅漢全身小釋迦定無牛犯稼不見鳥銜花一笑西湖上相逢且喫茶景泰寺樹合疑山盡攀緣有路通逺鴉追夕照低鴈壓西風瀑勢雷虛壑松聲浪半空憑欄僧指似漲霧是城中挽鈍齊先生許象州三首家學存齊授淵源自晦菴存齊公伯祖也晦菴為名齊且為之記魁文行海內師道重天南銜未冰條一州才刀夢三芳名却千載俎豆拜祠龕其二義重人誰及高風有古人已田分友子友人林司法初筮西廣終於官妻子貧先生割已田贍之黎事保羈臣顔瓊守羈廣西先生以經幹告身保薦顔起廢撫定黎峒有功朝廷嘉之授瓊管守抱負耕莘志依稀陋巷仁丹靑遺像在難寫道心真其三丈席即之溫終身佩一言棟梁失安定山斗慘韓門慟矣心喪重凄然手澤存江聲助悲些莫返大夫魂白雲山見五色雀羅浮禽五色創見此山椒錦羽嬉同墜鐵冠遷最喬疑隨仙馭過喜趂白雲招貴客非關我勞渠千里遙送梁上舍必得大學解試南國去天逺行程勿滯留試期催負笈戰决勝焚舟淡墨題金榜英聲起璧流旦評期望久著力在毫頭用前韻送潘上舍謙為賢業址取履卜封留筆下千鈞弩胸中萬斛舟椿庭聞誨語米廩友名流連捷歸藍綬鄰翁好話頭挽如老歸真不見才三日喧傳已坐亡平生功行到垂絶偈言香緣分無高剎禪名却四方開包殘藁在切勿放毫光送葉耆卿試太學背城嬴一戰璧水是儒林詞賦八義手功名寸鐵心程兼馳數驛學苦惜分隂淸獻起庚戌長風送捷音觀穫負郭平田濶秋深穫課勤短鎌行缺月多稼剪黃雲舊臘占三白今年稔十分太平村舍裏墮穗飽雞羣山行塵中事日生撥剔且山行襆被欣然出登車趣便淸奴收擕蠟屐客請帶棋枰才過城闉外耳根無市聲後峒月溪寺寺巧蟠山背池圓印寺前連筒泉落罋如鏡地無磚茗苦苛留客僧淳懶說禪使君期不至一宿笑無緣是日期吳守未至樵者近道其樵者勞哉食束薪運斤碎盤錯荷擔下嶙峋恐是仙王質何須貴買臣路傍迎一笑笑我絆簪紳雲泉亭白雲寺前新築此亭自為作銘絶頂鬱其前寒崖噴玉泉亭成山補闕境勝我攙先樹杪江天接榕根石磴懸賞心遂連日合為智仙傳哭淸逺權宰樓海司法二首并序樓君宰淸逺峒寇一夕入縣治倉卒告變君挺身出諭賊竟遇害殁於兵諭賊散私財𡨕頑不可回憤然瞋目罵吾已戴頭來一死當凶刃千家免劫灰遺孤元未有行路為悲哀其二百里稱亷吏誰歟起釁端州符需賦急軍餉及期難節義扶澆俗朝廷贈大官邑人崇廟像猶似髮衝冠送陳大雷試太學裹糧數千里賈勇萬人場庾嶺琴書去橋門姓字香有司應眼具喜氣已睂黃踐履宜天相時文况所長悼花首湛長老二首碧眸泓鐵面跣足衲懸鶉數日蒲團定一如泥塑人施錢隨散擲忍辱已忘嗔丁字何曾識拈提話轉新其二別我笑吟吟羅浮願力深空拳糊衆口平地起叢林山逈孤雲沒溪寒片月沉人今奇坐蛻在日孰知音飲赴解試士友二首座滿挺時髦經明亦富豪幾年勤用志三日健揮毫笑取刀牛角相逢酒蟹螯有名還有分秋鶚碧雲高其二少日諳場屋斯文為細論艱深成札闥卑弱又西崑與客為佳䜟當年是解元賀詩多辦取盛事屬于門山寺夜起看月丙夜忽忩白披衣起憑欄山川如晝見松檜照人寒孤鶴咳屋脊群僧鼾紙單燈前呼老佛妙境許同觀看僧披剃爾教言無相誰教蛻髮毛虛名猶度牒多事更方袍父認師傳的年推戒臘高冠巾何不可只要斷塵勞挽右史方鐵菴詩三首一疏綱常重端平起直聲難磨石宋璟不動鐵元城前輩風流在南州箇信誠精神兼學力傾倒為遐氓其二喜怒皆和氣天全一片春眼髙多識士心直不疑人稱得深衣古爭傳判筆神恙微談笑去忽失玉璘珣其三紙錢森插竹遺像在方橋月暗甘棠密風嘶韓木喬所悲緣瘁國於誼况同朝凄斷黃灣路丹旌些莫招五言排律觀定堂梵宫憑水建蓬荻費芟除岸破群魚出枝危獨鶴居定鍾僧睡早揮塵客談虛月滿龕燈小風停幡影疏供盤多佛果僧飯飽園蔬惟有開山老清高閉草廬文溪集卷十四

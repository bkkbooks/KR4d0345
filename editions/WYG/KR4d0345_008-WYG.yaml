body:
  text: 文溪集巻八宋李昴英撰奏議除正言上殿奏疏臣生遠迹孤學膚識狹陛下拔之疏散俾綴諫曹聖恩如天誓圖報塞臣拜觀國史范鎮擢知諫院即上疏曰陛下置諫官者所以為宗廟社稷計也為諫官而不以宗廟社稷事陛下是不知諫官之任也拳拳之忠首以正國本為言臣何人斯詎敢望鎮萬一於忠國愛君之職分則不敢不盡焉臣聞正天下之大本貴乎豫定天下之大計貴乎果三王家天下其初心豈專為子孫地所以弭爭端於未萌杜厲階於未形而欲措斯世於乆安耳副貳早建所以繫海内之望成謀堅凝所以釋人心之疑詎容一日稍緩哉恭惟皇帝陛下誕膺寳厯光紹鴻圖惟天惟祖宗豈私於陛下將以垂統無窮為萬世開太平者望陛下也春秋寖盛蒼震尚虛羣臣懇切交疏而力陳四方傾耳翹首而聳聴幾年於此矣陛下環視而未有定向遲回而不輕一發事大體重於謀始宜謹非常情所能測識也邇者謁饗宗廟駁霧劃開惟天之眷惟祖宗之靈默贊大計隨灑宸章選納猶子嘉名寵錫聖意丕昭朝野鼓舞神祗歡悦然雖有舉棋將定之喜不能無羽翼未成之慮臣於此時叨被親擢事莫此為大謹以三説上瀆聖聰惟陛下垂聴焉一曰正名文帝即位初年有司遽以建太子為請今不可謂早計矣歴觀徃昔當璧而拜之觀惟神之所予有心無聊之歡惟人之所付是皆牽纒已私不克㫁制陛下此一盛舉蔽自聖衷度越前古出於同氣天屬為最親儲以繼體人道為極順倘或猶豫能不動摇名號未正恐無以塞從旁之覬覦體統未一恐無以收衆望之歸向謂宜亟正青葢車之制佇開日重光之祥侍膳問安自此全天性之樂主器承祧足以衍國祚之長天下咸曰吾君有子矣則宗廟社稷之福也普安真王之封宰臣請以冠屬籍高宗皇帝曰可便為皇子此陛下所當法也二曰保養保其身體列職周官養於掖庭有漢故事挺生岐嶷之質猶在髫稚之年必先葆固其天和庶可自貽於哲命昔人有嗜鮑之動戒有玉契之嚴惟所闗所繫者不細故防㣲杜漸者至悉出入起居寧衛防之過密饑飽寒暑必調適之得宜此天下之大器也豈止於櫝拱璧培桐梓之譬哉謂宜專屬禁闥之尊曲加撫摩之愛宫人之老成謹厚者左右彌縫之竒衺側媚之人不得與乎其間則宗廟社稷之福也髙宗皇帝因大臣宫人可託否之問有曰若不先擇宫嬪可慮之事更多陛下所當法也三曰教道道之禮義周過其厯傅之刑名秦祚遽危葢少成若天性習慣如自然古者有褓教有齒學莫不於其初而漸漬入之是必妙選於師儒所當涵養其徳性毋徒事章句之末技毋但拘講誦之常程俾善言正行日接於見聞非心邪念不萌於方寸則凡朝夕宴處之際無非薰陶淑廸之功又當擇臣之有物望者時視其徳業之進因以為内學之重他日恭敬温文發達於性資孝友仁愛著聞於中外則宗廟社稷之福也陳俊卿每入必傳經啓沃且殫諷諫之益陛下必得若人而委之輔導可也厥今時艱未靖國勢未强隂邪譸張於肘腋之間敵氣滋煽於邊庭之外消弭奸黨鎮壓羣疑全在此着臣願陛下上念祖宗付託之不輕下慰生靈徯望之甚切决意建置無墮因循億萬載無􅆠之休實根本乎此惟陛下留神取進止論史丞相疏臣末學陋聞誤䝉睿知擢聨翠幄獲執麟經日昨進講至魯隠公二年鄭人伐衛因考寤生之無主其惡根於城頴之寘母以為世之大不忠皆大不孝者為之夫子無其位故誅奸臣於直筆陛下操必罰之柄昭懲惡之公儻不孝於親且將不利於國者幸免焉此豈聖人作經有望於後之明天子之意哉臣曩在嶺海間竦聆陛下雷發英斷山拔巨奸至於窮陬僻區之人莫不歡呼鼓舞日以俟謂之渡崖確之徙新也踰年而秪聞二三邪黨之貶羽翼雖剪元惡未除天下已共疑而切議矣臣今夏造朝首乞明正渠魁之罪聖意尚需遲而欠决容徳天涵或以其未終䘮姑有待焉今服闋近在於旬日而官刑未舉於司敗人言籍籍通國皇惑臣而隠嘿言責謂何臣竊觀昔之所謂四凶者非如後世大奸劇惡之甚也投畀魑魅舜豈少恩葢小人衷險裒狡乗間輒發一旦得志則君子必被其禍生民必罹其毒有不勝窮者操之已蹙盛古且然嵩之譎詐貪婪狠愎殘忍罪浮於四凶前後白簡之所擢數皂囊之所鳴攻既詳且悉臣不敢更瀆天聴大抵其挾敵要君如秦檜其嫉賢妬能如李林甫其隂害忤已者如盧杞其藉權寵厚貲積如鄭注其與近習盤結如元載其穢行醜聲如楊國忠其匿喪不持服如李定其懐宰相不足為之心如宗楚客人臣有一於此皆宜在誅絶之科况身兼衆惡乎去位家居日常囓齒握拳書空擊地憤憤然規復出以快報復私布駛傳於道路多設狡窟於京都賂貴近以覘伺人主之言動結浮士以刺探中朝之議論羣不逞為之耳目為之爪距者在在布滿也鴟梟乗暗鼷鼯睨昏磨虎狼之牙噴蛇蜮之沫意欲何為哉鄙夫患失無所不至萬一通神計行回天力到必將懲前日之輕失積邪心而動於惡無所不為矣此天下之巨蠧潛伏而未發而曰此不復然灰耳可懼哉又况國本漸定正要保持堅决為宗社計人望稍聚正要協比聨固為世道計歲事少稔正要涵潤蘇息為生民計小人之根未去宗社之危安世道之升降生民之休戚闗焉利害暁然而未即加罰或謂陛下外示寛洪之恩意中寓覊縻之微權卒有緩急或堪倚仗又臣之所未諭也葢自陛下收攬大柄親决萬機以来區畫邊防亦未嘗失事機人才陛下之人才兵財陛下之兵財自有而用之若大臣降心相從商量恰好天下事豈難辦集彼小人者於謀身則周宻於謀國則架漏已試明驗大略可覩矣臣側聞陛下有對越髙廟神靈之詩有姦邪終擯斥之句則知定見不惑定力不移决不至来外邪以壊局靣然化絃更張亦既乆矣而大綱領猶未正大機括猶未定此一事顚末未備恐無以垂汗青詔後世陛下亦嘗思及此乎章惇纔免父喪便提舉洞霄宫俄而得政遂嘯兇儔毒善類為國厲階往轍可鑒臣愚欲望陛下俯從輿議獨運精剛亟煩宸札寢嵩之服闋與宫觀之命仍削官爵遠竄荒裔使羣隂掃跡衆正伸氣於以安人心於以夀國脉天下幸甚取進止貼黄論史丞相臣昨論奏史嵩之姦惡罪狀皆國人之公言今既累日未䝉付出欲乞陛下决行宗社大計早賜區處恭俟睿斷列奏史丞相疏臣等各有疏論列史嵩之罪惡俯伏俟命未䝉報可遂具劄白之二三大臣冀其宻勿開陳近聞陛下宣引宰執必有商㩁在朝莫不懽躍聳聴竄責共驩之命又累日矣嵩之得罪宗社得罪綱常通國一辭謂宜誅絶而陛下遲回至今罪名未正當明主可為忠言之時而感動之難如此豈非臣等敷詞未能真切不足以開悟淵聴耶豈非二三大臣無非畏避不肯盡情以告陛下耶又豈非諸大臣國人皆曰之公論不足以勝阿諛之口耶臣等竊謂臣之事君猶子之事父諫而不止又敬不違乃職分當然謹不避鈇鑕聨合以請欲望陛下察臣等拳拳愚衷出於為國早賜處分以前所奏付外施行儻臣等屢言不行而强顔憲地豈不上負陛下之親擢下負海内之責望乎謹録奏聞伏候勅㫖再論史丞相疏臣聞蘇軾曰祖宗委任臺諫養其鋭氣借之重權所以折姦臣之萌也姦謀未成猶當亟遏絶之既滋蔓矣除惡本或不力焉豈祖宗設臺諫初意哉此臣所以早夜以思忘寢與食也臣昨疏列史嵩之奸狀將渉兼旬屢入催奏未聞制可聖意淵深外庭未孚始相顧而疑今相語以憂矣陛下一則曰保全大臣二則曰保全大臣惡盈其貫顯灼昭白天地鬼神所不赦陛下獨委曲包容惟恐傷之聖度恢恢前古未有臣何敢不將順然事有害大禍深與吾國勢不並立者則寧有犯無隐求不負聖門之訓乃所以不負天子也夫君視臣如手足臣視君如腹心相須之義然也嵩之包藏禍心竊據相位不以事天事陛下而視國家如仇此凶人耳罪人耳復以大臣待之可乎自其漏我師期於是乎有京洛之敗假挾北使於是乎有邀索之辱導敵入寇於是乎有淮甸之禍是為賣國之賊臣席巻部内之帑藏囊括諸路之利源借國用匱乏之名鹺販貨易籠歸私室富且數倍於國是為蠧國之盗臣給諫宰掾朋分雜布以障蔽人主之耳目以竊弄人主之威柄是為擅國之强臣科抑太繁而民怨劵給不均而兵怨扼遏摧沮之過甚而士大夫怨是為誤國之姦臣抽移江上之軍入補周廬之額用意殊叵測向非陛下洞燭邪姦力拒不納且將為害國之亂臣矣大臣以道事君者也嵩之凶悖姦詐隂險忮毒於臣道何有齊豹位司寇作而不義春秋書之曰盜嵩之尚得為大臣乎孟子曰無君無父是禽獸也以若所為尚不得齒於人類尚可以謂之大臣乎天下者祖宗之天下所以植億萬年本根者深且固而嵩之日尋斧斤焉雖肆諸兩觀未足以上慰祖宗在天之靈踰兩年而罪名未正陛下寧不動心於見宗廟之時乎陛下剛健中正與天同運儻以姑息為至仁以不斷為盛徳是有春而無秋有雨露而無霜雪雷霆非天之所以為天也臣於嵩之無纎芥之怨發於忠憤不容但已茍利社稷一身之禍福所不暇計欲望陛下盡取前後臣下所言書疏叅考其不道之本末亟賜睿㫖併臣先所奏付外施行使天下臣民明知去邪之真意千載而下竦服鋤奸之偉斷臣退而瀆犯天威之誅死無所恨區區血忱惟陛下察之理宗御筆昨史嵩之預乞掛冠今已從請可從所守本官職致仕已降宫觀指揮更不施行論帝屬貴臣不趨早朝奏劄臣二十一日綴四叅官起居因俟候奏事竊觀帝屬之班稀疎為甚赤墀歩武殆類晨星退而詢問則知邇者常叅或秪一二人趨趂夫鳴玉曳組鵷列鷺行以進退朝廷之禮貎也冕旒端複威顔咫尺而着定在前尚多曠闕欲門庭之外事事整肅難矣陛下大昕而南靣雖隆寒不憚貴臣或連日不望清光理恐未安昔人有盛服假寐者有駐車待漏者夙興匪􅈈自是臣子分内事况清晨一覲而退他無職業儻復於此忽略豈一徳尊天子之義乎輝輝覩明聖濟濟行俊賢唐人形容早朝之盛若此陛下正朝廷百官要以心為本欲其平旦清明敬心油然而生非但貴其僕僕拜起以侈容貎采章之美也臣以為其間眞有采薪之憂不能造朝者當察其情至於無他故而屢不至焉是則豢安成惰可不略加警䇿乎欲望陛下申儆有位使咸造在朝庶幾人心不玩主勢益尊所以肅朝儀而振朝綱亦非小節也文溪集卷八

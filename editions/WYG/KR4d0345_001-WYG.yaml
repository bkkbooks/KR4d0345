body:
  text: 文溪集巻一宋李􅄧英撰記肇慶府放生咸若亭記人與物林林然宇宙間氣之正偏性之靈㝠物不得同於人如其肖形然而同一生意天生聖人所以厚羣生使各安其受於天者然後無負於天之付託我者毎歲誔彌日郡國臣子既瓣香祝萬夀於佛老氏之宮必籠禽而林之盤魚而溪之端笏如植視其翬翬而高洋洋而深乃再拜而退筌者羅者爭前期生致以供官之須是猶獄無罪之民徐脱釋以恩之亦稍頓挫困悴矣終不若此不放彼不捕之適其性也三代而後以好生之德脉其國無如本朝禁翠飾罷蜂貢放洛鯉止庖羔見蟲蟻而避卻鶉兎之進列聖之心即天之心今天子聰明神武而不殺日月所照霜露所墜皆在聖德包涵中翔走蠢蝡之㣲孰有出此心天地之外蓋無一物不得其所初不待一日之間縱舍百千萬億以示小惠然故典沿襲久謂不如是非所以歸美報上也故莫之敢改世以是爲尊君一事則掲䖍之地崇大爲宜端之放生亭舊不専設始即送迎之驛又遷之僧廜㢝僅扁之寄州枵然大守臣類窘於支吾姑湫褊簡陋之仍霅章侯莅鎭垢刷蠧剔儉其出勤其積再踰年而後有羨力事無如此重且急者亟瀕江經營焉七星巖秀鬱倔竒爲一郡最勝處若屏幛其後役起重陽而落之臘題曰咸若謂萬物無不䝉被帝澤非止斯亭歲所放者也敞拓華壯簪紳雍容旅進退輿隸堵立其旁猝風雨有所庇潛龍藩體貌始稱亭雖三間而闗繫大法當得書雖然君子仁民而愛物愛出於仁而民又先乎物者也夫子恐廐焚傷人而馬不問非恝然於物者齊宣不忍一牛而百姓不見保則所厚者薄矣人主履大寳位推行天地曰生之大德二千石分土而治所以流布此德也物吾與且惻然全護况民吾同胞乎毋寃繫如籠閉毋横歛如竭澤毋暴政逞威怒空其室廬離散其妻子如覆巢毁卵饑溺猶已手拊息嘘使仰事俯育熙熙怡怡安樂之而不自知環千里皆放生亭詎止一林之棲尺水之泳而已哉必如是始無愧於受而爲牧之寄侯於仕學優念此已熟其勉潤澤之侯名勵爲端平朝士云淳祐九年二月既望廣帥方右史行鄉飲酒記田復井民必棼戰復車卒必奔古之泥今之弊固也若夫鄉飲酒昔人歲時講之常尚賢而人趨善先齒而人興遜俗以懿世道以升此禮更千萬世當如一日人情往往樂簡仍陋非有害而憚非小補而忽迂之曰理軍市焉用彼苛之曰起伏煩碎將難行力回古風於二千餘年之後豈易事耶方公大琮之鎭南服也一年政優二年化周將古飲其州命賓佐日在泮與領袖士討論之林君公琰出一編曰此某人近歲行於泉者足證也余君震洪君天錫取其本參以儀禮頗不合共質之公公曰吾從周於是議始定宏綱細節必攷必據間一二從時宜而可以誼起人習之咸説未旬而熟謀賓介得顧君梅陳君應辰僎則常平使者王公鐸愚何人斯而俾贅僎以德凉齒劣辭不獲廼二月十有二日質明凡在位者顒其幅巾粲其深衣大帶垂垂方屨几几以次即其席如植羣喙一默惟獻者酢者酬者執其事者交際應接翼如襜如莫不舂頌中度罍洗也尊勺也爵觶也􅇼豆爼也様上世而新就歌瑟堂亷笙鐘磬在下間合鏗鍧夫人目盛容耳正音油然心之良驩然情之眞自以爲身蒼姬之元而無昌黎不及揖遜其間之恨盛矣哉主人拜凡七十有竒爵于上篚焉取于東榮焉洗于尊前焉實于席前焉授與其他進退升降無算手獻賓主人之黨二百三十人辯又疑立觀二百三十人旅酬辯既徹爼始膝席座以燕漏過三十刻强有力者猶不勝公静專肅莊以至送於庠門曾不少􅈈禮儀三百威儀三千所以行之者一積誠定力也禮成諸友合詞以請曰吾鄉鄉飲酒百年幾見乾道間龔莊敏嘗行之惜紀載脱遺雖宿輩不可得而聞公一循去聖之儀制非碣其大略來者將安稽子與行禮焉此筆宜屬之子因吿之曰夫禮者天理之節文學者所以立也平居視聽言動一之或非是先失其恭敬之本而物欲得以乘之矣一旦動容周旋於廣衆中必周章失措㣲之不可揜於此可以觀其人焉原其初心以衆人自恕謂若昔聖人非可學而至故自棄至此亦可哀已今師帥蒐講曠典服古器古樂古豈徒崇美名侈美觀要使鄉人士君子秉古心行古道不睹不聞之境儼若對大賓時已克而禮復自然於其家雍於其里恭於其國也忠無一毫愧於古將見暴慢消鬬爭息陶一方之民皆古觀鄉之效易易蓋不誣唐人飲禮稍倣古耳贊皇公在常登歌降飲人猶知勸裴文獻在宣歌白華等章且有泣者二子亦直聲而公所學過之是舉也禮樂猶備人心感發又當何如衆曰唯至於度數文爲之詳則有編次在此不書淳祐四年三月朔東莞縣學經史閣記莞號廣聞邑羅浮址之厚海負之鉅産秀民爲多設學宜稱是淳熙此焉始基開禧丙寅遷大成殿於西嘉定辛巳因移黌舍其前靣勢眂厥初差易位而當勝處至紹定已丑而後對闢齋廬重作南門纔具體而微亦艱矣世俗吏類急期㑹迂化本鞠蔬積弗治老屋將壓新築亦敝何易也溫陵許公以海内大儒來爲宰士相慶曰吾邑其幸乎吾道其㤗乎嘉熙之元元日公始廟謁喟庠序圮陋謂第一義不可臯出來槖十萬授監河張君樸庀繕其事繇殿而廡而祭器庫而門而庖而湢鼎鼎偉觀乃躬程試収其雋尤育之淑之員倍給腆衿佩自逺方至于于絃歌洋洋前此未有也邑有沒入之田一頃八十三畝有竒金銀爲錢五十萬有竒法當上之憲臺公請並歸於學繡衣吳公旂素敬公慨然弗靳繼粟益裕以其錢即直廬而閣其上輪奐雄峙博収圖籍􅍥之萬籖森架士得讀所未見餫使陳公疇亦捐三十萬相厥役又不足則鳩節用之贏資其成成而虞其壊儲十萬爲後日補飭費慮周矣學垂百年草剏未完公一手營之學田閲幾令漠不問公獨能增益之然皆其餘事公之學得伊洛紫陽之心傳所至山斗後進異時横經番山規矩嚴條教悉日夜至齋房與諸生講論有一藝能極口稱奬不中不才者亦循循善誘卒使爲成人一時席間士皆卓然有立廣人德之深共建生祠於泮宮之東至今朔望羅拜其下如初菊坡清獻公自蜀歸聞而嘉歎方言狀於朝時未識公也公兹來莞人孚其德望民曰吾父也士曰吾師也公亦愛其民而子之樂與其士而弟子之縣務雖甚煩劇必時詣學與生徒接始月書季攷礪術業始立小學迪童䝉無小無大日講論語中庸而誨以㣲㫖凡經子厚指教爲文皆有法士習新羙文風丕暢邑人士倣郡庠生祠之先是累大比不薦一人復有齒賢書者延錢君益長於學遂登儒科亦教化緒效也蓋公以道爲己任尹一邑則欲行於一邑如明道先生扶溝興學故事他日大其用以斯道覺斯民使天下皆在道化中即百里規模之充也某弱冠游芹泮公期待之獨厚且嘗至是邑撰杖屨行黌舍敬識其實公名巨川字東甫嘗中異科云淳祐四年二月朔門人朝請郎直秘閣李昴英記增城新創貢士庫記曲江以文獻重增城以清獻重清獻起陋巷取巍科至於今六十年矣其間踵名第不乏人文風郁乎日以盛白屋之貧則今猶昔也縣去行都里以千計者四負笈一詣費比中州數倍州勸駕餽錢緡百此天下都國所無窶儒道敝猶有失其常産者南冠仕進不如北方之多非藝之不敵特病於地逺而發身之難耳淳祐元年聖天子頒興賢詔鳳㟵經義詞賦皆預選久欝忽伸明府何君喜邑人之所喜禮遇視故例有加以風動百里一日升堂語諸生曰愚不敏學製相鄉與衿佩日周旋士習淳古薰然有清獻遺風可敬也漢制習先聖之術與計偕縣實給食將久逺利之亟三百千之損而更掌以學職聽民持所有抵而出之復入則収其贏什二積三歲爲羡錢若干新貢士人五十千合所得於州者可不損家藏銖粒但囊書襆被足以優游往返先薦送今還試者抑於貢額之狹而激昂璧水試者皆厚給有差策名飛捷至又助之犒區條畫目纎悉曲盡士驩然相吿曰業患不精何患褁糧之不充自此西笑惟一意温故知新無復向來皇皇焉辦裝之窘將又有清名高節如前修者出惠豈細哉凡力振人之匱缺必艱難險阻備嘗之人也君雖身詩書之澤未嘗口虀鹽之味而拳拳爲寒酸地若深計其子孫於無窮是眞知斯文之爲重發於良心善性油然不可禦天資過人逺甚儻益之問學充拓其功用將大可觀琴堂主人奮繇布衣屝屨相望貢士庫乃自君創始他治狀未暇論只此一事已無沗特筆矣余又怪近世士大夫欲蓋其厲民之跡必厚於内交士謂游談聚議足以好醜我濃墨大字足以輕重我也則禮貌焉贈遺焉惟恐少失懽蓋蠢且弱之莫予毒也則漁獵椎剥茍可以自豐殖無所不至不知一得罪於百姓已得罪於名教雖日畀之千金安能遏鄉校議政者之喙彼是非之心轉移於小濡沫是賤丈夫簞食豆羹見於色者烏得爲士乎增城斗絶一隅學者盡在庠序鄉居惟石灘爲士區至於深山窮谷家牛犢人耒耜寥寥絃誦聲利於士信美矣必充周於民而後其澤溥君盍推所以膏潤後進者施之田里毋苛取毋曲决孰爲之利必興孰爲之害必除則四民均受撫字賜雖古魯卓何以加君名籍月湖尚書其祖也月湖在石城送人赴省有道在功名小之句此意又超然利禄之表試與友朋味之五年上巳日郡人李昴英記廣州新創備安庫記漢以來使粤嶺自陸大夫始携二千金去而人不非入南者遂以黷貨爲當然刺史一經城門例四千萬傳聞可愕千餘年問亷牧率載史牒寥寥晨星中人以上自拔於汚俗者豈特近世少哉吾州全盛巨舶銜尾籠江望之如蜃樓屭贔殊蠻窮島之珍浪運風督湊於步豪賈四方至各以其土所宜貿民以饒侈使家賦額足以周兵額而羨故用溢而儲實邇來唐兒罕到獅國編戸以財雄惟桀賊頻嘯重屯屢贅多乎戰勞乎戍人人得絫資級給倍無藝竭其有共億而州驟貧余三十年所目擊公私氣象繇豐美入狹嗇歲甚一歲也江湖猺峒錯落巢險苞蘖出草無時褁鹽嘯羣千百所過尋釁起剽􅐁艚寇駛風濤出沒飄忽難孰何水火旱螟不可謂無備宜豫萬一大調度諸臺力屈富囷無可指殆哉柱史方公十乘來自莆劉公克莊謂公曰日將漕於南帥唐公璘毎言郡計歲缺六萬嘗攝事稽其籍大約欠四萬然辦未易也公曰州不難則夫人可自見焉用我輩爲既至教化焉古其治獄訟焉時其眡餘力焉治其賦而垢翫淄蠧迎刃去未嘗嚴趣苛歛民信之租不逋商樂之税不慢財用之充政事之治自衣食其軍外凡不急無益費一切省鳩所餘就百役而又有餘比及四年得錢以緡計者三十萬别藏之爲甲乙丙庫庫十萬曰猝一方警遽甚無他鏹可支取諸此名曰備安所以備非常安逺甿也聽民以物抵質而㣲取其息官民相資生生無窮異時號健敏手科潤屋賣吏家無虛月猶不足公秪據賦常錙銖與公之天家以公宜南人難其代許借留又將再考而後得遂所儲安有他謬巧哉士大夫職思其憂已可書公切切焉去職之後之思豈譽之沽所至力行好事蓋初心然乙巳夏五晦狂􅄓怒突遏夜潮不得退復駕晝潮沓之西北江滛潦適暴至瀕海室廬倐在四五尺湍浸中凡八千餘家災也公充猶已溺之之心巡拊賙賑爲錢緡若干臘初大雪三日積盈尺銀城瑶林羣犬狺狺炎方昔所未見瑞也公充猶已寒之之心城表窶民與諸營健兒給有差爲錢緡若干皆庫所獲利毫芒之積效亦速矣慮患之深智也流惠之長仁也所學稍出膚寸已如此清獻崔公晚歲郤奉祠之廩帥鄉部亦不受俸鏹踰二萬米斛二千有竒留州家無何問之倉庫氏則烏有矣人一身所須幾何貪夫滿意囊匱將遺雲仍曾不足以供騃子孫一笑用清白留芳厥後必昌穹秩備禄其來莫禦積之於官者其家之無盡藏也賢者規來者隨繇三十萬推廣之而百萬千萬可坐而至也縱無所增益能愛護俾勿壊尚不失爲中人若夫括羨贏輦獻之巧名色羽化之惟已貴富是規使邦人緩急失所憑而受其害則中人以下亦不肯爲也直小人不畏天命者耳獨爲君子實公所耻淳祐六年正月文溪集巻一

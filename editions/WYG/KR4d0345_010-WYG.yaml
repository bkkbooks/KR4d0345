  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0345_WYG_010-1a, image: WYG1181/WYG1181-0177a.png}
body:
  text: 文溪集卷十宋李昴英撰書上鄭丞相書戊申九月乞免知贑州昴英楷題既襞不敢𤨏碎儀式恐貽溷瀆之譴首乞鈞照昴英疎遠之踪狂迂之性不識事體沙斥固宜自歸三逕杜門掃軌誦習故書求以克去氣質之偏獲逭謫徙已為萬幸安敢作榮進夢忽叨誤渥予郡起家聖天子乾坤同量不棄蝼蟻之微廟堂包荒不遺葑菲之賤得之如驚感深以愧自合奔走奉職少見寸尺以贖往愆實縁一春行役衝雨濕感風邪百疾交攻精力全衰偷安泉石間尚可以徐徐療治倘冒焉當繁劇之任必至敗缺不惟身計之誤而誤國之罪大矣心之精㣲盡在免牘謹録副申呈五羊去天四千里駛輩一往返動是三閲月而虎城重地宜亟選長才所以不避誅殛繳回省劄者蓋欲一時而遂所請非特為身計實為公爾計也欲望鈞慈為之宻啓於冕旒之前庶幾小臣真切之悃獲徹崇高之聴收回成命畀以叢祠使進退稍安不得罪於物議其榮過於二千石多矣此身未填溝壑他日尚能蹈刀鋸鼎鑊以報國恩干冒鈞嚴不勝戰惕之至與秘書徐霖劄子戊申某去臘束擔出六和塔朝士送者才四執事其一也相與促膝攅眉語至暮而後出别後忽十閱月懐賢耿耿一食息不能㤀也四千里跋渉春晏方抵弊廬杜門掃軌一字不敢出門故於畏友亦一例似疎絶邇者聳聞大聲疾呼之疏上拂衣徑歸天子灑翰大臣聨札清班追挽竟不能回天馬之馳向來首摇冰山已立羅浮四千丈之上此舉前無古人又在祝融峯九千丈之巔矣卓乎髙哉不可跂而及也已敬歎敬歎某婆娑三逕熟復故書麤得静味忽誤渥予郡起家乃與重名同一除書厠穢形於玉側頗覺羞愧聖天子天地其量超軼古昔恩寵殊常本不敢控辭私念平日受教菊坡公講明出處最不草草深懼得罪清議為先師辱故以真實之悃寫之免章切度公朝必見察可以遂所請凡可以開發者幸不鄙相去三千餘里無從握手傾倒倚風惘惘乞為偉器自愛不宣與廣帥徐意一薦僧祖中書某數年不到羅浮夢寐見之近招寳積僧祖中來出缾中卓錫泉烹石樓新茗共談山中事清風忽起坐間飄飄然如行飛雲頂也某歳在甲辰兩遊羅浮至必住旬日山廣大深逺不可窮而山中人絶少道人則有王寧素年八十餘碧瞳炯然照人頭陀則有祖演年髙過之髪色如黄金僧可語者僅僅斯人耳此大夢徳因之子而克肖者也將辭歸中閣必欲識意一而後去渠無他求必有異乎人之求者風雨如許政齋閣焚香静坐時試延之前使呈露所藴必不能謾具眼得聞侍郎一聲歸山林作話柄竊度其所求不過如此而已進之退之惟所以命與廣權帥邱廸嚞治盜書某晦藏林谷不敢與聞户外事每荷龐漢陽先候之厪且懼杜周甫寒蟬之誚有聞而不以告終愧於心民吾同胞也况父母之邦之民乎方此上下疑懼之時某儻以利害不切已而不知恤桑梓之人交責以義無以自立於父母之邦矣夫治盜固貴於嚴尤貴於審惟非盜或遭横戮而真盜未必能獲此賊盜所以滋多也前乎嘗聞途人之言曰某人以姓名同而捕某人以盜賊之親屬而捕幾人善良也亦皆捕未幾則某人臠矣某人梟矣某人截手足而死矣心甚悼之而悔不先以此聞徹足下伯仁由我而死之念至今不㤀日來所聞又有甚焉葢官司捉賊不容不倚辦於隅總而為隅總者類皆小人不識道理但知憑威勢為姦利安知人命之為重往往半公半私以快其所欲或宿怨之未償或厚需之未厭或黨與之所仇隂嗾使之甚其誣揑送於官彼覬厚賞者利於俘數之多略不分别躬自訊鞫窮極慘酷誰不承伏雖分麗諸獄然羣有司非卓然自立者未有不承望風㫖自為身謀何敢可否於其間足下以疾惡之心視已成之牘則皆死有餘罪有非其實情足下烏得而知之利歸於小人謗歸於足下使足下知之必不肯輕於筆矣自清遠兇徒日就擒獲則足下之功亦偉矣必不藉此區區數輩以張功狀非通徭而為通徭非賊而誣以賊豈足下之本心哉今士竊議於途什什伍伍顰蹙私語而某於朔旦固嘗面言其略既而聞用事者有遂非之意恐足下竟為憸巧轉移草菅斯民虧足下之盛徳某連日思之食不下咽寢不安席私念此身非僥倖一官家在城市安保此禍之不及也惟視人猶已之心噤不一語安乎故盛服焚香籲天而布此札稍有一毫私心天地鬼神其誅殛之惟足下是非之間審之又審謹之又謹與其殺不辜寧失不經使平民免於屠戮于門之隂徳豈易涯邪某狂妄之言至此極矣不敢復有言矣若足下不以為然而不加之意則是邦之民遭此厄㑹某抑末如之何也已惓惓愛助之心惟足下其察之狀辭免知贑州狀照對某淳祐七年十二月初九日準當年十一月空日尚書省劄子備據某狀辭免繳回差知贑州省劄十一月三日三省同奉聖㫖不允并元省劄付某者殊渥仍頒微躬無措某切謂榮寵廼人情之同欲威令宜臣子之欽承矧閑廢而得州合馳驅而徇國伏念某最凉其分不競於才咸謂之迂非剸裁之敏手而有斯病由憂懼之熏心字對眼以如遮事轉頭而隨㤀曽是可當於劇任冒然繳納於除書雖不加以方命之誅猶例待以具文之遜量已莫禆於世用籲天更積於衷忱控告廟堂奏徹旒冕憫此栁蒲之脆質許其香火於真祠二千石起家之除不為棄物一再傴循墻之避庶附全人所有省劄二道寄留廣州軍資庫未敢祗受須至申聞者辭免除福建提刑狀照㑹某淳祐八年正月二十二日準淳祐七年十二月二日三省同奉聖㫖李某依舊直秘閣除福建提刑劄付某者異恩㳫至小已若驚伏念某起自單寒最為綿薄樗櫟散材之無用豈適時宜草茅習氣之未除易與物忤内徒汙於班綴外何有於民庸僥榮頗越於分涯未老已成於衰証怔忡多忘視聴難真一障承流尚慮駑疲之弗稱列城折獄自憐鼯技以奚堪敢貪斧繡之榮懍有針氊之懼莫禆國事徒速官刑仰祈宰路之奏陳特畀祠庭之閑散倘必待其曠敗而後加汰斥孰若察其真切而早賜存全退處山林庶可療采薪之病稍遲嵗月不敢辭蹈刃之難所有省劄寄留廣州軍資庫未敢祗受須至申聞者請諡李韶方大琮狀昴英竊惟端平更化當時言官皆上親擢修名直節翕然可稱今其存者悉已顯庸其殁者悉已節恵獨有内翰端明殿學士李公韶右史寳謨閣學士方公大琮節行立於朝功徳著於民乃聲實彰著人所共知者且其官品皆應命諡而既殁數年易名未舉非闕典歟昴英待罪奉常不敢自嘿竊見李公韶自為太學愽士已有直聲方公大琮早登髙科服勞州縣三十餘載耻及權門人知二公卓然有立迨䝉拔擢感激思奮聲猷相繼至今若存李公韶為臺諫侍從為詞臣出入數十年間彈擊姦孽呵斥近侍明辨和戎之非乞正首兵之罪權姦挾君柄國則援春秋世卿之法以攻之權姦服除予祠則帥從官合詞以奪之其辭召命率是經年其居要塗無非去日其知道州則葺元公故居録子孫於學提泉舶則盡郤兼司非額之宿例治臨漳則極言遣使秤楮之弊端其清名勁節終始不衰方公大琮居言路侍右螭兼詞掖不一二年首疏明綱常再疏正君心斥舊璫之蠱媚抑後宫之濫恩建明國本則乞立内學以重教養愛惜時望則力與給舎争辯是非奴才守邊者禠之重名器也揣摩得官者革之息邪説也其將漕福建舉行荒政賑糶有方寛弛鹽政與民均利移帥嶺隅首尾五載潔白自持恩威並著訂正釋奠禮則取淳熙新儀按其服器而一新之舉行鄉飲酒禮則沿中興舊典本之以儀禮而屢講之買田入濓溪書堂節用創備安四庫増補軍額而盜賊不敢犯境禁買南物而蕃賈至為立祠其英聲茂實内外如一嘗觀狀李公之行者曰忠厚純實平粹簡淡於人物無臧否而遇事敢言無所避忌而狀方公之行者亦曰謙和冲澹奉已約薄閒居不見喜怒之色至其立殿陛争是非凜不可犯始李公在臺端劾内侍女冠方公以言官請故相罪兩疏同時聞者聳動謂仁者之勇㑹明禋免相李公除權工部侍郎方公亦除起居舎人是其制行同志尚同出處進退皆同而其未及盡用也亦同昴英每念人才難得晩節難保若二公者生為名臣殁為全人稽之典禮宜得美諡以明公朝勸善之意是用轉聞於上文溪集巻十

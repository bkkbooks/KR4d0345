body:
  text: 文溪集巻九宋李昴英撰奏議淳祐丙午十二月正言奏劄臣聞舜戒其臣曰予違汝弼汝無面從孔子論事君之道曰勿欺也而犯之人臣納君於道秪當辨事之是非據理之可否必其美而後可以將順如其不善則不可以逢迎以責難為恭以非道不陳為敬若夫視指意而遷就覘辭色而轉移則是詭隨容説而非忠愛其君者也世之砥柱特立者常少桔橰俯仰者常多得喪交戰於其中操守易變於其外人主設或喜脂韋而疎骨鯁愛迎合而惡拂嬰是導之從諛也孰不俛然惟上意之所欲哉原其初心亦不過求以固位而已求以希寵而已遂至於誤人國家事有天下者奈何忽安危之大計而遂邪臣之私情乎漢之禍成於張禹對成帝之一言唐之禍基於李勣對髙宗之一語自欲保其家而忍於負國自欲存其身而忍於欺君此固佞臣之罪亦二君素不能容受謇諤固應有此也國朝兵不如漢富不如隋土地不如唐而鴻基駿業與天地並恃有直言讜論以為元氣耳有為宰相而補綴裂奏以復進者有為執政而争事立庭下不去者手詔趣書讀語甚峻而八上章竟寢其命者給舎也以彈疏之煩見厭而上前自訟求罷去者言官也手引上衣使復就坐决其事者員外郎也上不以犯顔逆耳為奸事事付之公論而私意不行下争以披肝瀝膽為忠事事决之正理而身計不恤一脉之夀以至于今陛下俯接臣隣威顔天霽樂聞剴切徳量海涵人臣遭逢明主而不能致諸三五之登閎則為有負然往往多逢迎而少正救工揣摩而畏觸突隂摸棱而欠直截以可為忠言之時而猶若此豈非陛下於忠佞之間好惡未明自歟臣妄謂今之世不患無文墨之士而患無氣節不患無議論之士而患無骨力不於平時奬勸招徠激昂砥礪而遇事責其奮不顧身何可得哉故論事無所避則臨大節而不可奪也依阿以求媚則臨難而茍免者也至於陽附正論内懐二心緩急又烏可保哉陛下静觀而宻察則無不洞見其衷藴矣昔汲黯有内多欲而外施仁義之語武帝殆不能堪而不冠不見最為嚴憚且期以古社稷臣之事觀人如武帝庶乎得其真矣臣願陛下於柔佞者疎之絶之忠直者親之信之得如黯數十輩布之朝廷為吾國之倚仗他時宗社終必頼之區區愚忠惟陛下留神論陳樞宻疏臣聞罪莫大於背國惡莫大於庇奸兩地之重職為大臣一言之發闗繫不細倘或立異論以沮大計懐私意以昧公非羣情為之動摇衆口從而噂㳫良由心術頗僻識見猥庸用過其分不覺呈露事既闗於宗社責難逭於簡書臣切見通議大夫叅知政事兼同知樞宻院事陳韡自負膽畧亦鋭功名江閩討寇雖屢書勞妄殺平民頗多枉濫後來調兵過江之輕舉遂至匹馬隻輪之不返志廣才疎前功俱廢且莫當於一靣尚可望其遠猷陛下念其乆閑擢之近輔勉思所以上答主恩下副人望可也理財專局略無設施褊性狠態時復妄發此猶未足深責也國本始定神人所同喜韡獨出語不遜識者駭愕奸相負罪神人所同怒韡猶盛稱其孝識者忿之陛下决天下之大計去天下之巨蠧斷自聖心超越前古身為執政不能從容宻贊乃持論悖謬如此心事可知矣夫沮抑普安之事非秦檜之奸不敢為而營救蔡確者雖以范純仁王存之賢不免黜罰臣採之公論皆謂韡之叨塵已極矧其猜忮嗜殺使自得恣流毒必廣斥去為宜臣舊嘗為之屬不敢以私情廢公法欲望陛下察其非忠退之以禮職名藩寄華其暮途爰示寛恩之曲全式彰清議之不貸使臣子各厲忠純之節天下明知是非之公實世道之幸取進止嘗閲近世言行録載知院陳公韡行狀一段云先公侍郎任汀州推官激軍變陳公時為招捕使嘗欲劾之後居言路遂劾陳公以報怨噫有是哉世所謂行狀皆各家子弟自為之辭非信史所載不足證也先公侍郎初筮汀推不過一寮屬耳郡政不在手何以激變此乃郡守陳公孝嚴實激之為叛卒所執辱幾殞厥軀先公挺身為之排難公論在人不可誣也使激變果出公手招捕公縱不見劾郡守豈容不聞於朝以自白此理甚明觀其詞曰嘗欲劾之而不果如是則當徳之不暇又何怨之云且臺諌為天子耳目官朝廷選擢委寄非輕所言皆社稷大計若區區為報私憾之地小丈夫尚恥為之先公大節表表而肯為是耶况先公之於陳公本無纎芥之憾行狀所云欲之一字特曲為之詞耳既無是理必無是事私門紀述姑以文過豈可使先公受誣於地下而千萬世之人受欺於曲筆故不得不為辨正孫際明識論趙京尹疏臣聞國朝舊制不以宗室居宰輔以其有逼近之嫌也其為慮遠矣畿府號衆大之區委寄隆重有利權有兵柄有狡黠健悍之徒為之分布奔走是雖非宰輔之位而權力過之縱使處是職者果宗賢且難乆任葢積威積惠之深人心所重在彼非國家之便也今有帥雄繁之地渉嫌疑之跡而頑然不知引退者衆情皇惑人言權故事優畀職名遣鎮外服不惟國本安固可以一人心之趨向乃所以福與於安全之地亦親親之仁也小臣不識忌諱罪當萬死惟陛下赦之取進止繳奏劄子臣一介孤遠誤䝉睿簡擢之諫職非由大臣薦進舉朝共知臣朝夕自厲惟知報君父惟知衛社稷惟知利國家一身禍福且不暇恤雖聖諭亦不敢阿順詎肯俛受他人風㫖哉臣今早上殿讀第一劄將畢陛下問臣次劄所論何人臣以陳韡趙與對天語再三止之令不須展讀臣辯説移時聖意堅執倍力亦不許納奏劄秪得跼蹐而退縁臣所言二臣皆於國本有闗既切宗社皆是國人之公論臣所職者言若置之不聞而捃摭𤨏碎以塞諫紙則物議交責臣何顔立於風憲之地乎謹不避誅殛連元本繳進欲望聖意察臣愚衷秪是為國非出於胷臆之私特垂省覽亟賜付外施行仍乞睿㫖放臣歸田里實荷聖恩保全之賜寳祐甲寅宗正卿上殿奏劄臣聞人主之心必有大警悟則天下之勢不患其岌岌然甚矣東南輿圖寖非全璧之舊吾國事力何異垂罄之虛外侮内攻之多虞百孔千瘡之畢露如居敗屋東撑西柱於疾風苦雨之中如駕漏船左支右吾於汪洋驚濤之上此非出一竒所能振起亦非變一法所能維持也治亂存亾之基全在人主之心此心雖微而萬世基業四海生靈闗繫甚大出理則入慾去私則進公上而為三代之隆此心也降而為陳隋之季亦此心也自古艱危之世豈無可以挽回之機括其君迷而不復迄無幡然改易之良圖遂致圮壊竟難收拾廼若穆王荒於馳騖王業幾殆然一聞祈招之詩其心止焉而周鼎重矣武帝毒於征伐海内已虛然一下輪臺之詔厥心悔焉而漢祚復矣一念之勇不俟終日力量之决坤轉乾旋穆王猶得享國百餘年武帝且不失為七制之賢而况不為二君者乎恭惟陛下天錫勇智度越古先日就緝熙獨得道要昔人主之退君子也有棄置終身者陛下洞察其忠則不旋踵而收用昔人主之惑小人有專任而不疑者陛下既知其姦則或斥或貶略無留難明習乆而利害周知宻察精而是非立决和顔樂受於苦言每事悉從於羣議此天下臣民所共贊詠以為不世出之主也臨政願治餘三十年宜盛而有衰之形宜治而有亂之兆災謫頻仍帝怒未息流離愁恨民情寖暌强隣窺伺敢據户庭之間鋭旅侵凌近在股肱之郡楮不行而錢幣竭物踊貴而兵民貧事事駕漏色色窮空症候轉危景象愈蹙陛下深居九重雖聞知而未必盡知也人情隔於耳目之所不及者易疎而日親於左右者易入陛下固勤勞於時艱而有可娛之具陳於前則有時而縱固焦勞於外懼而無可駭之言接於聴則有時而㤀陛下揆之心前乎幾嘗悔艾而復􅈈幾嘗憤發而復沮人欲終能勝天理隂濁終能勝陽明所以為此之累者必有由矣故言湯之美者首曰不邇聲色不殖貨利而繼之曰改過不吝湯自責之辭曰女謁盛歟苞苴行歟湯曷嘗有是而惕然恐其有此其所以為聖也西邸厚藏瓊林充積竟成何用秪為亂階孟軻謂國之危由交征利臧孫逹謂官之敗由寵賂章其言至此遂騐可為後世戒臣去國八年重違闕下意謂陛下學力益深義理益熟聖徳日躋弊事日除而籍籍塗巷之切議彰彰封疏之敷陳廼無異於疇昔殆有甚焉此臣之所甚駭也陛下非不知普天率土皆吾藏富之所區區外物於清躬何補而認為已有哉如聞北司竊弄藉勢招權掖庭嬖妮憑寵干請倖門四闢賄徑多蹊前者得而後者慕名藩巨鎮視如探囊好官美職争欲染指無恥之頑因應瀾倒嘗自愛者亦復效尤豈所以杜羣枉厲四維乎雀䑕之訟亦徹宸聴蟣虱之吏上煩聖决至於修内司之獻助取浙東西之上腴所過需求見謂騷擾不幾於下行有司之事與民争利乎文昌八座執政之儲也以處恩澤侯之瑣庸卿監郎闈侍從之選也半是王家之子弟外焉郡國之麾節類多戚屬之膏􅆝政事既非其素閑民物何從而得所進有徳以尊朝廷選良吏以安田里其庶乎夫私情勝而後女謁行私愛牽而後恩意䙝一私膠固始猶根蟠旦旦行之明知其非而安之以為常事人人言之明知其是而玩之以為常談内降多而視中書為奉行文書之官節貼宣諭多而待臺諫為奉承風㫖之地世當承平猶不宜有今何如時私意感召乖戾應之為兵戈為雨淫為潮决極而為開元末年宫中之怪識者隠憂焉陛下不於此時大警省大懲剏亟思所以轉移之而待何時乎不使馮野王為顯官恐人議其私後宫親屬漢元帝猶能之邵光超以中使受縑而被罪其徒悉棄所獲於山谷唐徳宗猶能之詔以别貯錢物以所占陂田歸之有司唐文宗猶能之數君皆庸主也曽何足道陛下聰明神聖可以為堯舜而不能勇於為善豈不甚可惜哉歐陽修曰枉費財物利悉歸衆中外譏議則陛下自受朱熹曰有私用而後有私人有私人而後有私財二臣之言明逹的切似為今日發臣願陛下思祖宗付託之不輕念國勢阽危之已極克已如勝敵窒慾如防川戒謹恐懼無一息之間斷精粹純白無一毫之瑕疵痛懲前失猛剗宿弊如人之乆病力救幸而有瘳多方防其復作陛下悔過之心既堅上天悔禍之心必速則外患潛消天下事可以漸就吾之條理矣不然君臣不悛以樂玩憂將有如唐晉季世之歎可不懼哉臣又謂正心以正朝廷百官者在人主而格君心之非則大臣責也故都俞而有吁咈焉將順而有正救焉縱未能使人主嚴憚正之於念慮未萌之先亦當與人主相可否審之於命令將出之頃酌以道義參以人言從容啓沃必求其是庶幾上可以感動淵衷下可以愜服羣望倘遵奉之惟謹而規正之不聞國何賴焉或告唐憲宗曰徳宗自任聖智不信宰相而信他人使奸臣乘間弄威福憲宗曰朕幼在徳宗左右見事於得失當時宰相未有再三執奏者皆懐利偷安卿輩亦宜用此為戒當力諌不已勿畏朕譴怒而遽止此又陛下所當責之大臣者也臣拳拳憂國之忠不敢少隠惟陛下留神乞罷幸西太乙劄子闕全文其略曰方四郊多壘此正卧薪嘗膽時湖山在目日渉游觀道路頗遥駕還必暮意料之外事非一端乞行御史洪天錫劾閹寺之言疏闕全文其略曰今歳以来天變頻仍正當修人事以應之倘人事又變是以變弭變天怒何從而釋耶臺臣非他官比今以劾寺璫而去紀綱紊矣是非易置去留倒施人事之變孰大於此疏入不報再疏乞與洪天錫俱貶闕全文其略曰邇來北司專恣日甚一日他人不敢言察臣天錫獨言之俄而觧言職以去中外莫不駭愕始天錫登朝臣實薦之如不行其言乞俱貶公遂與御史俱出國門文溪集巻九

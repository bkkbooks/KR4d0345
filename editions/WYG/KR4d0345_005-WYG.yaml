  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0345_WYG_005-1a, image: WYG1181/WYG1181-0145c.png}
body:
  text: 文溪集卷五宋李昴英撰題跋題潛守黄連傳雪巖潛君起傳黄連以其味苦而能愈疾猶言忠而能救缺遺也然苦易厭忠易踈古今同一病此佳傳可藥天下後世豈但體物游筆力而已哉予嘗謂黄連最甘舉世莫曉蓋不適口頃刻耳爲身已安非甘乎物之甜人其害有沉痼不可療者非苦乎日昃不暇食文亦勞止終與民皆歡樂元宗末年聲色豈不大快意卒不宴於蜀明驗可睹夫君心苦身苦學苦行苦其性黄連其氣味黄連寧自苦而欲遺世以至甘故言尤苦必有持是言進之上者國脉庶其有瘳乎唐博士嶺南貢蜜菓詩曰政恐無禆益所出非和平上林寧少此下箸安可輕在惠陽作也其忠愛深矣黄連傳惠陽所著二篇政堪作對跋潛守治獄好生方治獄好生方雪巖潛起所製也方所主者一曰仁其用有三曰硏之實辨之白决之早余始讀之意其如世醫雖能處方未必有眞見定力能察脉投劑也南海値厄運漕邱廸嚞攝帥尉陳知章攝倅以殘虐爲能以多殺爲功時號大小屠伯虎噬蟒吞俘平民爲宼纍纍血刀杌繡衣陳公均久知君檄之詳訊凶人方煽威熖脅制同列或勸君引避可以免君奮然曰人命至重但平心睹是己之禍福利害在所不論乃躬審問具得情實頼以更生者十九與唐眉山序蕭師顔明興元獄非叛活數十人事頗相類人始服君有活人手能用此方矣既随試效不得不廣傳書菊坡先生蒲澗生祠記後端平二年二月二日廣人奉菊坡先生像生祠之先生拒之峻不能止也衆屬參預宏毅齋游公佀秉記筆文絶竒偉先生戒毋刻尤力蓋謙不肯當吁先生騎箕尾去矣餫使劉公克莊始入記於石命其客鍾大鳴視工以淳祐之元中元後三日立先生所以惠其鄉國人所以尊其老來者有稽焉游公之文也抑劉公之力也菊坡祠二在蜀仙遊閣劉後溪贊之在南海之蒲澗劉後村碣之鋪敡大賢者盛德垂之無盡兩劉氏之意俱豐而後村慕前修於既往勤勤焉非利而行之此則過人逺甚邦人士謂宜識俾先生之門人李昴英書書瀧水趙宰汝軏生祠後端平二年二月七日狂卒曾忠嘯衆突南海城余縋出行其壘且周曉以逆順禍福羣兇帖聽遁而西又四年讀瀧水民立趙令君生祠記而後知賊據古端日康之人大恐瀧境内鮀黎獠假防縣爲名鳴刃譟庭下令從容折以理即觧散去時菊坡公帥鄉部如此好漢惜郡將不以聞余方在幕府實負蔽賢媿趙君有靖百里功未嘗口㣲邑人載之碣殆不傳今士大夫幾大樹將軍矧宗室子君名汝軏敏才而力學所至有政可稱南海李昴英書書士友張德明擁書樓余友張君諱允廸字德明奇偉士也自言出曲江文獻公派嘗都城共邸見其挾册竟晝夜吟不輟心甚敬之無何挈入璧流齋房就訪焉則壁横墨本二大字曰擁書蓋菊坡筆也謂余曰某不才辱鄉逹尊不鄙夷其敢暴棄而戰其藝南宫輙北俛就西廊試入前龜迄不肉食余來寳安登其藏書樓二大字宛其舊識而故人隔世久矣爲之愴然且仰歎大老先生樂與後進惜天不夀斯人少副所期也其三子斗文翼文光濟皆力學克支門戸皆與漕計自此能刻厲以成先志則德明猶不死也勉旃嘉熙二年六月二十二日書胡侯竹巢七思集細誦胡侯大學七思之作迎駕謁殿之篇其綱領與君之仁所以教育我師之道所以作成我功與天地並蓋終身受其賜如之何勿思侯去璧水幾年而巻卷然形之聲詩視世之豢富貴而忘虀鹽者大逕庭矣兹牧千里將行夫子之言以澤天子之民推廣其所思則天下有溺者饑者皆在吾念慮中侯必勉之寳祐三年七月二十三日南海李昴英書題劉潯州必成三分集嘉熈丁酉秋余被命衡文貢闈右科中得一奇士掲之觧首則劉君必成也明年君廷對魁其倫又十年以清潯使君寓南海始熟其標致論議競爽可人與其所爲文不異而吟尤工豪逸雅澹兼衆體題所編曰三分取東坡戱郭功甫語也謙退不自足如此進未易涯雖然世有擅八义之才而他無可書者器識先而文藝後也立身行已當如前輩所謂八九分人推以及物必寛之一分君所學所志蓋有余所期望者不但進於詩而已題鄭宅心山居藁余乙酉與鄉老進書鄭君宅心由東廣漕闈舉名始聞未之靣也嗣歲識之於期集所邸寓又相隣日夜劇談不休蓋博物而多藝者又十年四月邂逅爛柯山喜其詩益工相與道舊留三日而别未幾以死聞同榜中如斯人豈易得哉君之弟宅仁收遺藁得數千首將板傳之可謂篤友于之義矣佳士不可作同年多凋謝拊巻悵然淳祐丙午題危志仁恕齋詩藁四體具而爲人而夫子所謂成人異於是則知杜子美詩成泣鬼神之句非成章之謂謂功夫到成處也廬陵危容孫出家尊恕齋吟篇句而琢字而鍊興髙而味長一讀知爲老蒼輩庻幾於成者此足以成恕齋名矣奚必仕題三衢陳大經詩巻陳君自號岫雲所以寄蕭閑之趣非以是狀其詩也而澹乎物表納宇宙之大於胷次吐之成韻自然清絶不塵君詩多態度藹藹春空雲必有賞音如昌黎翁者淳祐八年八月八日題節推張端義荃翁集士行乎患難可以驗學力所至深淺茍聞道矣雖瀕於死不變有飽雞粥鼾睡以須者羈困旅逆又焉能動其心姑蘇張君端義以選人三上書帝閽最後書言最狂端平明禋雷雨時也天子戅之僅於韶以置乃得與監門俠謫所隣老矣落南依敗屋然破釡竹榻紙衿凄其誰堪而顔丹如氣虹如不作顦顇無聊狀其詩累篇骨處實眼處活峭奇而非怪含婉而不怒多從胸中書流出他日將與名相久逺而後知數年數千里外所以充充然自適而忘秋風蓴鱸之感者心寄於詩也或問離騷荃喻其王而君荃翁號何余應之曰荃香草也特寓焉以自别於薋葹輩耳周大君在上楚莫非臣是於義無嫌淳祐三年重九文溪李昴英書題鄭南瑞礫銕集銕隨取而有人得而凡之然極其至精有天下至寳不能當者一劍而敵千金已珍矣一鼎而夀國且千祀誰得而價哉聞鄭君南瑞標所業曰礫銕自謂其文如銕藏沙礫中俟淘鍊之工而未遇也意則甚謙矣銕亦豈易方耶能堅其志剛其氣學成而器於時則腸焉宋廣平靣焉趙清獻可不朽百世彼錐以刺硯以磨徒欲資筆舌錚錚旦暮間君子不貴也返其行卷書以厲之若曰鑄人則予不敢淳祐三年十一月一十三日題郭景舒梅埜百詠暗香踈影一聨出梅孤山和靖成三高蓋工之難豈多之貴耶郭君蜚卿頗有王謝家子弟風嗜於詩酷詩於梅獨富趣尚殊不塵然年盛氣鋭往往成之易出之早才性固自佳特未逢好師友砥礪礱磨耳歲月益宿推敲宜苦華收實在潦盡石見觀舊作當自知郭功甫自謂一世豪東坡於其詩纔許三分蜚卿能勉用力將不止此家數淳祐二年七月文溪李昴英俊明父書題鄭宅仁詩藁詩詞雖寄興寫物必有學爲之骨有識爲之眼庻幾鳴當世落後世不然是土其形繪其容望之宛然若人也置雨中敗矣余識鄭君宅仁已數年今見其近作如此君同年之弟也愛而莫之助可乎淳祐六年三月朔題趙公玉新昌紀詠澹庵謫仙人一䟽請尚方劒前後三十詠始落南荒公去新幾年仕宦新幾人傚其數而詩惟一趙公玉蓋勇於步趨前修者詩寓焉耳題彭昌詩下車録下車而揖戴笠此布衣交富貴毋相忘之約耳若夫一言而善介卿下堂一字之工大尹駐馭前逹之賞識士不必舊嘗半靣也士有安窮閻而陋結駟寄飲市而傲召輪又曷嘗汲汲焉覬貴顯者之一顧盼哉窮逹不足以論士新故不足以論交所以意氣相與惟其人而已人如彭君昌詩所至誰不倒屣誰不下榻帙此以謁諸公庻幾他日一邂逅雖似乎贅視世俗所謂雲萍錄泛泛然紀載則大異矣余方耕釣文溪上效東坡雨笠曳屐則軒渠甚適乘車騖榮途者甚多矣君必欲頺然山夫筆其編甚矣其迂之過我也淳祐十年四月既望題鄭寧行巻雲峯所爲文曾經眞魏宗工指教既數年矣筆力當益進必不止是編恨未盡見也書趙經幹彦捍自鳴錄趙君禦賊龍川余方闔戸恤居不得耳顛末逆卒犯城以後事則身其間歴歴猶在眼也是時肉食者爭藏深遁逺宼退亟呈身從而論功者亦衆矣君入與毗富道兵偕自言泝韶溪趣之來援似權以濟事而心未暴白於人竟爲法受惡朝廷徐知其無他過賜之環訪余出一編曰將持此鳴其不平請爲我一語以證余生平不觧絶物而筆不逐世情君異時督捕誠有跋履之勞今自惠來此邦人士相唁問不絶於館亦必有人心未能忘者是則可錄嘉熈戊戌臈書方右史請田知白作濓泉堂賔書後缺全文是邦老成人無踰田知白者聞其壯即厭科舉專志理學使領䄂書生爲宜知白長余三十歲有疑必就質焉而不敢友也因從闕文溪集巻五

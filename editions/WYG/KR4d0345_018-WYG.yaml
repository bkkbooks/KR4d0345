body:
  text: 文溪集巻十八宋李昴英撰詩餘蘭陵王燕穿幕春在深深院落單衣試龍沬旋薰又怕東風曉寒薄别來情緒惡瘦得腰圍柳弱淸明近正似海棠怯雨芳踪任飄泊釵留去年約恨易老嬌鸎多誤靈鵲碧雲杳渺天涯各望不斷芳草更迷香絮囘文强寫字屢錯淚欲注還閣孤酌住春脚便彩局誰忺寳軫慵學堦除拾取飛花嚼是多少春恨等閑吞却闌干猛拍歎命薄悔舊諾摸魚兒曉風癡繡簾低舞霏霏香碎紅雨燕忙鶯懶春無賴懶為好花遮䕶渾不顧費多少工夫做得芳菲聚休顰百五却自恨新年游疎醉少光景恁虛度猊㷑瘦困起庭隂正午游絲飛絮無據千林濕翠須臾遍難綠鬢根霜縷愁絶處怎忍聽聲聲杜宇深深樹東君寄語道去也還來後期長在紫陌歲相遇摸魚兒用古買陂塘旋栽楊柳韻敞茅堂茂林環翠苔磯低蘸烟浦靑簔混入漁家杜斜日斷橋船聚眞樂處坐芳草瓦樽滿酒頻頻注臯禽自舞慣松逕穿雲梅村踏雪朗笑自來去車乗墜爭似修笻穩步前塵囘首俱誤安閑得在中年好抱甕尚堪蔬圃高眼覻算不識人間寵辱除巢許風篁解語應共笑羣狙無端喜怒三四計朝暮摸魚兒五羊郡圃築壯猷堂落成遶西園粉籠千雉鏡池屏石天造主人意匠工收拾華屋落成聞早輪奐巧望縹緲五雲深處移蓬島油幢羽葆指貔虎長驅鯨鯤網取電走捷旗報鐃吹發囘廡連屯飲犒海山波靜煙掃綸巾蕭散環珠履春滿綠楊芳草人境好是握穗五翁福地無塵到芝書在道便整頓乾坤經營萬宇棟國要元老摸魚兒送王子文知太平州怪朝來片紅初瘦半分春事風雨丹山碧水含離恨有脚陽春難駐芳草渡似呌住東君滿樹黄鸝語無端杜宇報采石磯頭驚濤屋大寒色要春䕶陽闗唱畵鷁徘徊東渚相逢知又何處摩娑老劔雄心在對酒細評今古君去此幾萬里東南隻手擎天柱長生夀母更穩步安輿三槐堂上好看綵衣舞賀新郎陪廣帥方右史登越臺繡谷流明幟穩飛輿茵柔草碧葢欹松翠遨首意行窮絶頂綵榭千年勝地逺峰斷莽蒼烟水䕶日晴雲收午暑颯長風振葉生秋思籠霧炷彯霞袂淸明官府歌棠芾且蕭閑事外下看玉城珠市山色驕人逢此客麈尾霏霏露碎一笑五羊銜新穗田野歡聲和氣合喚觥船猛為魚占喜誰㑹得醉翁意賀新郎餞廣帥馬方山赴召世羡官高大又誰知幾多卿相身榮名壞我輩相逢無愧色彼此蒼顏健在又容易分携越海寫出陽關離別恨看一行鴈字斜飛界天下寳願自愛白衣蒼狗須臾改久㝠心雞蟲得失鷃鵬遲快君帶貂蟬頭上立老我荷衣草帶肯此膝向人雅拜逺餞元非趨炎者二十年相與形骸外義金石更堅耐賀新郎同年顧君景冲雲翼經屬官舍白蓮盛開招飲水亭誰種藍田玉碧雲深亭亭月上水明溪曲羞作時妝兒女態冷淡冰餐露沐出塵外風標幽獨除了留侯無此貌便何郎傅粉終麤俗意凝逺韻淸淑凉臺向晚㣲風馥訝銀杯羽化折取戲浮醽醁安得梅花如許大天遣辟除暑溽渾不覺鷺翹鷗浴可恨妖妃汙太液只東林社友追遊熟宜夜看燦瑶燭賀新郎賦菊細與黄花説是天教開遇重陽玉裁金屑老行要尋松竹伴雅愛山翁鬢雪任滿插追陪節物惟有淵明吾臭味傍東籬盤薄芳叢擷便無酒也淸絶芒寒色正孤標㓗慣平生餐霜飲露倚風迎月不比芙蓉偏嫵媚不比茱萸太烈似隱者瀟閑巖穴至老枝頭猶健在笑紛紛紅紫塵沙汩香耐久看晚節賀新郎餞廣東吳憲燧時持節憲江西元日除書濕到而今西風老矣駕軺初入自是龍顏深注想孤鳯翔而後集久父老攀留原隰庾嶺經行梅亦喜小奚奴背底惟詩笈冰雪操又誰及昨來容易風雲翕便三台兩地也只等閑如拾天馬不鳴凡馬喑百步何如五十况洶洶波濤方急此去一言囘天力着着高百尺竿頭立澆磊磈快鯨吸賀新郎再用韻餞吳憲過雨璇空濕皓秋香光浮桂菊曉風吹入柳繫牙檣應小駐草草還成勝集又追趂牡車原隰照座玉人風骨聳想胷蟠蘂闕琳瑯笈眞作者世難及逺山雲霧工開翕共朱闌徙倚總好錦嚢收拾老我秪今才思澁知二爭如知十戞金縷檀敲休急訪古夷猶行短境憶朝陽鳴鳯臺端立筆也醉硯池吸賀新郎丙辰自夀游景泰小隱作天地中間大縱遨遊登山臨水散人一箇學易已來秋又六肯趂名韁利鎻得日日安閑笑過金馬玉堂也曾到儘不妨拍手溪頭坐風蒻笠月蘭舸今朝記是初生我近小春黄菊猶葩早梅將朶拔宅危巓窮勝踐指點塵寰蟻磨看澗底飛泉珠顆松栢蒼蒼俱夀相更千年雪鶴鳴相和安期老舉盃賀水龍吟癸丑江西持憲自夀唱㳟初意如何朅來五十三年矣犂鋤頗熟詩書麤解簪紳聊耳自信柴愚眞成汲戅却無劉膩向高秋初度同時有菊淡相對風霜裏最癖登山臨水又何心蝸名蠅利俗緣未了强教肉食何曾知味無事微吟會心㣲笑逢場㣲醉把日生只恁安排領取百十二歳水龍吟和吳憲韻且堅鬱孤同逰之約驛飛穩駕高秋迎人滿目淸新景秋還有色芙蓉照水晨妝對鏡雪捲寒蘆字横過鴈渡浮孤艇是騷人行處腔風調月香滿袖過梅嶺斷岸烟收人靜雨聲乾桐疎楓冷掀髯獨笑仙翁起舞臥龍呼醒近小陽春為梅也合遲遲鞭影更鬱孤一笑追歡料得坡翁首肯水龍吟觀競渡碧潭新漲浮花柳隂稠綠波痕膩一聲雷鼓半空雪浪雙龍驚起氣壓鯨鯢怒掀鱗鬛擘開烟水算戰爭蠻觸雌雄漢楚總皆一塲如此點額許教借一得頭籌歡呼震地翻嗤浮世要津攙進奔波逐利鬬了還休倩渠銜寄三閭角黍會風雲快出為霖可但頷明珠睡文溪集巻十八

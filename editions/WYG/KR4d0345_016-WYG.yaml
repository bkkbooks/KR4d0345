body:
  text: 文溪集巻十六宋李昴英撰七言律詩下子先宗友試蘭省送以小詩毫端五色織成章皎皎淸標月照梁再戰文場推定霸一經書法首尊王鞭揚庾嶺梅花早梯上寒宫桂籍香師道自居吾豈敢所期竹帛逺流芳北山證果寺久聞北寺最淸幽因看花田遂一游近國好山半煙雨參天喬木幾春秋香凝永晝添談柄風送長松爽茗甌此境今纔逢我輩不留詩去鶴猿羞羅浮國醮并序昔下元日朝廷遣使齎香建醮有五雲呈瑞霓氅蹁躚拜玉宸發揮道徳五千文步虛夜半千山月朝斗空中五色雲風雨若時昌國運乾坤齊夀祝吾君賢侯方寸精誠積散作豐湖叶氣薰羅浮飛雲頂山行頗覺思悠然游遍仙家㡬洞天登見日亭風刮面立飛雲頂月齊肩稚川翁有燒丹竈景泰師留卓錫泉我得眞人金石訣無求自可享長年羅浮峒長寳谷王寧素送藥瓢久矣深山煉鶴形聞呼峒長又逃名斷崖怪木人稀跡亂石奔泉澗有聲劔定通神收古匣棋聊供玩戲紋枰藥瓢解贈寧無意重到孤菴論養生贈雲峰演菴主一菴移向白雲堆檜栢參天少日栽頗怪髪如金線様想曾眼見鐵橋來佛粘土壁煎茶供客對蒲團取芋煨却笑老盧懷鉢走只因説出鏡非臺題羅浮冲虛觀化緣疏仙去千年重此山不禁風雨屋摧殘金能點化空談易錢欠通神着力難支厦終非一木了成裘未免衆毛攢洞天有分人人到輪奐峩嵯起筆端寳祐乙卯峒長黎道静住持冲虛觀求詩化緣修造輪奐一新送湛師囘羅浮花首山翩然拂袖忽然囘帶得羅浮面目來乞食又還雙足蠒坐禪豈是寸心灰故依花首從三靖旋摘茶芽供一杯蘭若苦空君不厭可能為我掃蒼苔秋試已近用韻勉兒輩鄴軸輪囷數世藏乃翁曾讀被龍光詩書有種芥拾紫科舉催人槐落黄學到自然名盛大文工更要理深長歲當酉戌吾家旺月府先敎竇桂香送黄提幹赴班不枉金閨貯一賢唱名重見冕旒前省闈見説第三賦選調猶遲十八年據實語人南嶠事無多行李浙江船壺山羣彥官今緊直諒如今合茹連送恩平潛使君還里二首風流太守作春遊到處恩波浩蕩流懷綬故鄉需上日移舟別浦趂中秋聲歌洋溢行人口書翰縱横健筆頭識面雖新心頗熟慇勤話別送歸舟其二五載南州屈重名活人一段是歸程兩州曾喚兩蘇起孤節要師孤竹淸合有鋒車催赴闕不應畵㦸又專城閑身已决深山底千里猶能共月明夀張新班喜氣稜稜肖紫巖向來石燕毓竒男九十平聲音旬入相今纔半七日為人恰後三正月十日生籍濕金閨穹地步椒香玉斚盎春酣赤松須待功名遂蒲澗淸泉墨菊潭送次兒解試四度牋名達帝聰國子監中者一臺諫及者三布衣便有此遭逢吾家積慶為心印一戰收功在筆鋒舉子頭塲關薦鶚時文手段要屠龍庭前手植森森桂飛捷今秋好事重紀事保林尉韻并序保昌尉陳知章權廣倅捕南海平民為猺賊凡三十人獄將具余作劄子露香告於天而後達於帥閫不行其言又以公狀達於憲臺逺檄循倅潛君審之而後獄得少緩林尉汝沆有詩用其韻云淸晨風日闢群隂一紙三熏上帝臨或者貪功頻滑手毅然奮筆特誅心寃辭賴有由言折聖世難施漢法沉此舉豈謀身禍福秪憐無罪縶南音聞禠閣職免新任之報二首逺民寃甚草菅芟抗論公庭出至諴且喜一方全性命何妨三字減頭銜機關平地藏深穽仕宦伶人視戲衫五遜州符今免矣幅巾藜杖可松杉其二狂妄孤臣罪有餘三年三度掛丹書群兒過計愁郎罷外物浮名總子虛只是儒酸眞面目不題道號混樵漁親朋欲語澆敎醉休與時人定毁譽送族子春叟游西廣鳯出丹山定九苞桂林要揀一枝巢久聞巖竇須幽討不是豪人莫汎交鶴髪頻將安問寄螢牕勤把舊書抄功名到底還堅志崛起新豐一草茅後峒月溪寺森森杉檜鬱相繆散策何妨逐勝游梵宇莊嚴傳浙様碧池蕩漾納泉流將軍嬴得山林在衲子多因粥飯留眼界雖云欠軒豁晚凉宜酒且夷猶送荃翁張端義之惠陽并序張荃翁太湖人端平雷變上疏直言謫居曲江往來韶廣間後又以言忤當路者謫化州終焉吹面東風竪緑簔詩翁七十醉婆娑放懷自號天隨子知我無如春夢婆吟有小奚磨破硯臥看赤脚踏行窩太湖爭似黄灣濶高浪粘天獨笑過即席和人韻送荃翁詩似油翁背注油知音世有幾荆州乍寒乍暖方榆火無米無錢只葉舟客况可堪今老大人生何必盡封侯津亭且莫匆匆去萬斛春醪任拍浮送李路鈐萬入京有序路鈐李萬建安人邱漕以梅州辟之不受運厄南州暴吏專鶡冠却有好官員捕猺怕損平人命製錦盡除常例錢枘鑿一言辭辟郡胷襟三略合籌邉景文匹馬長相過我愧才非玉局仙和心字韻送林尉公琰校文鵠袍忙立老槐隂爭望文星早照臨稱物衡無高下手别形鑑有是非心品題豈逐朱衣轉沙汰何妨苦海沉將見賢書協輿論眞才到此遇知音蒲澗和東坡韻四時冰柱濕風前絶頂飛來一泒泉瘦蔓相牽根太古蒼崖特立探長天竈荒孤鶴尋遺跡寺老幽禽闖坐禪閑日頻游歸復夢結廬曾許躡坡僊蒲澗山行宿景泰呈諸友人蒲根採得汎金船滴水巖前且地僊造物添支閑歳月上恩不與好山川意行芳草迷丹竈旋摘新芽撥澗泉欲雨還晴便登覽更消一宿白雲巓四月十五游僧寺今日快逢僧結夏不妨乘興扣禪扉山垂逺瀑溪聲急風捲痴雲雨脚稀嚢錦詩成僧借看紋楸棋落鳥驚飛此來莫訝凭欄久傑閣新成拂翠㣲代送邱漕廸嚞假帥如公自古無邦人久矣望鋒車政聲難掩諸公説明主周知萬里餘豹尾雞翹那欠此蓴􅅅鱸鱠且歸歟江頭鼓動江船去喜氣歡聲動里閭用人韻送梅糾梁現征鞍風軟踏香塵又送斯人南海瀕糾郡正資賔畫重洗寃須放筆頭春勉期聖處功夫到肯學世間兒女顰五瘴由心今一洗笑渠辟瘴嚼人頻送舶使周申堂堂山立舊朝簪久屈清流督獻琛風趕連艘出獅國浪吹殘句到雞林平生不隔同年面中歲難禁惜別心歸見耆英定相問只言閉戸萬山深贈宋省元巍薦經義宋秉孫廣帥慈之子也治周禮義傑作傳來見一班少年筆力老孱顏根源有學皆堪味首尾無瑕孰敢刪工要前篇人易取説須兩段意相關森森天骨晶光縹去必軒騰十二閑八月驟寒秋欲中分暑更袢金風崛起便成寒桃笙夜展猶嫌執狐向朝披便怯單翻手炎凉眞可笑循環造化果無端老來一任添霜縷寒暑難磨只寸丹中秋無月已孤前度一中秋滿望今宵月下游藥杵放閑靈兎懶鏡奩掩却素娥愁知誰有術擎梯取枉費當年弄斧修天靳清明毎如此樽前休恨翳雲浮示兒用許廣文韻斐然狂簡不知非席㡌何時免誚譏官様詞章惟典雅心腔理義要深幾各隨鵬鷃高低適一笑雞蟲得失微偶未成名兒勿恨我方追悔蹈文闈鑒空閣鑒空閣上賞僧軒祗樹深開不二門一水横流界平野數峯突起補前村舟來舟去人多事潮落潮生岸有痕鎭日長閒輸老衲倚笻獨坐古榕根文溪集巻十六

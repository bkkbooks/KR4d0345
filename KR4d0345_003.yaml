  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0345_WYG_003-1a, image: WYG1181/WYG1181-0131a.png}
body:
  text: 文溪集巻三宋李昴英撰序重修南海志序志州之土地風氣莫先於表其產之良以矜式生乎後之士此一書大綱領也唐賢相起炎方者三曰韶之張曰日南之姜最後得劉瞻於湟是時閩聚猶未有此然皆竒拔於支郡筦府以廣名甚大山偉海鉅秀靈鳩凝又遲三四百載菊坡翁始名在白麻臥龍蒲澗之阿勤天使走半萬里莫能致古未有命之相不屑者髙風全節可興百世是邦宜有紀載以俟太史氏而久焉猶缺帥方公大琮檄張君雷震曰邱聚不修且四十年矣郡文學爾職盍討論潤色之乃視故府延問老成人分授以凡例使各以其見聞述然後合而叅訂是正焉壅䟽漏袽誕去實存又布之衆使疵瑕咸以爲精當乃已南國一大典獲寓目其成何幸余何敢渉筆其間乎惟廣素號富饒年來浸不逮昔而文風彪然日以張雖蕉阜桄林之墟蠣田蠏窟之嶼皆渠渠齋廬幣良師以玉其子弟弦歌琤相聞挾藝待試上都者數甚嗇每連聨登名與中州等惜人士重於簦笈逺遊所以發其身秖鄉舉一途故仕進者鮮雖然中天地而立爲世所珍必有卓然殊於流俗者窮逹不論也匹夫匹婦以一行稱於鄉皆可書或高顯通貴而泯淪無聞幢節來南前後凡幾清名媺政照圖牒有幾人使仕此而州志之觀其孰無强爲善之心哉亦扶持世教一助也若曰山川之扁兵賦之額鳥獸草木之名而已耳焉用志淳祐七年四月朔職方氏李昴英序方帥山判序吾儒本領在所學而發用在所筆心正則筆正矣平居辯經疑破衆史百氏誤以祛天下後世惑此筆也其至外服則鋤惡束姦䘏窶伸枉片言分兩造之曲直此筆也時有用舍用有内外而所學所志無不行方公藩嶠南晨出㕔事吏擁連牘牛腰然森立庭下次第而進不竟不已晏且暮不知也落筆絫千言原情據法必曲必盡雖刑之奪之無怨第一義則厚人倫羙風俗故道化孚暢所部大治一判出佐屬爭手抄久焉所編鉅廼彚分而梓於寄來者稽焉知學校兵防財計之本末與炎人之情僞習尚能推行其説流惠益逺矣公治廣之懿固不專在此而五年目力心思大槩聚於此泯沒可乎判可稱者唐香山我朝武溪然拘牽儷對或未能盡寫其意公之判斡旋頓挫隻字不茍眞可爲吏師世方纎巧詩詞新集㨗出在在有眞可醬瓿此刻皆及物實功不腐宜哉西疇常言序孝以顯親爲大先訓之善而世無傳爲子安乎立言如河汾猶不免六籍奴婢之譏有福畤分宗辯類至今膾炙人口盱江何公坦憲嶺東折姦洗貪風力凛凛難犯余以廛民見則溫其和氣有古君子典刑既一紀過淩江涂之人多談郡糾賢葢其子鑄也捧公所著常言來試閲無艱深可怪語誠如所編其書者叅以聖賢儒先論議則愈讀愈有味學焉治焉此其紀綱於世教非全無禆不但可私藏家淑後而已糾曹睹手澤愴然謹布於刻昌其傳繇是心而充其公其㢘其勤必能率父道矣或謂韓筆獨歩有唐雖根銀之癡而書不坐是廢也噫千載所共師尊如昌黎代能幾士稍出其類平生學力豈盡無所得他人且歎雞肋矧必箕必裘而忍髙閣束之耶有是言西疇未必聞有是子西疇將不朽糾曹可謂能顯其親矣孝哉孝哉游忠公鑑虛集序代君子立言不獨以書傳也茍於世教無闗於人國無禆不過組篇鏤句落儒生口耳雖或可託姓名以不朽而萎然無復生意矣子雲邃於元不如更生攻外戚一䟽子厚雄於文不敵昌黎論佛骨一表葢其言用舍係當時安危千載下猶使忠臣誼士聞風而興起尚論古人大節爲先不專在言語文字間也果齋游公年少長負竒節在東西州爲名進士官幕府時騰書制總條列戎情民病自立已崖然孤高紹熈癸丑以小朝士言五事首曰隆孝德反覆推明天理冀感悟上心且謂退宰相不以禮給諌論駁不行姜特立不當召入陳源不可親信明年夏五籲天乞車駕省重華辭皆激切乞先以身膏鈇鉞踰月國有大故上下洶動公折簡忠定趙公趣斷大計寧皇以太后㫖履寳位人心始安多公力也然侂胄浸用事公屢諷忠定早爲計不能從朱文公去國復抗䟽乞留積爲權姦所忌忠定被逐公即丐郡歸言者指爲黨魁至誣以從㬰異圖將䧟竒禍幸秖罷免久之以薦得利路節逆曦包禍憚未敢發宻謀代之公聞亂髮植眦裂遣子若友約制閫諸人起義藐無有應者兵勢披猖人爲惴惴又不肯避吁其瀕於死者幾矣方忠定秉國最為雅故僅班六院且閲月十有九日不遷嘉定更化異時號僞黨者皆超擢不次公力請掛冠而得祠諸賢言狀纔進一秩夷攷其平生出處未嘗希進至於遇大事敢言臨大變不怵死生禍福不入胸次葢愛君愛國發於至誠無一毫邀譽之心諒乎其爲忠也余昔參滇蜀見公之子景仁期以逺器薦之力歸老海濵景仁時時相問如一日比走書來示以公遺文俾序其元余耄矣思涸筆枯恐不足以發潛幽張芳潤竊謂文以氣爲主猶林茂而影稠鐘巨而聲逈非可强而致公從諸老㳺學粹飬洪充之浩然可塞天地筆下流出自無軟腐語詩律尤老勁深詣理妙如世荒耽齊竿士弱同楚囚羣枉儻未杜誰正君心非靡靡工雕鏤何益眞儒事頑裏訂身三昧得䝉中飬正一心虛等語亦非顰呻敲推軰所能到也景仁紹定間以直言不合去再入論思愈峭拔不詭随忠公教忠之訓不孤矣王晉公謂吾不作兒子必作納君於善者有後豈誣也哉公字子正鑑虛其自號也代李守作栁塘詩序士處沉鬱頓挫之極不能無酸楚憤激之辭三閭大夫醉濁一世長沙太傅溷視餘子豈惟貽媢流汙著此胸次適自累耳逹人大觀等是非於夢蝶悟禍福於塞馬行廢委之命公論付天下後世未始怨天尤人幽圄重爻圍厄絃歌浩如也故履患難而安栁塘陵君守興寧如子思罵賊如顔杲卿羈窮重困吐不平之氣於詩累累成集覔余着語余謂䧟圍中復棄官流落蜀湘間繫臺獄貶黄斥惠徙海外氣味略同然感時寫物之章則皆渾涵隐婉襟期軒閎可以遊造化狎宇宙毁譽榮辱𣺌不容滓高矣哉余敢以二賢之所飬廣栁塘之見代李守作汀郡諸寨圖序閩宼根汀蔓邵禍於甿最烈至煩朝廷顓大閫調大兵余扈戎環其境則山獰劒鋩戰人睫湍怒㦸聲豗人耳雖激釁繇吏不良亦風土致然安平時猶有桀孽藪其間兩郡比壤舊各列巖卒籍虛援遥猝遇刼􅐁莫能禦招捕陳公以邃猷竒略鏟凶滌穢一道晏澄必欲長杜亂萌廼探狡窟俯梟巢分築營堡而軍其壯悍者度地邇逺量屯多寡使氣勢連属相應如常山蛇樓鼓遞鳴鎧仗齊出䑕軰將無所容蹟慮亦永矣是役也清漳判佐陳君乘之庀其事觸熱履險不畏勞募士必好身手剏柵皆竒靣勢月閲三以竣事吿余得其圖觀之喟然曰賢者立大規模可利百世亦須强敏人任責乃克辦韓魏公招闗陜兵有屬官薛向乘傳料理今元戎傅君此行葢不下薛也吾郡䝉成實多喜而筆諸帙首送潼川憲胡元琰序君所命臣所敬致其身而已矣士見理明而後臨事果惟知主恩重而身輕國事重而家輕名節重而禍福利害輕故犯可畏辦至難而安蜀之將壊也名家豪族槖百珍航千指下瞿唐惟恐臯不幸而蜀果殘親戚墳墓便如隔世始而悲漸而怠久而忘結屋訪田姑東南乎寓亦其勢然朝廷勤西顧徃徃擇才於其土使就經理自是無隻輪敢向難於上青天果然耶胡君景玉蜀於產栁於牧已脫產地久樂郊夫誰不懐其安乃逢人感慨有申包胥必復楚意天子壯之命繡衣仗斧使於潼即奮然杖而西豈計穴中虎子䝤儂桀横時余襄公帥桂奏曰賊在東而徙臣西詔經制廣西東盗賊即疾趨南海葢勇於赴鄉國之急者君是役略同而所遭艱余嘗一接論議爲人膽略必能負擔問之蜀士謂厥居孔道大敵幾過門皆相戒莫敢犯數千里瓦礫突然魯靈光德於人又可知西人望之如父母君視之猶子弟忠聲義槩豪傑作興必争出死力救井里折哨騎全蚕叢將有吉語聞孔明盛心處在開誠布公臨分特爲同志贈送趙新班崇垓序我朝恩公族厚度越古先計偕寛其額科級升其名闕簿先其注至於薦狀登格而後易京秩則儕之庶姓何哉葢繇此等而上之外則郡守部刺史焉内則爲郎爲卿爲公無所不可者任益以重係生民休戚益以大故必嚴其所從入之途使自砥礪職業以求知於其長而恩不得施焉祖宗之意何其深長也宗室子落南海僅數十其英英者崇垓以唐身言書判選觀其人皆卓然優然第進士二十年始通金閨籍積其所至治最以得之非若世之假權力脅人以薦已者將西候班見余知其可與爲善也勉之曰富貴如浮雲俄頃變滅名節則日月也可千萬古光明漢宗盟有爲宰相者人雖齒牙之不得更生列九卿而諫䟽鯁鯁至今不朽吾子自此升矣請擇於斯二者送陳公儲序名容所齋孟子謂士之豪者異於凡民何謂豪浩然之氣之充也餒其中而放於禮法之外若晉之人是反中庸無忌憚也焉能豪陳君公儲才氣豪一世百家九流之説無不通古今天下事事物物必䆒極所以然長章巨篇傑壯竒詭酒酣氣張急取墨汁作千萬丈龍於尺素間雲蒸雨飛天垂海立騰驤夭矯幽怪潛見疑前身豢龍氏役風馭霆盡䕶角鱗之族故能逼眞如此所至相追隨多可人而學之所到心之所存人未必盡知之葢抱負偉而志未信政屈賈沉鬱無聊時方汗漫塵表有軒軒自得意胸中定力兹可騐矣詩焉畵焉託焉耳一日我知得與朝廷大論議䟽上累百不止即走筆作歌行手也其豪爲剛擁百萬重兵止旗鼔分合之鏖隂山之北纓單于頸凱還玉門闗即觧衣盤薄寫龍時意思也其豪爲勇豪之禆人國不細狂者進取聖人所予或以是歟余於斯人敬之深其將如京師而來别也語之曰君當蘧伯玉知非之年而克己功夫過之愛助何言惟勤飯以厚氣之豪踈飲以夀氣之豪送周士元序貧無以飬由也傷之菽水盡歡子謂之孝士之身於貧甑釜塵簞瓢空安處而無求焉固也若夫半菽不充親無歡顔未免皇皇奔走以追斗升豈獲已哉余館清漳逆旅邂逅寧德周士元問其來愀然曰雙親耄矣缾無儲粟不遥千里將控諸誼人而未遭也樂歲聞之人仰事不足之歎不覺涕下執其手語之曰子處人所未嘗之貧而爲人所不能之孝因至貧而至孝著焉使子有二頃田侍兩安輿庖猩熊裘狐貉以順適其志則子之職盡而孝之名何有是如臨難捐軀而得忠義名非幸也夫孝者誠之發誠至則天通地感况人乎世固有擁厚資家垂白猶健以備甘㫖之奉者見子之來必忻然同志舉千金以賙子身羙官戱綵娛侍以遂禄養之志者見子之來必懽然錫類輟三釡之餘以贈子子姑持此誠以往必有誠於孝者應如膠漆如符契矣子其行紹定庚寅月正李昴英序送循州余法掾仲宣之官序幼學壯行一命皆可及物三尺法係人死生忍背所學惟上官喜怒狥哉余少日游泮與余仲宣爲最宻友淵乎其蘊藉精乎其踐履眞可嚴敬短窻孤燈話到夜半每謂我輩得行所志必惠利生民爲先余仕媿前君後十年决科乂四年爲循陽法掾天將大其任故厚其飬如此余以著局歸班即扁舟送過靈洲臨分曰殘夏當之官子盍言余應之曰疇昔所講論仕以行其學當官奉法無高下其手有不平必争争不得則去是即他時定大議臨大事之推自諉官卑纔一事放過將終身悔其何追國朝嶺服人物秖説二公襄自君家好様菊坡逺業亦發軔於梅仲宣勉旃送糾曹吳雍之官序自于公以治獄興其門世遂有故縱以覬覦後福者君子不可無辯也夫于公謂未嘗有所寃者曷嘗以有罪爲無罪哉特不以無罪爲有罪耳笞其當笞者墨其當墨者大辟其當辟者至盡得其情實而無枉雖戮其身而無怨事事皆然其爲隂德已不細有後宜哉故罪疑惟輕可也事白而出之爲惠姦宥過無大可也故犯而釋之爲黨惡存心過於寛固盛德事然殺人者獲免挺刃必交於途奪于貨者弗治剽攘必紛於市姑息於一二貽害已千百惡人多幸而善良懼如此而能昌其子孫天意殆不其然鄉大夫吳公純臣溫厚有古人風祥刑于嶺之西以恕稱子雍是似且甚秀爽來訪于文溪之上且别焉問之何官曰新糾曹又問賞之逐瘴之犯何也曰初心欲有所平反以成先志耳余嘉其志而贈以言曰吳氏父子視于氏父子官崇卑不盡同而再世俱典獄子惟清惟明惟平小大之獄本其情無以私意有所重輕必身享駟馬髙葢車之榮矣送判縣楊侯汪中入京序公論消長與世道俱大道之行也夫人不失其是是非非之心之天豈惟大廷賢不肖若白黒閭閻之匹夫匹婦好善而惡惡皆斷以理之正不以一毫私意參其間汙世反是以大佞爲大忠以至貪爲至亷士窮逹有命焉寧以是休戚而闗於人之國大矣菊坡先生老於鄉余與楊侯日撰杖屨起居言動必見必聞縋城罵賊同部入幕侯清白於氷玉有闗西夫子風天知之先師知之宰廬陵之政若士若民安之平生壁立萬仞不稍下賣菜傭飛語蜂起或者竟投杼焉夷而跖之渭而涇之他人不能平侯謂官職儻來耳泰然不以蔕胸中所飬未易涯也貧驅復入京余送之江皐曰朝廷清明公論自定不疑之金必有能辨之者侯笑而已侯名汪中吳蓽門杜詩九發序草堂詩名輩商評盡矣反覆備論爲一書者葢鮮莆田吳君涇思覃句中意索言外尋音響泝脉絡舉綱目工部胸襟氣象模寫曲盡皆前人所未到余味之雋永深歎其用工之精戸掾余君得藁維桑捐金鋟梓葢深於杜詩者謂是編不可無也足未萬里途不讀萬卷書莫讀杜詩信哉文溪集巻三

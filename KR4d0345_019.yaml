body:
  text: 文溪集巻十九宋李昴英撰詩餘水調歌頭題舫齋郭外足幽勝潮入漲溪流舫齋小小一葉老子日遨遊管領白蘋紅蓼披戴綠蓑靑蒻直釣任沉浮玉縷飽鱸鱠雪陣狎沙鷗箇中眠箇中坐箇中謳箇中收拾詩料觴客箇中留休羡乘槎博望且聽洞簫赤壁樂處是瀛洲日月盪雙槳天地一虛舟水調歌頭題斗南樓和劉朔齋韻萬頃黄灣口千仞白雲頭一亭收拾便覺炎海豁淸秋潮候朝昏來去山色雨晴濃淡天末送雙眸絶域逺烟外高浪舞連艘風景别勝滕閣壓黄樓胡床老子醉揮珠玉落南州穩駕大鵬八極叱起仙羊五石飛珮過丹邱一笑人間世機動早驚鷗水調歌頭夀叅政徐意一地位到公輔耆艾過稀年幾人兼此二美而况是名賢松栢蒼然長健薑桂老來愈辣勁氣九秋天鯁鯁嬰鱗語不改鐵心堅説武夷同此月瑞三仙公雖居後瓌奇偉特却光前續得紫陽脉絡了却西山事業舟楫濟商川飲對黄花榭一酌歳三年水調歌頭題登春臺野趣在城市崛起此臺高誰侈蓬島馮夷夜半策靈鰲十萬人家甃碧四面峯巒湧翠逺峙拍銀濤插漢筆雙塔簸兩葉輕舠我乘風時一到共嬉遨江山無復偃蹇彈壓有詩豪寳劒孤横星動鐵笛一聲雲裂寒月水宫袍滄海一杯酒世界𦕈鴻毛念奴嬌夀王守母瑤池髙會見雲香鳳背風柔鶴膝天遣月卿來拜舞新拜璽書増秩有母能賢生兒如此總是前身佛孫曾戲綵慈顔一笑閒逸曽向渾尺軒中共評今古手寫王言綍箇裏廼翁棠䕃在映得梅仙山碧人愛黄堂祝萱堂夀拍拍歡聲溢明年宣勸蟠桃大棗庭實念奴嬌寳祐丁已閏四月偕十友避暑白雲寺麥秋時候薄陰罩炎日山行乘興笻屐追隨多勝侣青珮黄冠方領坐石談𤣥聽泉濯暑直上千山頂倚風長嘯籟鳴林谷相應忽湧雲氣漫空海吹急雨覺冰練微冷洗盡人間名利障便是蓬萊仙境半日偷閑一生清福豈在榮鐘鼎青燈深夜陶然獨妙清聖瑞鶴仙甲辰燈夕玉城春不夜映月璧寒流燭蕖光射鰲山海雲駕擁遨頭簫鼓錦旗紅亞東風近也趂樂歳良辰多暇想陽和早遍南州暖得柳嬌桃冶堪畵紗籠夾道露重花珠塵吹蘭麝歌朋舞社玉梅轉閙蛾要且蠒占先探蔗郎戲巧又卜紫姑燈下聽歡聲猶自未歸鈿車寳馬沁園春監司元宵招飲不赴纔到中年節物渾閑賞心頓輕據隨分東風瓶簪柳雪應時燈夜棚綴蓮星自一家春也三杯酒巧蠒堆香笑語聲又何須聽那西樓絃管南陌簫笙平生黄巻靑燈肯珠翠奢華八尺檠欲趂隊閑嬉雕鞍寳馬囘頭猛憶破案嚢螢鄰曲漁歌庭除鶴舞塵外冰輪徹骨淸人閑處這炯方寸一點長明滿江紅江西持憲節登高作薄冷催霜碧空豁飛鴻斜度重九日御風絶頂下看塵宇滕閣芳筵牋筆妙龍山勝餞旌旗駐料山靈也要可人遊成佳趣吹㡌墮羞千古題字非吾侣却坐間着得煑茶桑苧萬里寒雲迷北斗望逺峰夕照頻西顧且滿浮太白送黄花劔休舞滿江紅和劉朔漢節亭韻人似梅花峭玉立歳寒風節新圃闢種梅千樹幻成南雪池碎瀑聲荷捧雨徑涵秋影篁篩月喚石君錯落坐庭前紅塵絶嫌刮耳秦筝戞慵着眼俳優狎但一觴一詠放懷開濶湧地池亭工掩映擎天柱石覘施設待枝頭金顆可調羔休輕折菩薩蠻別劉朔齋後寄詞時朔齋抵峽山拾遺詞至雲山疊疊雙眸短夢魂夜趂行人逺千里共襟期吟風飲月時碧溪穿翠峽雪意蓬蕭颯安得翅飛來衝寒同訪梅漁家傲重着夾羅猶怯冷隔簾拜祝團圓鏡取片龍涎安古鼎香閤靜横忩寫出梅花影寒鵲鸇枝飛不定囘紋刺就更籌永小玉欣眠呼不醒霜氣緊麗譙吹動梅花引西江月小鷁載池心月長虹跨水中天主人情重客留連便欲乘風寒殿霜竹且傳秋信鏡蕖不作春妍夜凉正好倒金船朔飲而今再見浣溪沙筍玉纎纎拍扇紈戲拈荷葉起文鴛水亭初試小龍團拜月深深頻祝願花枝低壓髻雲偏倩人解夢語喧喧城頭月和廣帥馬方山韻贈斗南樓道士靑霞梁彌僊工夫作用中宵晝㸃化無中有眞氣長存童顏不改底用呵摩皺一身二五之精媾積得嬰兒就試問霞翁二田熟未還解飛冲否文溪集巻十九

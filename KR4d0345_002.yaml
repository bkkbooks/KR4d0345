body:
  text: 文溪集卷二宋李昴英撰記元老壯猷之堂記唐合四管疆西道而大府部自爲東一當四廣莫可知水數千里旁午必趨灕東下清海一大都㑹葢天造地設也鎭治雄壓粤連偪後城兩浦臂挾之尤勝者石栁子厚饗軍堂記謂治城西北陬泉池如在林壑彌望極顧莫究其往黄髪相傳即此地握穗騎羊之仙幻五石其前老夫臣故臺之山闖睥睨送青入巨石竛竮倚池立如呀如傴如蹲如舞疑海神揮巨靈擘崑崙鞭驅之來狗脚朕强以月峽珠池號石君終傲兀不肯得本朝名人題刻其間益重嘉定壬申有堂於池之北扁壯猷者架以脆耎成之遳劣怒風雨殘剥之久而莫之葺帥方公大琮治一路視其家据案勤文書至於日中昃無倦胸次有方壺處浩穰紛綸中益競爽從頌意行偉境之倔竒而陋堂之非敵也命毁撒徙去除榛穢展其狹走畚鍤起其卑規模巧出心匠匠伯巧圖位置不敢秋毫之差千夫砉其斤風争奮鋭騁拔棟隆崈其鰲立梁􅝦蟉其虹跨椽嶟嶟瓦濈濈欲飛動入霄漢綺䟽闓敞文甃縝緻躡數級而前楹又進數級始堂亷藩以濬房殿以邃閣望之嶽嶽也即之閎閎也遊焉近而息焉閟也尺其從百有十而衡八十有四堂之北蒼莨玉立千箇風月無盡藏旁築梯城路二幪複屋而上有亭東曰連天觀閣凭虛引覽則逺峰竦煙霏翠㝠濛濕晴空野濶溪長琉璃田渺千頃西曰先月樓臺於圓牖中見層樓擁喬木宛其桂影婆娑與廣寒宮隐映堂之南運石洲大湖甲品列于前七竒㧞端凝可敬可友修廊翼如演迤紆紓以夷繇散屨東凡二十有七間西羡一焉運甓齋饗軍堂對敞其上存古也界池矼方橋聫絡之穹欄横檻若長龍飲泱漭爪鱗撑拒輪奐四面相繆碧渥彤融交煜可鑒偶彩榭爲舫舲艤歩上下水木芙蓉浮游出橋之南登對越亭則橋以北渠渠躭躭之屋盡成罨畵堂東北隅又廊遶燕寢之背過東園梅桂蘭菊所至而有隨物態着小齋短軒曲折丈室行窩雅有壺翁橘叟趣妙巧無以踰之若夫曠垠衍沃登閎曷奕則西園專羙倣彿乎秘林木天但未知海上三山玲瓏五雲之宇何如爾有大賓客則張具横陳歌樂遞作堵妓圍棚優狡縹緲乎幔亭之集􅋖也軍有勞則竿魚旃熊旂威㽔垂雲戚柲櫜䩨森肅乎後先元帥戎服中坐諸將俯伏拜庭下跼蹐就位鼓磅硠然士伍鞮鞪鎧扞俛聽號令無譁徐觧緑沉黄間席地于廡行以列甚整澠酒坻肉滂浪脂腴莫不浹匝屬厭轟騰乎魏博之歡雷也花時無禁邦人羣敖争先㡌桐之耋騎竹之稚韶妝縵裳之麗遍繡臺館秋千蹴鞠姱嬉老榕髙栁邉雜遝乎滁亭之游人也公於財用愛惜錙粒出不妄凡可以新羙炎邦被無窮者則傾倒弗靳是役也最鉅且完固可堅乆非茍焉欲速成比厥費無算皆撙縮之贏乎出民未嘗勞其勞故樂其樂停杯説軍府者咸曰丕哉鑠乎州自漢初以來未有此也于以抗颶毋伏天吳瘴霧蜃氣一洗空之豈徒靡曼赫戱駭𣅿南人哉按州志蔣公之奇嘗隅城築石屏臺湮沒無復遺迹龔公茂良闢廣平堂來者潤色之常如新二公皆十連兩地後之有人心者好惡則甚公公天粹其姿渾涵歛圭角立朝特勁敢言清名厚德重一世天子久倚公哯嘔葭萌調虞猺蠻治聲休其稱最行且入爲明堂一柱是堂也將與潞國之德威韓魏公之畫錦俱不朽額曰元老壯猷之堂沿舊名而廣益之也客曰公其以方叔自况乎公曰不然夫一之謂元先覺之謂老正大之謂壯而猷道也能正而一是聞道先乎人可以爲師帥矣留南垂五年幸士民熟信而相親驗之政揆之心粗無愧是道也嘗聞之諸老不敢不勉且有望於後之主此堂者進此道以福此民也老以齒言膚矣客曰唯淳祐六年正月德慶府營造記髙皇帝受命中興億萬載鴻業基於康州得爲府宜與國初之應天並官府非壯麗無以重龍藩鎭侏儒菌蠢然已非稱欹弗支鏬弗補豈惟風雨之憂抑國之羞邑賦例郡家自督庸資吏貪肥已安得餘力及土木雖德慶踰百年仍昔之康耳鄞馮侯光裒左魚來駕左朱喜其俗醇眞用古循吏法摩以簡静民各安其天而心化徐索財計源柢廋斯抉滲斯窒汎斯裁贏斯絫鋭欲起百廢而力副其志廼撫廼址廼才廼工故陋撒去盡而新是圖儀門闢棨㦸嚴麗譙巍鼓角壯外爲雄樓縣永慶軍扁而雙門其下宣詔頒春之亭翼然東西向犴院與敖倉皆二鼎鼎峻整藩屏之體貎隆矣閣焉宸章煥殿焉素王儼廡焉從祀序講堂宏宏櫺星崈崈射有圃童有校又相攸香山下流泉㶁㶁注其前収攬竒勝著貢院數十間由是青衿思樂乎芹泮白袍踴躍乎棘闈士氣張百倍矣除地壙百畆如坻閲武榭彈壓之鼓行旗舞行陣以疾徐進退軍威暢千里矣廟城隍而飾其像邃嚴殊詭靈赫馮依以福其土人所以敬神也近郊侈驛邸來迎往餞高車大駟息焉所以禮賔也城之外西北隅限以闗莊逵畫如枰各華表其衝憧憧者知所趨所以使民不迷也亭西山之麓碧溪帶環事隙一登眺領僚佐舂頌觴詠其間所以與邦人共樂也幾人傳舍眡茍秩終去官帑未嘗羡役百興費萬計兹不見其窘庸者受欺貪者自欺不能者與不爲者之失均清白守秋毫必公家用而財足以自辦顧何事不可爲侯睟然德人望之已可敬䟽通而宻察事大小悉中節葢天姿近道者銜右大夫蕭然如韋布生胸中古今流筆下璀璨可觀則其緒餘耳若士若民若走卒交頌不容口賢哉教授鄭君夢翀書來俾識營繕次第昴英曰東南旺氣聚興王地雲龍五色常鬱葱亘天臣子任藩翰寄鋪張發揮當極其崇大今輪奐突其干霄雘碧煜其耀日山川改觀可以占國祚靈長尊國大節也宜特書淳祐二年夏五月朔朝奉大夫直秘閣主管建康府崇禧宫李昴英記羅浮飛雲頂開路記嶺以南之山長羅浮一島浮海來㳫于羅傳疑昉漢地志竅通句曲茅山聞之老隱豈盡誣負抱大標韻高若張崔人品以越產重天下偉矣始隱桃稚子又丹稚川巢其間日以夥蜕觧枯寂之流不書所至有佳泉怪石竒植瑞羽忽如雪片棼員散飛林谷蝶也忽如天孫斷織大練下垂瀑也忽如垂雲揜日隂亘數十里喬木也山行者沿人迹所易及已應接弗暇飛雲頂兀四千丈十步九折其下陵深壑暗無底足蠒心悸輙尼興中畫故至者鮮天子賜趙侯履於惠得䕶名山銜命醮祭已亟領客排叢薄陟崒巉或屏軒朱榰曲末仰扳千歲藤延縁毅往俄身在山巔飃飃然坐鵬背御長風宇宙茫茫八極一眡某州某山髣髴可指㸃雲氣猝起衣袖莫認對面侯竦然曰眞靈境也觸石膚寸不崇朝而雨徧嘻其是歟路之不治來無以棲爲地主羞之黙識所經行地勢折旋歸而指畫授其屬相險易取便㨗補䧟闕隘夷峭曲直設横木櫛比級而上迎轄脂納屐齒乗月衝雨俱可詣每歴一峯望之壁立層躡徐以進不覺其爲峻遂成通涂亭于衝要五少憇亦占勝概平麓曰屐雲峒戸曰僊春鄺僊石之前千玉樹横斜明葩異馥仙種非人世有曰梅花村路中分處度短磵小石室砑其傍蔚蒼周遭曰横翠過朝眞石石磯砥焉横出俯見大小石樓椀盂覆萬阜曰拂松最上峯築庵五間宿好事者俟雞一嗚觀燭海曰見日費於俸材於山工於庸作此山千年未有事刻期而成勝士朋來于于綸巾羽服跰躚若遨仙山中人謂創見戴白席地飲瓦盆村髫拍手歌熙然無懐大庭氏俗太守與衆樂也此路既開闢人人有飛雲分無復蓬萊弱水歎彼縣壺叟僅引長房入壺中狹矣且計及久逺别菴於見日左延山老王寧素以居買田歲得五十緡入食其徒使好看客時時省道路壊必葺非若駕箸之梯擲巾之橋神幻頃刻而已今世版圖中名山之大者幾適境内有之而曰無與治殿最姑舍是可乎侯了公家事則整寓趣佳山水則暇改觀豐湖祠先賢十二晞高趨正眞有古心三踐朱明洞抉幽捜隱収之吟篇略盡風骨不凡超然立塵表宜胸中丘壑如此昌黎好竒登華山絶峯不能返縣令百計取之乃得下使先有令如侯鑿通綫路豈誤翁至此哉余半生夢羅浮是歲再遊逍遥乎登臨誰之賜歟侯名汝闕雪廬其自號云淳祐五年十月南海李昴英記并書義鹿記端平之元夏五朔府帥曾公縱鹿二於白雲山昨歲六月十日菊坡先生夀公物也始豢之郡圃攸伏既入層林薈翳間噳噳得所猶屢顧不忍去逾月邦人爭爐瓣薌祝初度頌聲讙雷龢氣熏春方稱觥公堂鹿雄雌追隨繇城北隅復遄繞旂幢呦鳴伎躍如舞已去四十日詰屈二十里是胡為來若五仙羊導之萬衆詫詡屬某筆一叚奇事夫物各性其天惟至誠能盡物之性樂忭百獸信孚豚魚不期然而然公莅廣其政仁眡民物不二推俸傾槖廩饑賑窮充是心將使飛潛動植咸若鹿嘗侶西歸龜鶴來處已不凡矧圃賢牧德㝢中宜若是誼古循吏白鹿隨車豈誕且誣物戀戀不忘人心愛懐又可知矣然公非姑息爲仁狌鼯嘯林鯨鯢舞海稍出竒略一網成禽鉏姦束猾弗宥毫縷固異夫内欺校人惠而不知爲政者云公名治鳳字君輝清源人番禺李昴英記詩隱樓記何謂隱自適其安而已廬人境而襟物表奚必蹈高遯逺哉吾友昭武黄君希聲工晚唐詩游五羊獲登菊坡先生門因築舍其旁前爲重樓俯坡山控越岡萃堵坡童童如䨥筆書空樹林逺近罨畵成圖碧瓦差池玻璃千頃地據三城正中四靣平逺故宜樓掲李杜寫眞貯唐人詩巻至人寄目天末擁鼻風前一景物之歆一興趣之味盡入句眼方其㑹心得意且不知身之樓居而何有耳之市聲耶字樓以詩隐其志也或謂昔人之市其隐者君平以卜伯休以藥詩則未聞葢紅塵浩蕩中未免催租人至非灞橋雪中驢上何處有詩余則曰心有動靜地無喧寂阮籍竹林之遊王戎後至籍曰俗子來殊敗人意戎謂如卿之意政易敗耳此山林而動者賈浪仙鍊敲推二字觸京尹前導而不知此城府而静者詩隐主人其浪仙後身乎矧才高志大不止嚬呻痛癢屬者頑童呌突菊坡起帥鄉部繡使彭公督師銜宻畫往來其間迄清亂略閑則詩人用則國士潛雖伏矣亦孔之昭希聲自此不得隐矣希聲名鏞其詩有樵溪初藁云端平丙申元日夀安院記天地之大德生而已所以無終窮生意不息而已凡物囿形其數之自然慘舒其氣之使然彭殤椿菌固不容强齊亦各正性命焉大君位乎中妙贊化育分羣有司代天工要使生意流布充滿覆載間無一物不得其所國朝置福田院恤窮疾與天地同一好生常平倉專使領爲凶荒疾疫設將以救民病而或者反以政事病民今天子軫逺方元元選物望民庸兼者畀右司劉公倉氏節公一意推廣皇澤進耆老諏之曰賦過重痏吾民歟役不均瘠吾民歟官吏饕朘吾民歟追呼數惱吾民歟豪斷椎剝吾民鬱不吐歟聞一事繋戚休亟罷行不終日南人如觧沉疴積痼豁然甦快無復愁嗟公猶以爲未也廣山寛海鉅嵐霧𣪚泄故無瘴土饒醲鮮細人恣屬厭亦易疾鰥寡孤獨之窮川浮陸負之賈馳書傳檄之价纔病於主家旅館則畏其累已廹遣之往往轉徙閭巷雖受病本輕而不粒不劑且風且露困頓久必僵廂邏又視爲竒貨重誅求於死所爲邦人害最大公惻然傚東坡在杭蓄錢糧作病坊故事乃相爽塏址於威逺門之内穹堂閎閎嚴禱祠香火幹僧其左醫局其右修廊渠渠對闢十室可容十人男東女西界限有别病無依者以吿隨得入診必工藥必良食必精烹煎責兩童緇必恪日欲聞所苦重輕課醫之效募夫婦願俱庸者共凡役庖斯整湢斯潔百爾器用色色具奄奄無聊頼之人忽處廣厦適眠飱所需如意頓使神醒氣伸居養所移半藥力既康强則資之歸脱不可療則歛瘞如法租収之田贏取之庫所入足以當所出畫爲成規可行之悠久外峙崇門曰夀安顔其院因人情所欲也扶曳來居無虛日全活甚衆人病之者既能厝之安天病之者亦欲拯之生公之心無愧於兩間無負於吾君矣夫人爲三才之一仁人心也與天地心本不二如果核中有仁生意在焉惻隱其端不特發見於孺子將入井時雖草木禽獸之㣲萎瘁不得寧其生亦憫焉動念病栢病橘病馬病鴟杜詩韓筆且不遺而况於民吾同胞乎茍其位其力可以利衆庶而呻吟呌呼在吾境若不聞良心安在哉公可以爲仁人矣葢元祐相國忠肅公其六世祖也家學源流有所自來公名震孫字長翁渤海人文溪集巻二

  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0345_WYG_002-1a, image: WYG1181/WYG1181-0124a.png}
body:
  text: 文溪集卷二宋李昴英撰記元老壯猷之堂記唐合四管疆西道而大府部自為東一當四廣莫可知水數千里旁午必趨灕東下清海一大都會蓋天造地設也鎮治雄壓粵連逼後城兩浦臂挾之尤勝者石栁子厚饗軍堂記謂治城西北陬泉池如在林壑彌望極顧莫究其往黃髮相傳即此地握穗騎羊之仙幻五石其前老夫臣故臺之山闖睥睨送青入巨石竛竮倚池立如呀如傴如蹲如舞疑海神揮巨靈擘崑崙鞭驅之來狗腳朕強以月峽珠池號石君終傲兀不肯得本朝名人題刻其間益重嘉定壬申有堂於池之北扁壯猷者架以脆耎成之遳劣怒風雨殘剝之久而莫之葺帥方公大琮治一路視其家據案勤文書至於日中昃無倦胸次有方壺處浩穰紛綸中益競爽從頌意行偉境之倔竒而陋堂之非敵也命毁撒徙去除榛穢展其狹走畚鍤起其卑規模巧出心匠匠伯巧圖位置不敢秋毫之差千夫砉其斤風爭奮鋭騁拔棟隆崈其鰲立梁􅝦蟉其虹跨椽嶟嶟瓦濈濈欲飛動入霄漢綺疏闓敞文甃縝緻躡數級而前楹又進數級始堂亷藩以濬房殿以邃閣望之嶽嶽也即之閎閎也遊焉近而息焉閟也尺其從百有十而衡八十有四堂之北蒼莨玉立千箇風月無盡藏旁築梯城路二幪復屋而上有亭東曰連天觀閣憑虛引覽則逺峰竦煙霏翠冥濛濕晴空野濶溪長琉璃田渺千頃西曰先月樓臺於圓牖中見層樓擁喬木宛其桂影婆娑與廣寒宮隱映堂之南運石洲大湖甲品列于前七竒拔端凝可敬可友修廊翼如演迤紆紓以夷繇散屨東凡二十有七間西羡一焉運甓齋饗軍堂對敞其上存古也界池矼方橋聫絡之穹欄橫檻若長龍飲泱漭爪鱗撑拒輪奐四面相繆碧渥彤融交煜可鑒偶彩榭為舫舲艤步上下水木芙蓉浮遊出橋之南登對越亭則橋以北渠渠耽耽之屋盡成罨畫堂東北隅又廊繞燕寢之背過東園梅桂蘭菊所至而有隨物態著小齋短軒曲折丈室行窩雅有壺翁橘叟趣妙巧無以踰之若夫曠垠衍沃登閎曷奕則西園專美倣佛乎祕林木天但未知海上三山玲瓏五雲之宇何如爾有大賓客則張具橫陳歌樂遞作堵妓圍棚優狡縹眇乎幔亭之集􅋖也軍有勞則竿魚旃熊旗威㽔垂雲戚柲櫜韔森肅乎後先元帥戎服中坐諸將俯伏拜庭下局蹐就位鼓磅硠然士伍鞮鞪鎧扞俯聽號令無譁徐解緑沉黃間席地于廡行以列甚整澠酒坻肉滂浪脂腴莫不浹匝屬厭轟騰乎魏博之歡雷也花時無禁邦人羣敖爭先帽桐之耋騎竹之稚韶妝縵裳之麗遍繡臺館秋千蹴鞠姱嬉老榕髙栁邉雜遝乎滁亭之遊人也公於財用愛惜錙粒出不妄凡可以新美炎邦被無窮者則傾倒弗靳是役也最巨且完固可堅久非茍焉欲速成比厥費無算皆撙縮之贏乎出民未嘗勞其勞故樂其樂停杯説軍府者咸曰丕哉鑠乎州自漢初以來未有此也于以抗颶毋伏天吳瘴霧蜃氣一洗空之豈徒靡曼赫戲駭𣅿南人哉按州志蔣公之奇嘗隅城築石屏臺湮沒無復遺迹龔公茂良闢廣平堂來者潤色之常如新二公皆十連兩地後之有人心者好惡則甚公公天粹其姿渾涵斂圭角立朝特徑敢言清名厚德重一世天子久倚公哯嘔葭萌調虞猺蠻治聲休其稱最行且入為明堂一柱是堂也將與潞國之德威韓魏公之畫錦俱不朽額曰元老壯猷之堂沿舊名而廣益之也客曰公其以方叔自况乎公曰不然夫一之謂元先覺之謂老正大之謂壯而猷道也能正而一是聞道先乎人可以為師帥矣留南垂五年幸士民熟信而相親驗之政揆之心粗無愧是道也嘗聞之諸老不敢不勉且有望於後之主此堂者進此道以福此民也老以齒言膚矣客曰唯淳祐六年正月德慶府營造記髙皇帝受命中興億萬載鴻業基於康州得為府宜與國初之應天並官府非壯麗無以重龍藩鎮侏儒菌蠢然已非稱欹弗支鏬弗補豈惟風雨之憂抑國之羞邑賦例郡家自督庸資吏貪肥已安得餘力及土木雖德慶踰百年仍昔之康耳鄞馮侯光裒左魚來駕左朱喜其俗醇真用古循吏法摩以簡靜民各安其天而心化徐索財計源柢廋斯抉滲斯窒泛斯裁贏斯絫鋭欲起百廢而力副其志乃撫乃址乃才乃工故陋撒去盡而新是圖儀門闢棨戟嚴麗譙巍鼓角壯外為雄樓縣永慶軍扁而雙門其下宣詔頒春之亭翼然東西向犴院與敖倉皆二鼎鼎峻整藩屏之體貌隆矣閣焉宸章煥殿焉素王儼廡焉從祀序講堂宏宏櫺星崈崈射有圃童有校又相攸香山下流泉㶁㶁注其前收攬竒勝著貢院數十間由是青襟思樂乎芹泮白袍踴躍乎棘闈士氣張百倍矣除地壙百畝如坻閲武榭彈壓之鼓行旗舞行陳以疾徐進退軍威暢千里矣廟城隍而飾其像邃嚴殊詭靈赫馮依以福其土人所以敬神也近郊侈驛邸來迎往餞高車大駟息焉所以禮賔也城之外西北隅限以關莊逵畫如枰各華表其衝憧憧者知所趨所以使民不迷也亭西山之麓碧溪帶環事隙一登眺領僚佐舂頌觴詠其間所以與邦人共樂也幾人傳舍視茍秩終去官帑未嘗羡役百興費萬計兹不見其窘庸者受欺貪者自欺不能者與不為者之失均清白守秋毫必公家用而財足以自辦顧何事不可為侯睟然德人望之已可敬疏通而密察事大小悉中節蓋天姿近道者銜右大夫蕭然如韋布生胸中古今流筆下璀璨可觀則其緒餘耳若士若民若走卒交頌不容口賢哉教授鄭君夢翀書來俾識營繕次第昴英曰東南旺氣聚興王地雲龍五色常鬱蔥亘天臣子任藩翰寄鋪張發揮當極其崇大今輪奐突其干霄雘碧煜其耀日山川改觀可以占國祚靈長尊國大節也宜特書淳祐二年夏五月朔朝奉大夫直祕閣主管建康府崇禧宫李昴英記羅浮飛雲頂開路記嶺以南之山長羅浮一島浮海來沓于羅傳疑昉漢地志竅通句曲茅山聞之老隱豈盡誣負抱大標韻高若張崔人品以越産重天下偉矣始隱桃稚子又丹稚川巢其間日以夥蛻解枯寂之流不書所至有佳泉怪石竒植瑞羽忽如雪片棼員散飛林谷蝶也忽如天孫斷織大練下垂瀑也忽如垂雲掩日隂亘數十里喬木也山行者沿人迹所易及已應接弗暇飛雲頂兀四千丈十步九折其下陵深壑暗無底足繭心悸輒尼興中畫故至者鮮天子賜趙侯履於惠得護名山銜命醮祭已亟領客排叢薄陟崒巉或屏軒朱榰曲末仰扳千歲藤延緣毅往俄身在山巔飄飄然坐鵬背御長風宇宙茫茫八極一視某州某山髣佛可指點雲氣猝起衣袖莫認對面侯竦然曰真靈境也觸石膚寸不崇朝而雨遍嘻其是歟路之不治來無以棲為地主羞之默識所經行地勢折旋歸而指畫授其屬相險易取便捷補陷闕隘夷峭曲直設橫木櫛比級而上迎轄脂納屐齒乘月衝雨俱可詣每歷一峯望之壁立層躡徐以進不覺其為峻遂成通塗亭于衝要五少憩亦占勝概平麓曰屐雲洞戶曰仙春鄺仙石之前千玉樹橫斜明葩異馥仙種非人世有曰梅花村路中分處度短澗小石室砑其傍蔚蒼周遭曰橫翠過朝真石石磯砥焉橫出俯見大小石樓碗盂覆萬阜曰拂松最上峯築庵五間宿好事者俟雞一嗚觀燭海曰見日費於俸材於山工於庸作此山千年未有事刻期而成勝士朋來于于綸巾羽服跰躚若遨仙山中人謂創見戴白席地飲瓦盆村髫拍手歌熙然無懷大庭氏俗太守與衆樂也此路既開闢人人有飛雲分無復蓬萊弱水歎彼縣壺叟僅引長房入壺中狹矣且計及久逺别菴於見日左延山老王寧素以居買田歲得五十緡入食其徒使好看客時時省道路壞必葺非若駕箸之梯擲巾之橋神幻頃刻而已今世版圖中名山之大者幾適境內有之而曰無與治殿最姑舍是可乎侯了公家事則整寓趣佳山水則暇改觀豐湖祠先賢十二晞高趨正真有古心三踐朱明洞抉幽搜隱收之吟篇略盡風骨不凡超然立塵表宜胸中丘壑如此昌黎好竒登華山絶峯不能返縣令百計取之乃得下使先有令如侯鑿通線路豈誤翁至此哉余半生夢羅浮是歲再遊逍遙乎登臨誰之賜歟侯名汝闕雪廬其自號云淳祐五年十月南海李昴英記并書義鹿記端平之元夏五朔府帥曾公縱鹿二於白雲山昨歲六月十日菊坡先生夀公物也始豢之郡圃攸伏既入層林薈翳間噳噳得所猶屢顧不忍去逾月邦人爭爐瓣薌祝初度頌聲歡雷和氣熏春方稱觥公堂鹿雄雌追隨繇城北隅復遄繞旗幢呦鳴伎躍如舞已去四十日詰屈二十里是胡為來若五仙羊導之萬衆詫詡屬某筆一假奇事夫物各性其天惟至誠能盡物之性樂忭百獸信孚豚魚不期然而然公蒞廣其政仁視民物不二推俸傾槖廩飢賑窮充是心將使飛潛動植咸若鹿嘗侶西歸龜鶴來處已不凡矧圃賢牧德宇中宜若是誼古循吏白鹿隨車豈誕且誣物戀戀不忘人心愛懷又可知矣然公非姑息為仁狌鼯嘯林鯨鯢舞海稍出竒略一網成禽鉏姦束猾弗宥毫縷固異夫內欺校人惠而不知為政者云公名治鳳字君輝清源人番禺李昴英記詩隱樓記何謂隱自適其安而已廬人境而襟物表奚必蹈高遁逺哉吾友昭武黃君希聲工晚唐詩遊五羊獲登菊坡先生門因築舍其旁前為重樓俯坡山控越岡萃堵坡童童如䨥筆書空樹林逺近罨畫成圖碧瓦差池玻璃千頃地據三城正中四靣平逺故宜樓揭李杜寫真貯唐人詩卷至人寄目天末擁鼻風前一景物之歆一興趣之味盡入句眼方其會心得意且不知身之樓居而何有耳之市聲耶字樓以詩隱其志也或謂昔人之市其隱者君平以卜伯休以藥詩則未聞蓋紅塵浩蕩中未免催租人至非灞橋雪中驢上何處有詩余則曰心有動靜地無喧寂阮籍竹林之遊王戎後至籍曰俗子來殊敗人意戎謂如卿之意政易敗耳此山林而動者賈浪仙鍊敲推二字觸京尹前導而不知此城府而靜者詩隱主人其浪仙後身乎矧才高志大不止嚬呻痛癢屬者頑童呌突菊坡起帥鄉部繡使彭公督師銜密畫往來其間迄清亂略間則詩人用則國士潛雖伏矣亦孔之昭希聲自此不得隱矣希聲名鏞其詩有樵溪初藁云端平丙申元日夀安院記天地之大德生而已所以無終窮生意不息而已凡物囿形其數之自然慘舒其氣之使然彭殤椿菌固不容強齊亦各正性命焉大君位乎中妙贊化育分羣有司代天工要使生意流布充滿覆載間無一物不得其所國朝置福田院恤窮疾與天地同一好生常平倉專使領為凶荒疾疫設將以救民病而或者反以政事病民今天子軫逺方元元選物望民庸兼者畀右司劉公倉氏節公一意推廣皇澤進耆老諏之曰賦過重痏吾民歟役不均瘠吾民歟官吏叨朘吾民歟追呼數惱吾民歟豪斷椎剝吾民鬱不吐歟聞一事繫戚休亟罷行不終日南人如解沉疴積痼豁然蘇快無復愁嗟公猶以為未也廣山寬海巨嵐霧𣪚泄故無瘴土饒醲鮮細人恣屬厭亦易疾鰥寡孤獨之窮川浮陸負之賈馳書傳檄之價才病於主家旅館則畏其纍已迫遣之往往轉徙閭巷雖受病本輕而不粒不劑且風且露困頓久必僵廂邏又視為竒貨重誅求於死所為邦人害最大公惻然效東坡在杭蓄錢糧作病坊故事乃相爽塏址於威逺門之內穹堂閎閎嚴禱祠香火幹僧其左醫局其右修廊渠渠對闢十室可容十人男東女西界限有别病無依者以告隨得入診必工藥必良食必精烹煎責兩童緇必恪日欲聞所苦重輕課醫之效募夫婦願俱庸者共凡役庖斯整湢斯潔百爾器用色色具奄奄無聊賴之人忽處廣厦適眠飱所需如意頓使神醒氣伸居養所移半藥力既康強則資之歸脫不可療則斂瘞如法租收之田贏取之庫所入足以當所出畫為成規可行之悠久外峙崇門曰夀安顔其院因人情所欲也扶曳來居無虛日全活甚衆人病之者既能厝之安天病之者亦欲拯之生公之心無愧於兩間無負於吾君矣夫人為三才之一仁人心也與天地心本不二如果核中有仁生意在焉惻隱其端不特發見於孺子將入井時雖草木禽獸之微萎瘁不得寧其生亦憫焉動念病柏病橘病馬病鴟杜詩韓筆且不遺而况於民吾同胞乎茍其位其力可以利衆庶而呻吟呌呼在吾境若不聞良心安在哉公可以為仁人矣蓋元祐相國忠肅公其六世祖也家學源流有所自來公名震孫字長翁渤海人文溪集卷二

body:
  text: 文溪集巻六宋李昴英撰奏議端平丙申召除太博賜金奏劄臣聞與治同道罔不興與亂同事罔不亡善覘國者惟觀諸此人主以其履之身措之天下質之理蔽之心焉道侔盛際庶幾同符事襲衰季將至合轍考古驗今斷斷不易有天下者宜知所决擇也恭惟皇帝陛下資不世出志大有為五三登閎一蹴可到然欲祈天永命而雨血告妖如晉承康識者有劉石之憂欲復恢境土而戎馬踐淮如宋元嘉江右凜荷擔之懼襄峴失而江陵孤三山潰而䕫門危祖宗區宇將半陸沉億萬生靈重罹塗炭大勢日蹙通國懼亡自去冬以来然矣陛下自視今為何時反觀行事果皆通治之道否耶夫勢之安危反掌易置理之當否亘古不移陛下儻若慨然於興王之規模惕然於亡國之龜鑑必蚤夜以思凡是理所安人心所同者皆治之基也則如趨康莊不可趦趄而進凡壊常戾正咈衆狥已者皆亂之階也則如避䧟穽惟恐詿誤其間聖賢明訓若掲科條設違其言罔不取敗臣謹昧死為陛下陳之酣嗜峻雕未或不亡此謹身之戒也陛下嘗因明禋之天變而撤樂嘗以誕節之震雷而輟宴葢深自警省矣是或抑畏於遇災之時恐易怠忽於已私之累縵立望幸之衆易至移人天錫飲量之洪寧免過度作無益則玩物䘮志營不急則宴安易懐錫賚之數無涯宫庭之費不㑹此衣布冠帛之時毋曰貴為天子不得一舉手足也此坐薪嘗膽之時毋曰惟辟福威玊食也陛下儻念三陲之民轉徙無依必不忍適一已之安逸儻思多難之際日不暇給必不肯汩聖躬之清明媿脱簪之諌周室所以中興堅覆觴之志晉元所以再造此豈甚髙難行之事哉無法家拂士者國常亡此用人之戒也陛下選拔言官多采直聲或俾再入間由外擢其寄耳目也重矣而切於救國者疑其矯激忠於報上者謂其好名絶江而歸無復諭留之虛文與郡以出似非優待之美意何以奬犯顔之直氣已頓殊導諌之初心年来人物凋謝存者幾何正當愛䕶豈堪頓挫不容過闕致抱没身之恨朝野悼嗟皆有殄瘁之憂守輔郡者人方喜其名而成命竟寢贊幕府者衆皆惜其去而列疏未俞聖主本無厭薄忠良之心中外竊有疎忌賢者之惑陛下儻念國所以存僅此一脉必使臺諫得以盡其言儻思强本折衝在乎衆正必使莊士得以伸其氣衛多君子國未可量汲黯在朝淮南寢謀豈無益於人之國哉亂其紀綱乃底滅亡此守法之戒也陛下非不恪遵先朝之成憲而干請為撓非不故使臣下之奉命而威令漸輕給舎繳建節之濫而終莫回大臣進除擬之目而不盡用近習乗間而宫府非一體旁蹊捷出而政事或多門宸札叮嚀鬬虎未分制書符移束閣弗顧賞罰無章功罪奚别法制不立軍伍豢驕朝廷之政本未清軍國之威權幾䙝自昔陵夷鮮不由此無紀綱而周之祚微有憑藉而唐之命永可不監哉四維不張國乃滅亡此厲俗之戒也陛下欲洗濯士心而意向未明欲旌崇節義而風厲未至權臣孽息褒榮加渥羣憸雖斥簡記弗㤀上之好惡或偏下之趨向必異昧進退之義者不恤人言倒善類之戈者勇犯不韙挾敵自固欺誕無忌求得欲縱躁競愈滋平居習為頑頓無恥之風臨難必無仗節死義之士國何利焉尚名節而東都之祚延賤名檢而典午之禍作可不懼哉閱興亡之大無出於四者安危之機當决於一心陛下以今之為合古之法跡其所以致治監其所以召亂者取舎殊途瞭然而易見也我高宗皇帝間闗六飛基圖萬載中興鴻業貽謀具存焦思先吾身之詩放宫嬪損服御之詔諌官所言多寡置簿以考靣對不及闕失降秩以懲大臣勒令内品責軍令狀而上為改容親筆戒以軍法而外閫震恐謟䛕之人不使厠身於班列振拔名節以起士氣之委靡宏規懿範最為切近陛下有志中興能循髙宗之治法則亦古之治法矣臣願陛下赫然發憤幡然改圖念祖宗土地不可尺寸與人厲披輿地圖之志毋使人有幾如是而不及郢之歎當如炎紹之初敵至必戰毋悠悠歲月而自誤於不可信之和也大臣開誠布公鞠躬盡瘁屏常程之碎務以澄心静慮移堂除於吏部而一意籌邉當如李綱以去就争天下大計毋徒曰鎮之静也士大夫當如宗澤所謂非臣子安居美食之時共攄主憂臣辱之忿各辦趨事赴功之心毋徒覩風景而感慨也邉臣當如劉錡所謂背城一戰於死中求生而併力拒敵毋徒靠撒花以為緩圍之䇿也君臣上下共惜分隂共商緊着日課其事月計其功常若勍敵之在前常若禍至之無日庶幾無秋髙塵起之倉皇而取襄葺蜀固淮之規模立矣臣區區憂國之心不識忌諱陛下裁赦取進止公未奏劄子間上曰前此五羊之寇卿能縋城諭賊可見膽略公奏云疎逺小臣辱陛下簡記豈勝感激公奏第一劄讀至愧脫簪之諌周室所以中興上曰多事之時正當以中興為法讀至贊幕府者人皆惜其去而列疏未俞上曰日来士大夫多尚虛名而無實用公奏云名者衆之所推予也亦宜留之以慰物望與其使之在外不若使之在内讀至臨難必無仗節死義之士上曰士大夫全少氣節公奏云亦在上之激昂耳嘉熙戊戌銜命勉諭崔相囬朝奏劄臣聞儲才宜預捜才宜博雖書生之常談實今日之急務也强敵挻禍浸淫累年去冬之變尤可痛心歩騎纔二千而潼益不支哨馬或數百而淮郡已震碎我城邑糜我赤子其来莫拒其去罔追非彼實强由我自弱國之無人甚矣臣嘗妄論洪水懐襄而伯禹能平之虎豹犀象而周公能驅之自古無不可為之事荆尸後勁而敗於鄢陵鄋瞞長狄而敗於宋魯自古亦未有不可制之敵茍得天下之竒才斯能就天下之偉績田單一逃難者耳守區區即墨而復齊七十餘城祖逖一司州主簿耳以千人廩募衆鑄兵而自河以南復為晉土非天下之竒才孰能辦此陛下近命臣韡兼制淮右布着已定機括已回沿邊將士前日之勃鬱者今吐氣諸寨豪勇前日之怨怒者今屬心臣韡亦當以單逖之功名自期求副陛下專委之隆江淮重寄體統漸有所歸列障廣莫分任須令可託代郡邊吏或當科𤨏翰孰可代先科其人洞開胷襟容納衆長以為輔車之助此大閫責也廣設網羅收拾羣豪以備重弓之需此朝廷事也淹恤百里猶晦鳯棲低回治中未展驥足州縣豈無遺才草廬卧龍深識時務褐衣捫虱劇談方略山林豈無遺才茍徒采取於目前不思蒐索於度外毋乃示人以狹乎臣願陛下明詔大臣於朝薦紳進人才之外申命諸路帥守監司各舉堪充沿邊任使者不拘限員明著其狀如先儒所謂某人能吏也嘗因某事以知其能之意博參公言精加考察或寘之殘破之地以觀其經理或處之風寒之衝以觀其禦防不以資格拘之不以繩束待之必有非常之才出建非常之功矣柳開以文士請兵果能制契丹之部落虞允文以儒者視師卒能成采石之駿勲安知今無若人乎惟陛下與大臣圖之取進止讀至非天下之竒才孰能辦此上曰天下事有人才便可為近日更張帥閫卿亦知否公奏云陛下區處得宜切中事機讀奏劄畢上曰右相有來期否朕自更化之初簡在朕心儀圖共治渇欲一見公奏云臣崔與之遐方一老辱陛下殊常之遇但高年乆病而又道逺恐未能上副陛下延佇之意上曰聞其年事雖髙體力尚强可勉為朕一出公奏云崔與之居家庭之間或可以勉强渉道路之遠恐難以驅馳上曰卿近得書否公奏云此月初旬得二月十六日書云云上曰可作書道朕切望之意勉其亟就道以共圖匡濟之功公奏云謹當作書諭以聖意嘉熙已亥著作郎奏劄臣聞天變狎至所以仁愛人君也人言交進所以忠愛人君也天惟不言故告戒寓於灾異臣當盡言故論諌出於憂危均為悟聖心之一機均欲扶國脉於一綫人主於此大惕懼而進徳不已廣聴受而改過不吝則積憂啓聖一言興邦未可量也不然天人方愛助之厪在已無畏警之實則上下之望孤而莫之救矣若曰天變不足畏人言不足恤此王安石所以誤先朝者在今日可不深戒哉恭惟皇帝陛下聰明生禀厯數躬膺聖學精微聖度恢廣將與盛帝顯王而比隆葢非中才庸主之可及皇穹眷命乆而彌篤羣下歸戴誰忍負之陛下亟思所以仰承天意而俯惬人心可也然自往歲以來飛㢘動威回禄扇熖雨雹流沴旱蝗為妖怒濤浸逼於都城列緯數愆於舎次一警之不悟而咎證疊見焉屢譴之不悟而大變異出焉是仁愛之已極且轉而為震怒矣畏天之威于時保之陛下所以應天者當何如哉敬天之圖未必見於躬行親禱降禮乃及期而遽飭醮祭之繁文若為感通竒衺之異教無乃瀆慢古人慮女謁之盛而剪爪自責庇勳舊之罪而席藁南郊於嚴恭之際未始狥虛文也陛下非無應天之念也然灾至而懼既乆而忘能保此念之常堅否乎諫紙来上邇臣直前輪班敷陳投匭徑逹上而規切於清躬下而枚列於缺政公論以為是則衆論無異詞前日以不用去而来者亦不敢嘿是忠愛之所激雖批鱗有所不顧矣人之多言亦可畏也陛下所以聴言者當何如哉拔山去佞猶或疑其心違如羮之和尚或議其貎厚邊臣輕視於朝廷言者凡㡬而玩䙝猶故宫掖不㑹於費用論者非一而節約未聞在昔御史條奏則宦寺亟歸於故郡一言感悟至謂髙廟神靈使之於聴納之際未始留難也陛下非無聴言之明也然顧問雖詳施行實少能保此明之常新否乎夫天人之際本無二致人君之心當主一忱積此忱以消變推此忱以受言上下感通悉本乎是今天下之勢亟矣吾國正憂元氣之壊强敵尚稽綏服之期兵弱財殫境蹙民散自非陛下發一悔心以感動彼蒼奮一勇心以主張公議將恐天下見異而魯以衰仗馬俱瘖而唐以亂豈不大可懼哉臣願陛下充此悔而持之以敬不容一息之怠荒民天民也念轉壑之可憂職天職也毋旁蹊之捷出陟降常在於左右戒懼如對於覩聞以吾之心合天之心庶可以轉禍而福矣充此勇而行之以公不容一毫之私意言及缺失不憚於改行言及貴近母過於回䕶以伸衆正之氣以杜羣枉之門即一人之心合千萬人之心庶可以易亂而治矣機括既回精神立起一念之烈旋乾轉坤猶之窮冬千林摇落一氣纔復何物不春力量大則功効速天下尚烏有不可為之事哉疎賤瞽言觸突睿聰惟陛下察而赦之第二劄臣聞邪正之用舎國家之安危繫焉於君子不可以過疑於小人不可以偏信蓋君子直道以行骯髒難近而臨大節不可奪者斯人也小人詭遇求獲柔佞易親而誤天下國家者斯人也武帝不悦汲黯而黯能寢淮南之謀成帝雅厚張禹而禹竟稔西都之禍人主於用人之際可不鑒哉陛下無私如天地至明如日月臣下賢否如辨白黑可謂有知人之哲矣然於取舍不暇計也不然豈不容嘿之多後福何苦為是强聒哉陛下可以察其心矣以得罪公論去以不愜物望去僅一二耳或楥麟周章而穹班非據或城狐依憑而美職如攜竊意陛下不過信其無他腸耳信其無顯過耳彼之操心惟知貪冐於寵榮而已於人國無益也萬一利害怵乎其前安保其不易所守哉陛下亦可以察其心矣今正論稍伸正氣漸復政隂陽消長之機也臣願陛下公道宏開私意盡克收人望重朝廷以示聖徳之廣大逺庸邪清班列以彰聖斷之剛明則衆賢協和同心同徳共壯國脉共起治功尚何孤立之慮哉惟陛下留神文溪集巻六

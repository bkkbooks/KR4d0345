body:
  text: 文溪集卷十二宋李昴英撰祭文祭許象州文維淳祐十年歲次庚戌二月朔越祭日門人朝散大夫李某謹以清酌告於近故判府朝議鈍齋許公先生鈍齋之學本源一誠文最近古誠之著形政先及物誠之流行問無不知惟誠故精事至能應惟誠故明誠則無欲氷蘗自清誠則無營軒冕甚輕師道自任南海橫經曽入範模一一玉成士德之深共祠之黌至今朔望羅拜於庭絃歌東管課試始程亦崇厥祠書閣峥嶸菊坡西山皆極口稱才可經綸位不公卿既踰七帙乃僅雙旌輟俸廪士食續貢英藻飾泮宫百廢並興米入斛減鹽出衡增寧捐公家以寬遠氓曽未期月洋乎政聲老不廢卷細書如蠅斯文之厄泰山俄傾志未盡伸用未及宏夫人惜嗟而况諸生某少撰杖屨早蒙旦評誨猶藥石愛猶父兄猶記厦旃薦公姓名年貌幾何清問親聆未幾去國竟負師承靈輀來東酹灑涕凝返築未能何敢不銘伏惟尚饗祭鍾子鴻文維年月日朝散大夫直祕閣李某敬奠於故友堂長祕校子鴻之靈潮號士區君名最早昻藏標度磊磈胸抱天文地理瞿曇莊老博識其書妙處精到桂湘閩浙江淮蜀道名山古迹窮極幽討文窺先秦詩軋郊島長章巨篇奮筆一掃小奚蹇驢輕裘短帽掀髯揮塵廣座傾倒所至交其豪傑諸老愛如至寶瓶粟屢空充然養浩斗酒孤酌絲桐一操不屑意於科舉趣林泉而髙蹈樂窩之叟茹芝之皓喜方外之散侣對王公而睨傲逹觀大方齊物自號希年少一素無病惱臥才數日遽以訃告幸有諸郎收拾遺藁某三十年間情篤交好日從吾遊研索理奧益者亡矣可勝悲悼寸心惘惘一奠草草尚享祭廣帥右史方鐡菴大琮公文厥今人望若晨星稀公老遠播天復奪之豈惟廣人之悲海內善類蓋莫不歔欷也鳴呼公之學探聖門之微公之文根理窟而竒靜者其性而敬以持暄日霽風接物怡怡見義勇為鐡石不移敢言動天無愧拾遺使部其鄉肯故人私蓋海旗幢前誰五期精神筋力畢竭於兹器古樂成幅巾深衣鄉飲凡三動中禮儀齋廬閎閎書閣巍巍玉女青襟賢哉帥師牘纍千言判墨淋漓兩造息爭曉之片辭雪軫爾寒荒恤爾飢手拊遐氓父母其慈崇堂大榭闢圃東西杖屨婆娑民共敖嬉突兀軍門雄視南維庫曰備安貯緡不資為此州千年計而百廢必治子産之仁校人猶欺孝肅之明吏計得施人知公心如玉無疵大書連篇幾德政碑萬人香火在在生祠蓋信之久德之深不待其去而後思詔徙洪都將以公歸素無病惱一臥不支語音朗然易簀之時面貌如生卒襲之尸所養又可知也某疇昔嘗寮今巢一枝肺肝不隔真切相規商評古今竟日塵揮公不可作何所質疑酒落涕俱世少子期又路祭方右史文輀車東浮兮黃水之灣傾城挽送兮積涕回瀾魚龍泣護海山慘顔惡人多夀兮賢者不使之生還天不可問兮時事愈囏十年締交兮相照膽肝色笑若平生兮夢寐之間羅浮之約付渺茫兮冷月空山想像蒼蚪於炎洲兮一酹招魂墓志銘林隱君墓志銘昔之以卓行名不必皆仕者也懿於一念竒於一節太史氏筆之則聞滅沒無傳亦多矣南海林君鄉曲稱好人焉闓其名端甫其字訥然言頽然貌而所存踰人遠甚不心乎利名不色乎喜怒不耳乎人之過屋闤闠中惡其囂闢隙地於後窠花盆荷觀魚狎鶴寄意塵表或窮年不出户妖卒譟城下官委之登陴執戈為里閭先時窶民窘食指囷以給有述前古吉凶人明驗可為世勸戒者君模本散布費不資不靳已樂善且欲夫人皆為善己不敢為惡且欲夫人皆不為惡用心類如此安然一生七十有一歲而終將以寶祐七年八月甲申窆之於番禺縣峩官山子一人名洪娶余女弟者拜且泣以銘請可書於其人不於其姻曰秉彛之真古之遺民茂其後昆此為種德之根學士林君墓志銘君諱植字建之譜系古汴名閲也國朝南渡初乃先世著作郎佐郎俯始徙其族浮光絶復規莵裘遂定居於閩之長溪厥後簪纓代不乏人如家汴時逮君之曽大父坦隨季父宦遊南海遂之番禺家焉坦生君之王父清臣清臣生君之皇考申早聲場屋為庠序冠冕儷於扶風氏生君甫髫齡敻頴悟暨長娛色養必愈必婉以至於失怙恃哀瘠終喪無嘉容且終其身濡露履霜之思弗少替噫孝已夫孝為百行原宜乎君之行著於鄉咸曰義人也同胞五人有􅜇原急難君屢蹈死弗顧親黨里閈有窶不自賑者有及期不能婚嫁者君罄所蓄賑之兹皆厚於事親故推其餘以往所薄者厚也亦宜使假君以年則強為善當益充惜也其數七七而止寶祐甲寅正月初五日殁於正寢易簀之際作數詩偈皆蛻生死語悲夫君室隴西氏子元申弱冠嗜績文婚於玉牒時漘之女女二人長適豫之長孫亨寶次將笄戊午七月辛酉龜筮襲吉其孤泣血托槥竁於郡之永泰里虎欄之原祔先塋也余識其邱隴銘曰君義人孝天性世茂閥喜余慶宅大宵悶魂永檟栱兮後昆盛雜著韶石説送曲江趙廣文韶盡善之樂也以名州嘉矣名之則昉於唐初去舜之時如此其遠也山有異狀石耆老相傳嘗於此九成焉故石之形肖之其説甚荒唐無稽粵嶺秦始通南巡狩故未必至此然聖人聲教之溥如日月所照霜露所墜粵當舜之世獨不在舜之天地中乎甚矣聖人之德感人之深且久矣後乎舜千有餘歲季札觀樂三歎不已夫子聞遺音肉食焉而不味至於今又千有餘歲而石其思廟其依常隱然在人心舜何以得此於州之人州之人何以不能忘於舜也孰謂州之人非其遺民乎則此石特人心感觸之一機不必致疑可也教授趙君崇禋既模南海禮樂器以文丁奠且將樂於有虞氏之祠以實是州之名好古敏以求之者也舜何人也有為者亦若是此當求之於金石絲竹之外趙君淑諸生而古其心必有道矣淳祐八年二月朔送邵淑肉食者得良客難尚矣象床之諫迹是而心差傾坐之琴人高而行穢欲避正堂夫誰能當况治獄官乎館尤難於客貧者因以貨愚者為所賣卓然自立之人事決之心揆之理得矣彼既無所容其欺假托焉於貨主人之公見偶與彼之私情暗合則人競趨之矣雖身賢而奚以白於人為纍豈細哉余同年生顧君雲仕於時為郡理狴犴事亷平聲孚於吏民三年矣而未聞有客也一日邵君淑來訪銜袖有詩問奚自曰顧君館舍也語叩其隱其來纚纚心敬之不專章顧君賢究所自樹能不以一介輕取與節可尚也他日得其位行其志操守可知行窩將出領可無言以分一中造化心上經綸歸而求之家有餘師贈懷集莫貢士不見莫君瑞應八年忽叩門訪小隱留之對荷花細酌因談懷集産水晶石瑩明特異惜吾邑無能攻治之者列之几案供拊玩清寒照人亦天成竒物也余曰君亦猶是夫一日遇良工具眼稍加琢磋即成美器矣時有龍舟躍至小溪君喜甚舉大白滿引淳祐十年夏五月朔贈香山王公先人與香山王公為莫逆交余兒時撰杖屨侍左右見其情好親密如兄弟先人下世今九年執友凋幾盡獨翁一箇在扁舟遠遠入城敘契闊余適有季弟之戚不能欵曲陪色笑而遽辭歸使人感慨不忍别翁六十有九強健不少衰許明年重來必不渝此盟也贈傳神張森建張材叔以能模寫晦菴翁名江湖間藝工也而多從名公卿遊氣象猶士也非若世之庸手但能看人顔面弄粉墨探理義之精微豈不有得於公之心也哉余曩使建將繪公像問孰能之者皆首稱材叔後致之果竒筆也别十餘年忽來訪山居技益老老益窮南山數千里逐食役役無寧歲蜀僧之靄傳神得妙栁仲塗謂其至藝天與纖無差忒寫太宗龍顔天為之笑寵榮冠一時品題連篇不止一仲塗而材叔至今不遇何耶遇不遇有命焉歸尋舊隱集西山數老宿褒字遺子孫足以不朽孰謂材叔不遇哉淳祐十年端午日送相士朱杞士大夫贈相者之言多譽喜其美已也相者對士大夫之言多佞望其利已也彼此交相悅遂無是非之心俗之不古類如此或薦談相朱翁杞來曰此以其眼得品題於諸老者袖出復齋西山遺墨而信意其見必真守必固試歷指坐客使鑒别則多臧而少否乃心果無所利果無所隱乎忽以將東歸告不贈之覬而言之乞褒字之為惠不費吾何斬懼同乎流俗而不自拔也故不敢從學者題名疏李子先經義知名湖海間尤長於論䇿訓經生固其本色賦友欲師其後場之文無不可者先疏來學者姓名豈若世之有求於人者哉蓋欲知其為如何人耳李子先春叟字也諭鄉飲酒行禮者某承乏此邦愧無善狀惟於風教所關不敢後已涓吉旦迎賔僎介於庠行鄉飲酒將與多士共興禮遜此蓋以古風相期待也禮云禮云豈虛文之謂揖遜升降進退周旋亦可以驗其人平日之所存禮之有儀所主者敬儀之不肅斯焉取斯行禮之日執事者各供乃職在列者各謹威儀頭容必直手容必恭足容必重毋惰以羞於傍觀毋譁以亂我邊豆德音孔昭視民不恌凡我同志敬之毋忽諭鄉飲酒觀禮者某講行鄉飲率由古禮俾邦人皆得寓目焉政有望於相觀而善也動作有法容止可觀執事者固在所謹然觀者亦當整襟正視屏氣肅容攝以威儀共成嘉禮倘或跛倚謔笑是干大禮以自取輕此豈真好禮之士哉觀禮者固欲觀行禮者之敬忽而觀禮者之敬忽行禮者亦於是而觀焉諭洞長文有子曰其為人也孝弟而好犯上者鮮矣不好犯上而好作亂者未之有也善事父母為孝善事兄長為弟犯上是干犯在上之人作亂是為爭鬬悖逆之事蓋人能孝其父母敬其兄長便識道理知名分少有犯其上者既不犯上必不肯作亂大凡世間作犯上作亂底事即是不孝順父兄底人若是孝順父兄底人便不肯做犯上作亂底事有子之言最為親切然人雖至愚未有不可化者監司郡守才見有一二梗化之人便一切待以非類加以刑戮他既冥頑無知而長民者又無以開諭訓誨之使誤入於惡者終無自新之路良可憫也今進爾父老於庭諭以此言爾其歸告鄉黨子弟宜細思父母所生我者須當孝順兄長同胞而先我者須當敬遜則此心和順自不為惡汝等得與父母兄弟妻子同樂官司亦得與田里相安豈不甚美其有暴狠不率者則是孟子所謂禽獸而非有子所謂人也國有常刑後悔無及文溪集卷十二

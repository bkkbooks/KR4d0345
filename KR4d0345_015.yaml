  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0345_WYG_015-1a, image: WYG1181/WYG1181-0202c.png}
body:
  text: 文溪集卷十五宋李昴英撰七言律詩上送高禮部不妄知嚴州從來直氣徑摩空又吐忠嘉忤九重指斥分明人所忌去留諄復上能容淸風慨慕桐江釣異渥新疏竹使筒熊軾一行聊復爾羽儀禁路要䕫龍別陳霆并序永福陳霆客鐵菴方公之館見謂淸謹豫送公之喪至浴日亭下餞以小詩政喜論文子遽歸扶胥之口訪韓碑吟篇佳處南游得行李輕如始至時石友秉心終可托鐵翁具眼逺相期勉旃辦取蘭闈捷四六供官且放遲美廣帥趙平齊拓貢院圍棘千間手拓開帥幢元是箇中來前峰卓卓尖如筆正路堂堂穩踏槐自此鵠袍容萬士渾然龍化出倫魁南州盡說明年好依舊科名得上台癸丑菊坡翁登科送循倅黃必昌之官好風佳月說龍川人喜新來别乘賢才儘優為千里式學今有用四書全黃門祠下揮吟筆丞相嶺頭先著鞭莫但俯睂銜紙尾忍教田里苦顚連白雲登閣白雲捧擁到危巔傑閣翬飛倚半天谷響頗疑吟木客潮回坐見變桑田幾重山隔幾重海一日身間一日仙真樂無如㑹心處林花野鳥亦欣然雲關觀月山間未晚先得月料想城中見較遲海吐銀蟾漸呈露林垂翠影早參差孤輪涵澗安禪處明鏡當空沉籟時夜半衰翁猶獨坐淸光吸盡入詩脾登峽山疾風甚雨長風吹裂碧雲堆捲取銀河瀉下來雨攪犀潭千尺浪煙遮龍窟一聲雷松翁偃蓋巖隈立猿女穿蘿洞裏回舊事蘭亭好拈出婆娑溪曲共流杯峽山飛來殿龍門鑿破碧天池呈佛高峯插翠微對岸鐘聲猶隱耳御風簷角尚如翬二神擇地非著相雙錫騰空向上機此境世間如更有安知古殿不重飛峽山全淸閣無塵明鏡太玲瓏匣向周遭紫翠中地有仙家雲母石天然上界水晶宫通宵如晝溪頭月盛夏回秋竹罅風萬斛客愁都蕩盡一杯聖酒畫欄東同劉朔齊游白雲寺二首衝暑登高人所憚雲韓龍孟樂相從眼窮溟海九萬里身在蓬萊第一峯潮長嶼低帆勢急山回路曲樹隂重日斜移席臨池飲戲掬淸泉解酒容其二勘破禪家最上關掀髯朗笑響千山海門正湧冰輪出昏鼓先催玉節還獨上層巔風浩蕩歸沿小澗石孱顔尋幽本是間人事聊復分君半日間送張子元班見笑掇巍科是管君等間馬上换京官扶搖九萬從今易植立千年自古難多辦衣裘禦風雪緊操維柂過瀧灘中朝知舊如相問試把吟篇舉似看和廣帥宋自牧勸駕韻天將造榜放秋晴南國新逢運㑹亨障礙洞開來試者計偕穩送上華京主人况是梅花宋寓客漸非日色程面見河南已分曉佇聆魁捷響仙城西樵巖巨石卷阿駕半天樵山風景豈虛傳水簾不捲四時雨丹竈空凝萬古烟印石尚存烏利跡問誰曾識紫姑仙我來遊遍登雲谷更借山僧半榻眠送都運陳煒以煩言去鐵漢從來去就輕當年烏府樹風聲福星臨分人安樂濁世如泥志潔淸祠命忽傳姦吏賀歸裝絶少擔夫驚退菴本愜家林興父老攀轅却有情碧霄未到白雲先碧霄瘦藤支我上山腰煙橫逺樹醉眸豁竹引淸泉塵慮澆酒滴松根和露飲茶烹石鼎抱茅燒平生不被利名鎖半掩柴扉聽晚樵送李尉興龍之海豐任書味無窮得屬厭待瓜六載不辭淹乃心雅欲親諸老初筮惟知守一廉毋縱彎弓獵雞犬謹防暴客起魚鹽同鄉同姓鍾情處酌別中秋吸玉蟾送舶使孫叔諧東歸蓴鱸高興趂新秋帆腹吞風湧去舟萬寶集登天子庫諸蠻遮泣海山樓世間顚倒是非夢達者逍遙得失侯歸到家林定重九團欒杯酒菊花浮宴鳴珮亭和趙漕韻數尺飛泉漏隔城寒巖坳處落琮琤懸知勝境無塵到却訝晴天作雨聲一歃不容貪者飲兩峰宜著醉翁行此泉千載因人重曾識光風霽月淸送三舉人并序已酉鄉貢鄰曲得三士甚為之喜玉帳鹿宴有詩已即席和二首歸而別成一首贈三傑之行銅蟾滴硯不曾晴命到通時文乃亨善射定知楊破的力耕必穫稼如京錦旗門巷誇聨薦椽筆春闈又中程擢第三人如下問定將四字語元城贛學鄉飲禮成二首風化之原出泮芹飲循儀禮豆籩陳國中推擇爵齒德堂上獻酬介僎賔主一敬存容自肅歌三樂備意相親粲然應接非觀美所望今人樣古人其二無譁觀者也深衣古典如迂效頗奇放出曦輪行事日飛來捷幟序賔時俎陽便覺春流暢拜爵潛教俗轉移此禮重行應易易邦人耳目熟威儀送子先賢歸南海束書相伴到江西我尚濡留子遽歸輪角難生催別斚刀頭欲折為斑衣功名有分須如意學問無窮更造微若到家林遇奴輩先教拂拭釣魚磯寄贈竹隱李聘君圓沙有此隱君子短褐枯笻自一邱安樂窩中寬宇宙逍遙游處眇公侯逢人皆喜一無忤於世何求百不憂種德已深天必報大兒玉立最淸修翁長子春叟三薦於鄉名士也淸修可敬按通志聘君名用字叔大東莞人少孤侍母雖盛暑未嘗去巾襪德器凝重造次必以規矩初業科舉及讀周程諸書即棄之杜門潛心理學者將三十年人稱竹隱先生公聞其賢就見與語出語人曰吾今乃見有道君子嘗著論語解究明伊洛奧㫖以遡洙泗之源學者傳習之公進其書於朝詔授校書郎不受遷承務郎以旌其高安貧樂道無求於世理宗御書竹隱精舍額賜之祠於邑學同劉朔齊游蒲澗謁菊坡祠曉隨絲轡飯僧坊丞相祠堂一瓣香試問神仙蒲九節何如名德菊孤芳高山仰止堪模楷百世聞之尚激昂我輩此來深有意豈專泉石癖膏肓蒲澗滴水巖觀瀑與可人游五四并快風吹面洗炎蒸鹿巡夾道千章木猿掛垂崖百尺藤石室橫琴淸振玉壺瓢酌水冷調冰瀑簾雨後籠山濶不許塵埃俗耳聽送鑒師住靈洲寺少年芹泮也儒冠底事緇袍染異端孤島一燈開佛屋長身七尺占僧單鐘鳴魚叩隨緣過棹舞鷗飛取次看亭下聽經黿在否石欄搖影碧波寒贈海珠湛老也曾勘破到風幡坐得形枯鬢早斑神子指為真鐵漢江神幻出小金山華亭浪急翻船入葱嶺雲深挈履還香燼未寒行道處蕭森翠竹護禪關送廣東憲陳均二首并序邱漕陳知章抑平民為猺且就刀鋸陳公伸其枉全活甚衆反為所誣遭劾而去十五年間再繡衣幡然一出浩然歸囹空但欲全人命網打誰能避禍機壬巧交攻邪害正丁錢奏免是成非離亭父老遮如堵莫駐春江去棹飛其二我如越雪致狺狺此事牽連亦到君久矣浮名等蠻觸付之公論定蕕薰四知誰不推楊震三已何曾損子文甚欲一行陪祖帳萬山遙隔幾重雲黃士奇㳂檄送其雙親歸閩以詩送之佳哉茂士頗圓機頻到蕭齊對塵揮官長見知因職業人生最樂有庭闈東山至寶身當惜伯玉中年力去非一事說來真可敬來裝罄矣貸金歸贈曾士倬用許廣文韻里閈如君苦績文幾年良玉困炎崑鶚書快甚催隨計鶴髮欣然慰倚門袍緑光華應分有汗青久逺要名存江頭目送西行棹驚起驪龍渴睡昏送演姪三首并序演姪自建來省侍寧化尉闕到將之官作詩警之少年政要識艱難受國恩深早一官著力莫孤先世望從頭細把四書看金蘭益友真同志菽水慈親曲盡歡學取老夫窮意思免教人指袴繻紈其二五常百行異其名腔子源頭一箇誠數馬似愚寧過謹懸魚雖矯却真清寬和愛衆衆同愛驕倨輕人人所輕詩好何如勳業好旗常元不載詩聲其三一同休戚尉相關肉食那容職曠瘝驗視難真防木刻追擒易誤戒弓彎千尋樹看萌芽始萬里行從跬步間大抵窮通皆定分炎門邪徑莫躋攀文溪集卷十五

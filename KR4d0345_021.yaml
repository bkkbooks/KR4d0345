  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0345_WYG_021-1a, image: WYG1181/WYG1181-0230a.png}
body:
  text: 文溪集卷末附録郡城忠簡祖祠堂記孫際明撰宋咸淳九年紳士請於郡祀先公與菊坡崔先生合祠元人因之明興敦勵名教崇尚德賢祀事益謹嘉靖十五年丙申闔郡舉人倫諫梁津李鸞曽貫周懋德黎民表等以合祠湫隘不足儼崇奉肅表章建言於僉憲李公默曰忠簡公古今師表請特祠會城以示風厲都院錢公如京韙之卜基城西官巷付郡守鄒公守愚創之郡丞程公鐸成之按院王公德溢書李忠簡祠扁於門學憲吳公鵬重修宋理宗御賜久逺堂南方間氣扁於堂有司春秋俱以丁後三日致祭與周濂溪陳白沙二先生同日舉行萬厯二十八年庚子中貴李鳳來吾廣𣙜稅祠築為稅廨士論不平布政督學袁公茂英二十九年三月備牌行府即喚李氏子孫推擇老成謹厚者親董其役於社學舊基自捐俸與贖鍰修復二十九年辛丑四月初三日始至三十年竣事首臺門次儀門兩廊由廊而進曰南方間氣堂中八楹左右共十楹背傍三面屏以板壁從板壁後入築砌甬道兩傍植柏二株為久逺堂先公像妥焉兩廂房為子姓書舍從廂房內進過一丹墀為誥書樓上閣下楹藏先公碑刻原像樓外餘室為奉祠者所居右傍隙地列構小房為子姓應試公館其前面鋪屋則祠之香火所從給也祠坐坎向離背枕朝臺面臨珠海左控粵王故宫右引榕寺巍塔仙湖九曜隱映簷前穗石坡山輝騰檻外禺峰東峙苛苑西開誠足奉妥先靈矣顧自萬厯辛丑至今厯年僅五十兵燹之後無屋不摧祠遂無存茂草荒烟可勝歎哉宋李忠簡公會城祠復賜田記琯朗採黃衷矩洲文集增入衷南海人宏治進士終官兵部侍郎字子和夫士之道惟德與功國之報惟爵與祿後世之尊信而崇奉者惟祀事是故士非抗榮望於當時而能永尊信於後世者蓋寡矣宋侍郎李忠簡公敬義以居其德忠節以昌其氣文藝以發其奇立朝之正儲二之論憸相之斥幸璫劾京尹引裾犯色擯落罔恤於汀之靖劇患於鄉之縋城弭亂於閩之捐俸以賑於贛之罷官酤置常平嚴保伍而民戴其惠峒酋安於導化而天下郡邑趨良吏之風親喪雖終猶居墓次纍詔而不起為師清獻制心喪焉此其功德之大都耳封番禺開國男凡食七邑賜田如千頃新安大奚山其一也逮我疆場吏政龎敝田沒於豪右祠翳於海珠有位者若弗聞也嘉靖丙申闔郡舉人倫諫梁津李鸞曽貫周懋德黎民表言於李僉憲默曰忠簡公古今師表今海珠之祠鞠於榛莽將母以示憲請祠於會城風教可興矣李曰吾責也以付郡守鄒守愚曰吾責也即城西官巷之官地築堂三間拜亭閌域稱之督府錢公如京韙其舉郡二程鐸任其成巡院王公德溢大書揭於閌吳學憲鵬大書揭於堂役昉於丁酉八月迄已亥秋九月而落光儀儼然工制顔翰咸極精麗王仍括河南官渡之資歲閏輸於祠預葺也時鄉豪有私大奚田者且自實於官窳吏曰官田也盍鬻諸公裔孫潯州太守翺比以禮部郎報政及家奉公遺囑暨邑籍可覆案者進白於王先世錫田不忍棄也敢固以請王曰義哉其割百畝以歸祠祭餘可計值而有耳王以憂去聽於清戎察院即今大巡陳公儲秀也業已報允然稍難於巨值諸鄉大夫按司馬溫公計康節遺宅故事寓書於陳舉人黃延年吳允裕趙鶴隨拜竟其詞陳曰義哉移於蕭大參晚陳少參世輔議再上於督府若大巡姚公虞乃汰其原值之半翺得罄槖以從事於是斯田悉登前籍之故矣姚復檄新安縣卜以兹山形勝特營祠竪坊以彰名跡扁曰錫田餘業庶村翁野竪歲時伏臘知䖍事云衷曰屬豫服兹役也因廣其良知者四焉夫進德修業所以鳴世也吾是以知文溪髙爵重祿所以勸世也吾是以知宋治祠籌田畫往返纍牘而不越乎義吾是以知秉彛翺也竭資戮力纘舊緒以傳先美盛德之後必昌且賢吾是以知天道是為記家廟成通省士夫祭文維大明嘉靖七年歲次戊子孟冬己亥朔越十三日辛酉同郡後學晚生黃褧區燦黃佐鍾善經梁廷振倫以諒方茂夫江宇吳允裕馮徽陳中誠招宗廣趙鶴隨費秉等敢昭告于宋龍圖閣待制尚書吏部侍郎兼翰林院學士監修國史番禺開國男食邑三百戶諡忠簡李公曰於維先生海邦鍾秀星耀垂祥生也非偶第及鼎魁文章之首立朝不隨律已無疚忠孝義勇聲光宇宙前修典型後學山斗嗟我秉彛瞻依良厚遺像豐碑子孫世守勒之贊詞手澤猶舊祠宇未奉孰執其咎三台髙岡奇峰延袤僉曰祠之庶幾妥侑主之者誰斯文領袖匪為其私實裨風教卜吉於兹聿新堂構樂奏希音禮稱𤣥酒如見精神降陟左右尚饗郡城祠有司春秋祭文惟公豐功茂德照耀史册流風餘韻啓我後人名教所關實切企仰今兹仲春秋謹以牲醴用申常祭公其鑒之修復李忠簡公海珠祠像記賜進士出身翰林院編修文林郎兼經筵官同修國史增城湛若水撰文賜同進士出身廣東按察司僉事吳興顧應祥書丹賜進士及第翰林院國史編修南海倫以訓篆額正德十有二年三月之望庠生甘生劉生陳生拜進其言於憲副汪公曰學相朝紀時維小子罔聞知嘗交於李忠簡公文溪之孫庠生達元獲講其世蓋公世系在譜牒勛業在國史文藝在本集罔敢有攸述仰惟公之懿德大節發身鼎科立朝以正追斥安石乞正儲二去嵩之奸引裾抗疏劾盧董二宦落職而不悔曰忠喪其親築室終制於墓若終其身纍詔不起曰孝乞歸制服心清獻之喪立師傅之道曰義幕於汀奮身諭賊以其守免贊閫清獻縋城入諭賊壘出白刃下却摧鋒之變而逺之廣郊曰勇提舉於閩捐俸賑饑活人之命守贛置常平罷官酤嚴保伍以為民安曰惠屢進屢辭蚤能以其身退曰廉夫斯六行者君子之所以立身也忠簡備焉足為生人之表固宜里置血食焉以彰鄉先生之道况海珠公之築也而下帷之地也其寺田公之所置守也其祠置洪漕使從邦人之請公也乃反忘本而浮屠焉徒據甚非所以繼往而示來也仰惟明公風化是務復菊坡祠於南庠增飾文山祠於五坡學相朝紀等誠不揣冒昧以言惟明公其圖之公曰鋐職也何辭乃撤其居而新之肖其像而妥靈焉數百載之廢墜一朝而復於是陳侍御言扁顔之毛侍御鳳請典祀之黃僉憲昭申董之劉憲副伯秀資助之王僉憲大用設門役以守之魏太守廷楫先後贊襄之番禺王知縣澄經營之祠以地主寺以祠存復舊也汪公曰事已不可無記記必於湛子或謂觀吏部霍進士韜亦曰必於湛子若水曰義也吾不可辭郭太保總戎勛曰子其無辭焉吾謹有供麗牲之碑督市舶牛大監榮至則曰復舊以明義也因為加飾之嗚呼兹非忠簡公六美之實先得乎人心之同然而能起人心於百世之下不期同而同然者乎祠成公儼然臨之在上於是奸邪之臣觀之將愧其忠薄子觀之將愧其孝師友操戈者觀之將愧其義懦怯於難者觀之將愧其勇殘剝之吏觀之將愧其惠貪進而無恥者觀之將愧其廉而後之忍心於廢興者觀之將愧修復之諸君子也愧之何如修之而已然則是祠也其立教之本歟因為迎送神辭三章俾歲祀而被之樂歌鼓之舞之以盡神悵靈蹇兮多修服六美兮孰儔燦雲漢兮以為章招箕尾兮與同遊既容嫻兮多姱永貞則兮服休靈不來兮豫愁悵獨立兮中洲右一靈之來兮駕𤣥武乘北風兮下土先朱鳥兮前驅左蒼龍兮驂白虎薦溪毛兮𤣥尊明德馨兮簋簠呼天吳兮總干紛江靈兮起舞右二日窅窅兮西沉雲冥冥兮霾隂四無畔兮莫杭靈胡去兮駸駸悵獨立兮容與羌神往兮形存猗神往兮𤣥武服兩驂兮入寒門瞻雲錦兮恍象將天飛兮莫豫遺言慨莫聞兮豫顧馮夷鼓兮闐闐右三右迎送神辭三章二章八句一章章十有二句皇明正德十三年戊寅八月九日立海珠祠像成闔郡大夫祭文王漸逵撰嘗謂古今豪傑之士其名於世也雖其山川瑰奇跌宕之氣之所鍾而亦其進修精練藴藉之所至譬之層巒列巘峭昂削拔於數百里之區而其中之盤鬱儲衍者未嘗不易也譬之長江大河湍激洄洑於一瀉百折之下而其中之淵澄停蓄者未嘗不止也仰惟先生稟岐嶷之資育間世之氣早師事於菊坡知琢磨之有自其養之虛也雖鼎魁天下而不以為高食邑實封而不以為意其立之勇也雖四疏劾奸而不以為疑縋城諭賊而不以為異其守之介也雖逍遙於霜鶴秋竹之間而不以為孤徘徊於松根巖曲之際而不以為忌此先生名德卓行之見於世而不可議如此而其詩文之發磊落竒崛屈詰聱牙而率流於胸次謂非山川跌宕之所鍾而學問進修之所深詣者耶文溪集卷末

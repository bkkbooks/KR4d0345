body:
  text: 文溪集卷十三宋李昴英撰詩五言古詩送廣帥趙平齋汝暨解印趨朝海瀕老同年五載依宇下春風舞簔笠愛日曝田舍喜無撞搪吏追逐欵段馬劇談許絛褐得趂公餘暇達官來三徑小隊鄰翁詫明公傑俊人麟族稱大雅典刑樣諸老胸次郁醞藉西𣲖溯其源境物入陶寫才高事無難隻手擘太華乘軺始踰嶺風采賢使者堂堂開大閫部屬肅鞾帕臺端有老蜮闖影含沙射孤忠冕旒知還許河內借鈴齋安獨處冷淡間僧夏例錢推不受金貝視土苴首祠酌泉翁坐使叨俗化葭萌細摩拊生意被原野循良渤海遂平理潁川霸威風戢偷竊德意銷詭詐能令颶毋伏默禱雨師灑開倉散窮閭儉歲低粒價貢場宏敞拓芘士千間厦厯觀古賢牧美政公其亞讒夫真枉了有識共唾罵君子竟何傷徽譽愈膾炙詔還九棘班明發不俟駕傾城送津亭牽纜不忍捨老夫前致辭再拜進離斚立朝要敢言切勿效喑啞此行衆所望磐石鞏宗社送荆門王廣文之官京都士如雲一見知好修未嘗廣文飯已替肉食謀炎門恥曵裾漫郎肯從遊驚座吐倔奇倚塵覺我羞窮邉人憚之長笑驅行舟逺烽亂夕煙戎馬驕高秋淸野空子襟叢棘荒半流此去欲何之幕府應拔尤吾道豈空談取勝在一籌獻馘早歸來平步班瀛洲久住白雲呈鎮長老桑下戒三宿我此尚留戀曹溪悟一宿我復無知見鎮公房遜客所須如執劵園丁曉供茹行者時灌硯飯奴更芻馬紙帳費香篆主人真好事應答色無倦欲歸興未闌欲住面有靦飛錫肯三徑亦有伊蒲饌遊峽山和東坡韻雙虬挾泓玉奧入百轉灣向無長公詩草木今何顔此山二百年偃蹇客往還長風駕余舟老人急開關逢迎欠高僧喜有識面山平生癖幽壑便合茅三間君命何敢留歸棹隨賜還慚愧和光翁笑指靑童鬟酌別張子元二首并序子元已注今年班籍去臘余以言職免歸子元不待引見毅然相隨南還兹再入京送之至鑒空閣下用東坡韻酌別去冬初去國逆旅等順境禍機衆危之沙􅈮伺人影拂衣肯同歸荒驛燈夜永幸脫妖蟇口黑月重磨鏡勤君再行役我愧心耿耿陛下皇明穹賢聚纖邪屏石渠盛此士豈復松廳冷胸中貯竒策可以靖邊警平生羞轅駒看取囊露頴堂堂曲江翁芳躅在梅嶺其二南士如君幾妙處方寸境撑腸五千卷落筆擅三影喜談狂朱雲恥作諛谷永憂時點髭雪未肯疏鑷鏡摩挲匣中龍起視斗牛耿每同畫灰語寒夜僮僕屏吾儕期歲晏世俗任炎冷江亭揮别酒謔笑鬬機警景文兄弟情畝異禾同穎日邉多便驛頻書來越嶺重九遊鬱孤臺和座客韻座上多俊人奇倔角拔犀追風飈館遊鼉鳴玉龍嘶夕陽催歸鞭更酌樽重携懷開鉤鉤簾語合印印泥似與花神期拈出糕字題壯哉千尺臺虎踞譙之西枰中十萬家一目城市低乘風巾可橋取月箸可梯豪氣壓崆洞雙月照虹溪響山慨懷古妙句吾家雞邦人趂遨頭壺榼山之蹊最喜秋事成千畝黃雲齊是日至馬祖巖和前韻九秋天地香贛産饒木犀登高詣其巔風健戲馬嘶偷得一日間古錦奚奴携秋陽閣霏雨飛蓋換障泥舉揚馬祖禪拂摩老坡題菊茰勸人飲猛吞玉東西憑闌視九州莽蒼煙水低如何昌黎翁華嶺須縳梯野性淡無嗜所樂惟山溪每羞名利區得失爭蟲雞意行契真趣荒苔踏成蹊嘉辰且盡歡聚散或不齊肇慶府倅王庚應平反廣府帥司寃獄詩以紀其事人生天地間本是同胞出貴賤與賢愚分殊而理一上帝立君師朝廷設官職凡百有司存各欲盡其責一或無人心何以順天則廣南十四州官吏幾滿百公道孰扶持田野多菜色大桀作威福小桀肆蟊賊周興而爪牙郤超而賔客君祿君忍欺天民天弗恤貪叨事篚苞殘忍尚徽纆可憐田舍翁駢首膏斧鑕可憐富家兒鞭背遭黥墨怒氣劇炎火讒言易轉石恩門甘仰面墦間爭屈膝喑啞一世人天高雲霧黑豈無賢大夫留此一線脈堂堂西蜀翁憤氣填胸臆尚友周濓溪拙矣謀身策念我同胞人罹此操戈厄苦語為平反片言天可質細閲拙録篇事事皆隂隲孟子謂非人由其無隱惻此翁仁者勇姦諛誅以筆天道本昭昭彼巧竟何益吾皇本好生桁楊西列棘安得百于公落落參邦國苦秋暑引并序己酉歲廣漕邱迪嚞攝帥苛虐流毒朝廷劄趙倉汝塈兼攝帥漕其人刓忍不授印故作是詩商金久得柄老火未退舍甑中著寰宇赫酷甚於夏池湯頗殃魚田龜應害稼桃笙亦漿汗水國無涼榭扇揮腕欲脫忍渴畏杯斚樹間寂秋聲矩令何時下四序本循環寒暑相代謝炎炎推不去誰與詰造化人思濯淸泠風露願一借再拜祈蓐收西陸早命駕七言古詩觀入試者鐘撼雞鳴萬家起月下紛紛白袍子提壺挈榼春遊閙擎箱擐篋誰家徙通衢隘塞行人絶露坐欠伸奴跛倚逺聞雷譟轟應答近亦洶洶殊聒耳軋然棘戶破曉色陳腳忽移去如蟻壯夫先入護几案儒雅雍容行且止垂髫趂閧未知苦戴白相持歎衰矣自從明詔到郡國士出深山集城市但能操筆不曳白秋榜人人都準擬分明結社戰所兵投合主司誰得髓昨科試人今或亡三年場屋能消幾功名信分置勿言身健頻來已堪喜槐黃早脫吾僥幸因送兒曹得觀視傍人休笑李秀才三十年前亦如此再用觀入試韻涵育纍朝士興起薄海絃歌爭教子籯金世守韋一經俎豆少成孟三徙盡從科舉梯進取鶴髮望深門日倚藝先德後己非古心術乖違徒口耳天門髣佛馮為馬隂德却關橋度蟻時來乳臭亦觀光潦倒英雄頻坎止棘闈投卷姑應之桂籍題名先定矣可憐數千困眊氉僅二十人誇利市近歲詞場尚剽拾文體腐陳難古擬倩人者幸耘人貪氣習陋汙淪骨髓主司頭腦易冬烘目色不迷世能幾所憂程文誤後學豈但升沉繫悲喜他人愛子亦如我何敢庸心秦越視願言通榜皆實才如已得之無彼此送梁伯隆歸丹谷舊隱秋堂之客自建上來省擕以偕行昔人入山訪隱君每恨見山不見人子持畫圖走踆踆人雖可即山非真自言谷中萬修筠泉鳴琮琤石嶙峋誰甘混迹麋鹿群雅意逺遊濶見聞飛笻遂過南海瀕翻海一洗征衣塵東望絶域天無垠藥洲風月蒲澗雲間出奇語頗自珍奚囊十襲而三熏槿花猩血荔錦紋何如故圃桃李春江湖社友杯十分何如族聚情話親行路之難多酸辛還家火急埋車輪拂拭磯苔開徑榛畹蘭籬菊庭古椿贈篇滿篋不療貧幾人煉藥能輕身本分荷鋤驅犢西疇耘武夷山下擊壤為堯民羅浮何君祐夫相訪惠詩又出所作水墨魚戲題卷末山頭釣引千鈞魚鐵橋曾逢稚川奴風波平地誤點額戲取墨汁翻糢糊縱觀濠上契妙趣浩浩胸次涵江湖墨雲忽從硯池起撥剌跳出形模殊大魚騰驤撼風雨小魚瑣碎遊荇蒲技如元放幾許奇金盤一箇松江鱸試張亭前漲波影舂鋤飛下傍睢盱世間畫史少活筆描寫終類鮒肆枯文溪一灣浮釣徒欠得龍眠為嚴瀨羊裘圖三山亭山中招提鼎足踞路如丁字分頭入逺看港漢紛長繩俯見阜邱才小笠班荆坐僕縱之息爭解緑荷撮紅粒羣然飲澗忽喧噪石兀深叢疑虎立我起胡床劃孤嘯前峯響答松風急舉頭雲端尚天半搘竹扳蘿進千級題石室木似屈才伸蛇解蟄似斷還連龍蛻骨天河失却古槎橛落在人間撑突兀若非胸中磊塊灑澆出老死畫工無此筆題東坡竹葉葉枝枝各標致密密疏疏總風味筆為化工壁為地頃刻種成此君子雖然月影水影寫真似安得千年尚生意河南掃松訪古勝寺不遇主僧主僧走城磨驢兒廊僧閉門縮頭龜長髮行者披鶉衣瀹我苦茗行相隨禪床破簟客自展急呼蒼頭揮大扇臥到夕陽暑力軟歸趂潮平柁流轉文溪集卷十三

  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0345_WYG_017-1a, image: WYG1181/WYG1181-0213a.png}
body:
  text: 文溪集巻十七宋李昴英撰七言絶句建寧解歸寄雪峰因大夢行脚今朝又起單欣然歸去得安閑從前大夢難忘處上白雲山望雪山弋陽鄭氏翠麓亭管領寒溪揖怪峰徑穿鉅竹綠隂濃幽人去後無猿鶴冷落亭臺濕蘚封羅浮梁彌僊游爛柯山贈以曲笻方笠葛坡龍竹東坡笠合伴山人到洞天柯爛想應留斧在憑君試問石橋仙過嚴子陵釣臺船重秪因將利去船輕又恐為名來如今羞見先生面夜半撑船過釣臺勸梁靑霞歸羅浮舊隱逍遙八極片雲浮所過名山不久留依舊片雲歸石峒從今休更下山游南華寺五首誦經聽得入從門壁上偷他四偈言畢竟單傳端的處賣薪供母是心源其二西方骨董南方寳留鎭曹溪幾百年自是後人當不得有如翁者亦單傳其三從前梵説墮虛空獨有壇經説不同體用圓明皆寳相一丁不識却心通其四未叅五祖已開山合下全身此地安不是香煙忘故里衣留孔道要人看其五淸者何曾飲盜泉僧盂底飯逆巢田此疑欲問師無語風撼長松嘯半天雨行梅關二首濃風四合凍雲癡水墨連屏鬬崛奇衝雨此行風景別滿山翠滴水簾垂其二通宵雨滴急催梅枝北枝南曉盡開多謝花神好看客隨車十里雪香來雪封寺二首鑿通危石張文獻勘破禪關盧祖師奇事已堪誇北客梅花先暖亦南枝其二征輿六月度梅關大地淸凉樹影班行客不須梅止渴流泉到耳冷潺潺峽山詩并序壬午仲冬逾至三日羊城進士李昴英西遊抵峽山舟距寺而維焉是夕也風壯浪號敺聲戰激蛟騰黿湧與舟盪摩垂丙而不寧枕翌日既望攝衣登寺覩其靈跡森然昭布不我誣也嗟乎是胡為而來哉境奇物勝千態萬狀神愛而兹來則士之假道乎是者亦必不凡矣行將掬山之靑歃水之綠與山水俱甲天下以實地靈人傑云於是乎書山通一水逕皇都多少英豪出此途傳我飛來元羽翼好風吹送過天衢靈洲眼前無限往來舟射利干名不肯休少見人心如此寺屹然砥柱在中流池州溪橋萬里長江吸一盃等閑袖劔九華來溪橋獨坐無人識又駕長風跨鶴囘迎廣帥徐意一大叅五首桂林舊着繡衣來久矣餘波拍越臺自古直臣多牧廣廣平曾賦嶺頭梅其二曉來竹馬躍兒曹次第牙幢壓近郊五老跨羊持色穗也應歡喜候前茅其三別去丹山劃七春一門里今日是滕民擬撑釣舸迎前路猿鶴從傍冷笑人其四魚稻之鄉鴈鶩驕鯨鯢噴沬撼江潮明公自是威風手南土應無莠害苗其五杜劉二子潁川居出處雖同語嘿殊勿謂寒蟬吾願學閉門自辦静工夫送魁星與李子先金斗高跳鬼狀獰世傳此像是魁星祥光閃爍開先兆助子秋闈筆硯靈司法曾子羙新第榮歸欲得余詩不敢效世俗諛語二首里同淸獻久聞風耿耿胸中便不同一疏呌雲韋布日大廷對策想輸忠其二舌似河懸筆水翻春官首疏見忠肝士須卓爾名當世好取前修節行看表釋應端住興化寺以其説而勉之二首鉢中滴水也難消切莫貪他寺富饒留取大皮纒大樹腹圍緊緊篾三條其二一般奇怪弄精魂猪蜆皆餐針戲吞未到空通渠地位只當齋戒作沙門白雲獅子峰望羅浮白雲乃羅浮西麓不到羅浮瞥六年後期幾誤鐵橋仙逺雲不隔山眞面西麓原同第七天羅浮桃源洞在山東北其峒幽邃人跡罕至靈符鎻盡穴中蛇深入千巖處士家峒戸隔雲呼不應時時流水出桃花戲題羅浮梁彌仙寫眞八十童顏雙眼明浪游湖海一身輕莫將啖肉先生比箇是羅浮老樹精和徐意一韻贈寳積中空山道是空山却有渠原來有有亦無無若能空到眞空處萬斛塵埃着碓夫採陽軒看盡西園十里梅黄昏寒月趂人囘要圎一段淸游事更訪仙宫索茗杯古成之仙箕翁來靈筆舞龍蛇翁去瑤壇鎻暮霞舊事欲談三百載五雲閣上望仙槎書龍頭義約簿二首人鳩一千桂菊風香造榜天門標捷幟地流錢筆端快便行年順騎鶴纏腰身兩全其二鵰鶚聨翻二十名看看金榜是同盟河南人面分明見盡説龍頭䜟已成重九日游南山峽覺海寺恰重陽日到南山小摘黄花供緑樽鐘叩一聲蕭寺晚移舟載月過前灣夜夢漁父求詩覺能記其全書贈梁彌仙酒湖無盡春無限一葉江湖萬里天明月滿篷風荻響醉眠正在白鷗邉衆建蓮社堂求疏語逺公鼻孔着蓮香引得喃喃閧幾場供佛建菴人更錯参機元不在西方贊銘浄慈釋刺血寫經贊浮屠覺新在浄慈針血書楞嚴圓覺法華華嚴經兩年而後成錢塘劉植捐金植藏而匭之文溪居士李某為一轉語此經如筏寫之着相而刺血寫妄中之妄經諸佛説血父母生何浄何垢等為前塵末法闍棃沉酣入骨一毫且靳而况於血血猶可舍是知身幻大痛一囘直須臂斷三十五代張天師贊冷面皎霜凝電光雙目峥生來元自别不但父書靈鍾離仙贊衣兮木葉髯㦸面鐵所執何書願聞其説吕洞賔贊碧其風巾皓其雲袍六合飛遨仙中之豪維摩贊丈室着不得文殊衆香國裏薰教臭無端詐病却成喑只為從前多業口舊書頭批云文溪眞跡丈室作室中裏作上多業作業多自贊竛竮山癯搭颯野服煮茗松根煨芋巖曲且農且漁非仙非俗淇傍何有秋鶴霜竹廣州天慶觀衆妙堂東坡井泉銘方右史取定林寺銕井欄䕶之老經云坡記成名非古堂遂輕兩翁像久晦㝠偉方公舊貫仍取彼欄䕶此泓新作葢環以銘遺千年飲淸泠續坡誰李昴英行者了寛等題錢買度牒疏四章已辦僧心未圎僧相纔得方兄便成和尚其二作佛何曾要裹纏頂門尚欠世間錢舍身者與舍佛者選佛場中化有縁其三作佛本無相為僧却要錢豈無人割捨為結惡因縁其四即心是佛見性成僧無奈世緣要二尺綾文溪集巻十七

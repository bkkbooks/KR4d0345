body:
  text: 文溪集巻十一宋李昴英撰判太學果行齋學生蔡順孫等劄子乞差充鷺洲書院學賔職事判太學生蔡君順孫舊識之於南海别去兩年矣忽偕其弟源來訪於贑亦太學生也文皆倔竒可觀而丰標灑落傾一座如雙璧相照映使人起敬問其衣何以墨則曰有母之喪也問其所以來則曰為貧所驅也昆季方淹恤而不憚遠役豈其得已哉且致辭曰鷺洲書院有學賔無限員監司帖差前此甚多願得此以餬口庶專心學問也昔范文正居憂嘗掌學事今欲為書院泛職於理無礙况書院之設政欲儲四方英俊相與講貫以上庠之士乃屑預籍其間亦可謂下喬矣不猶愈於其他濫吹者乎照所陳帖差充鷺洲書院學賔夫所謂賔者當以客禮待之每月錢米宜加優厚少俟服除即參太學亦非乆縻廩稍者也蠲除受納官事例錢判朝廷置倉受納苖米所以給諸軍月請計民之産而取之甚非得已也民之輸官剜肉補瘡豈其所樂哉官員吏卒每石立為定數而誅求之不知作俑於何時沿襲既乆目為常例吏卒小人不足責也官員自有俸禄差充坐倉董納亦職分中事乃公然取受略無愧怍習以成風所在皆然而錢數未有如江西之多也故於未開倉之前争營求為受納官上官或委之私人明言照顧之葢有一年在倉而獲數千緡者此錢何從來哉皆民之膏血也當職起自閭閻乆知此事思欲一洗陋俗去臘承乏攝郡未欲便行改易姑止將苖倉事例錢自官員至吏卒痛加裁减雖所減之數若不多然積而計之民之䝉恵亦不細今年次第開倉所合先期告諭士自一命以上皆當以愛物存心臨財母茍得必義然後取士非吏卒比也上件錢既令甲所不載委是違法而諉曰有例受之安乎為士夫不自貴重乃下同於吏卒其人品亦可知矣今一時同官亦多端潔好修之士豈甘自汙下特前此未有人説破故為受納官者未能自拔於流俗之中耳今自開倉日為始監納官並不可接受分文事例州家每月自有添支錢㑹一十五貫文儘可以供入倉飲食之資若能洗手奉職革弊察欺自當剡薦以示旌異其吏卒等人且照去年榜文裁減數目不得過取分文仍不得故作邀阻因而索覔如招詞訴定行决配攬户仰照官司除去官員事例一項減價接攬不得欺瞞鄉民如違重作施行案只今備榜仍報提刑司遍牒本路軍州一體施行發妓孫惜回南安軍判當官籍妓使終身不得復為良人非盛徳事也本司昨見阿鍾之詞葢念婦人無知一犯不韙則妓之是無以開自新之路此塗通判之擬未敢以本官施行為是此亦忠厚之論也今觀本軍所申則孫姓婦人元是路妓散樂因公吏盜官錢游其家事發係籍則其人先已為不籍之妓矣又非可以有專夫者並論籍之似不為過本軍以為此事有闗名分在本司何可固必雖然為路妓人則其身可以東西南北逐食為妓則老死於其土而不得釋如鳥之入樊籠魚之在盆盎見其他鱗羽翔泳於天寛海濶之鄉健羨而不可得仁人君子見之亦必惻然今從申將孫惜押回本軍留之縱之惟地主所命已照施行革㩁酤弊判官釀則弊積於吏卒之侵欺難於遽革以漓薄强人飲而售其直官之取利奚安民之受害未艾税酒民甚便之而所收難以豫計則郡計有不足之慮至於城外拍户尤要區處得宜不然則前日之耗於吏卒之蠧者所失猶少而税酒之後耗於奸民之隠蔽者所失更多始謀要當謹重審詳不宜草草須是商量利害到底為一定而不可易之論方可見之施行不然則朝行夕改徒為紛擾觀陳事宜共一十八紙㑹計出入之數闗防内外之弊討論裨助之䇿亦可略備今專請塗通判集兩司僉廰商議取所陳切當者次苐之詳為規畫立定格式庶幾經乆可行而不可變此非止為一時計若行之而官民俱便則聞於朝乃百世之利也切望同寅留意早有成説行狀崔清獻公行狀崔與之字正子増城人家貧力學自奮先廣士有當試成均者率憚遠不行公毅然勇往既中選朝夕肄業足跡未嘗至廛市禮部奏名廷䇿極言宫闈皆人所難言擢乙科廣人由胄監取第者自公始歴潯州司法淮西檢法官皆有守法持正之譽改秩宰建昌新城素號難治公始至歳適大歉民有强發廩者公折其手足以狥因請自劾守大異之開禧用兵軍需苛急公悉以縣帑收市一毫不取於民和糴令下公依時直躬自交受民自㮣不擾而辦為諸邑最趙漕使希懌令諸邑視以為法且特薦於朝他司相繼論薦時相欲留中公不就通判邕州薦者咸以為訝勉公使留公不可諸公申其請有㫖與在内陞擢差遣公抗章控避乞俟滿而後受從之邕守武人惟苛刻御禁卒無狀相率為亂公時攝賔陽聞變亟歸叛者將擁門拒之公疾馳以入執首亂者戮之縱其徒不問闔郡帖然擢守賔陽提點廣西刑獄甫建臺徧歴所部二十五州大率皆荒寂之地朱崖隔在海外異時未嘗識使者威儀公至父老駭異諸郡縣供帳之類一切不受兵吏不給劵携緡錢自随計日給之停車决遣無頃刻暇奬亷劾貪多所刺舉風采震動召除金部屬金人南奔邊聲震恐淮東宻邇故汴朝廷謀將帥難其人除公直寳謨閣知揚州安撫淮東公言邊釁已開相持六年凡所措置大抵虛文從事宜擇守將集民兵以固基業除公工部侍郎尋加煥章閣待制知成都府本路安撫使公言實邊斯可安邊益州為四路心腹惟恃錢榖厚於他郡軍興帑庾告匱宜厚儲積以壯邊陲拜疏即行初安丙檄西夏夾攻金人不克敵乗勝數入邊蜀大擾丙薨公便宜度劔以鎮闗表除公制置使盡䕶西蜀之師西北二國合從攻鳯翔叩鳯州借糧於我公條畫事宜宻授諸將隨宜酬答謄榜諭陜西五路遺黎俾築塢自固倚我軍為聲援建言成都灘瀬險遠艱於漕運立運米常格奏行之自是兵皆足食蜀賴以全五年丐歸除禮部尚書公輕舟出峽徑歸五羊自是不復出矣築室所居之西偏扁菊坡刻韓魏公老圃秋容淡黄花晩節香之句於門塾葢雅志也公之門無雜賔連帥部使者時候其門歳僅一再見未嘗一問外事端平乙未二月摧鋒叛兵自恵陽擁衆扣州城郡守曽治鳯宵遁官吏羣造里第請公登城公肩輿至開諭禍福又遣門人李昴英楊汪中縋城親諭之其徒俯伏聴命咸欲釋甲以歸而倡謀者黠甚以嘗害博羅令懼不免相率遁去入據古端州以自固俄有㫖依舊端明殿學士廣東經略安撫使兼知廣州公即家治事區處條畫揣摩調度動中事機召兵四集賊一戰不支聚其衆於苦竹嶺窮蹙乞降公命分𨽻降卒於諸軍而戮其桀黠者俄拜叅知政事八辭不受踰年拜右丞相上遣中使促召命守帥彭鉉勸請又命郎官李昴英銜命而至遜辭凡十三疏上知公志不可回詔即家條上時政公手疏數萬言上皆欣納家藏御札七通有文集若干巻其文明白謹嚴家大酉書其端曰東海北海天下老亦有盍歸西伯時白麻不能起南海千載一人非公誰公善知人平生薦引惟游侣洪咨䕫林畧魏了翁李性傳程公許後皆為公輔公嘗度劔閣留題詞蒲澗清泉白石怪我舊盟寒里人采其語立公生祠於其地及薨贈太師謚清獻初公持節廣右見於施行者維揚倅高惟肖鋟梓曰崔公嶺海便民榜珠崖之人又編次其罷行擾民之政曰崔公海外澄清録在蜀人繪公像於仙遊閣與張忠定詠趙清獻抃並祠號為三賢淳祐甲辰廣帥方大琮祠公與張文獻九齡於學號為二獻文溪集巻十一

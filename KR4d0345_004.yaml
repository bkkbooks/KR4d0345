front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0345_WYG_004-1a, image: WYG1181/WYG1181-0139a.png}
body:
  text: 文溪集卷四宋李昴英撰題跋書胡致堂叙古千文後文定胡公潛心春秋四十餘年而後徐出其說致堂其親傳故筆削皆有法叙古字凡千不重雖飲席間談笑成之而上下數千載關繫大處包撮略盡興君昏主之理亂哲佐悖臣之功罪吾道異端之正偏一字森嚴百世確論不但可以習童稚而已古千文偎陋不倫乃盛行於世俗蓋未知有此作也其書一經朱文公表揭遂傳廣帥宋公慈里兩翁之里學兩翁之學既梓之衡陽又梓之廣之泮宫自此流布天下人人得諷詠有功於人心多矣南嶽之高南海之深不泯不磨致堂之心淳祐十年月正元日後學李昴英書題章公權進論藁金珠珍矣饑寒不可衣食則適用莫粟布若也雄深倔竒之文自鳴一家人爭寶之價誠金珠矣使非切於時無禆人之國亦徒可玩而已矣讀章衡之進論辭氣平暢若不求工於文者然論古成敗商今利害實可見之施行其日用之布粟歟世之舍金珠取布粟者幾人耶毋怪乎天下之未平治也題鄭上舍玠大學䇿藁士試於有司曰時文志於得而已鄭君對策天子學乃極言天下事皆有關於君德有禆於世道方鯁論崛起與國論爭鋒禍且不避寧得失計耶胸中所存定非尋常諸生拔尺寸比是真不負皇朝淑養之意衡文者拔其尤則公論猶未泯可為斯文賀君其堅此志勿渝厚其養勿餒大建立於世垂聲名無窮毋使人曰此徒議論之士吾黨所望也嘉煕庚子四月跋許廣文一鶚廷對士初試大廷多未脫時文氣讀許孟翀對藁體製全似奏疏首排李清臣葉祖洽媒進阿世條陳切時病而言甚直雖屈第七視紹聖初力詆元祐諸老竊榜亞者相去霄壤均為莆産氣禀自不同然歷國初以來三百年間名公巨卿由第七人者絶少若有所待勳業與名節俱不朽深有望焉孟翀勉之跋清獻崔公手墨嘉熙已亥某在著庭清獻崔公自南海寄書來别紙如此公拜集賢相天子遣中使踰嶺趣行且賜金二百兩治裝蒲輪日在門而公之病已深矣纍疏力辭始得請以金付武臣鄧祖禹護納內庫蓋公帥鄉部時祖禹實為事務官所以委之也此役他人所難而祖禹不憚勞費似知慕獨樂園之守園者亦可尚也偶閲公手澤俾模刻而藏之淳祐五年元日題菊坡水調歌頭後清獻崔公劒閣賦長短句卷卷愛君憂國遑恤身計此意類出師表雅趣欲結茅庾嶺邉一琴一鶴繇湘桂歸南海竟不得踐緑隂青子約然幅巾藜杖徜徉老圃寒花間十有六年晏歲之樂不減洛中耆英也好事者揭此詞山中惜非公手跡某敬以所藏本授橫浦校官賴君棟使刻之文獻張公始鑿嶺路而未有祠著公同龕為宜此則地主事非過客所得專也淳祐六年三月既望門人李昴英附刻崔菊坡水調歌頭萬里雲間戍立馬劒門關亂山極目無際直北是長安人苦百年塗炭鬼泣三邉鋒鏑天道久應還手寫留屯奏炯炯照心丹對青燈搔白髮漏聲殘老來勳業未就妨却一身間蒲澗清泉白石梅嶺緑隂青子怪我舊盟寒烽火平安夜歸夢到家山跋菊坡太學生時書藁此清獻公初入太學寄其友林介仲書也吾州去在所四千里水浮陸馳大約七十程士以補試雖登名猶未脫韋布也故稍有事力者猶勞且費之憚而尼其行寒士又可知矣公奮然間關獨往一試預選隨取高第平生勛業名節實賢關基之長短句有人世易老之歎必期三年成名而歸書所云云立志已卓然不凡至於述齊舍之費頗悉聞其入京參齊時皆朋友相資助故書報之詳貧者士之常公之貧有人不堪其憂者處之甚安所以富貴不能淫而清白照一世也林介仲名介增江老儒者生沒在公之前後人不能寶有此紙轉落士人之家某近始得之公以歲庚戌入在膠庠庚戌而此書出若有數然外姪陳某往試橋門持此授兒子守道守道亦就試且壻菊坡之門公手澤宜歸之淳祐十年二月朔跋節愍王公行實舍生取義所欲有甚於生者平生講之熟故臨難處之雍容非猝然勉强能之敵之犯益也節愍王公翊以議官權宜肘制置使印收燼兵支孤城野戰不勝巷戰又不勝然後徐結纓而入於井此他人之責而身之不避壯矣哉先是菊坡崔公貽之書曰一段冰清萬仞壁立竊意公平生忠義自許惟菊坡深期之其子閶募死士赴難道遇兵且鬬且前創甚偶不死今為東莞丞遂得見公行實與守城日記風節凜凜使人慨慕且三歎菊坡知人之明淳祐辛亥冬至文溪李昴英書跋鄧運判柞行實始興人豫聞耆老言桂漕鄧公平難事英氣奧謀不在杜杞下老檜欲啖以美官使摧殘謫客則崖然正色拒之士志於立功少定力公則將之以學故能不為勢利所移高廣於上書布衣中識拔南方一傑可謂無遺才矣淳祐八年八月二十日題循陽通守黃必昌大學中庸講義吾友黃京甫主濓堂日沃諸生胸次以大學中庸之味揭宏舉要闡邃析微探聖賢妙㫖於千百載之下取儒先緒論蔽之片言間體認真切處如良畫狀人物考察精密處如厯家步星氣於義理無少差蓋淵源乎北溪而根柢乎考亭者為後學之益多矣京甫循循修謹人一語不妄發意其於二書心之身之久不但工誦說而已然士之講學豈惟獨善要推以澤民利物與上官相可否毋有所恐懼見義必為行之以勇又持此書判千里矣勉之哉淳祐九年六月二十五日題諸葛珏北溪中庸大學序大學中庸之微㫖朱夫子發揮備矣北溪翁從之游久以所得鳴漳泉間泉之士有志者相帥延之往教翁指畫口授不求工於文彩務切當於理義諸生隨所聞筆之成帙韶别駕諸葛君當時席下士之一也廣其傳於梓嘉與後學共使之繇北溪之流遡紫陽之源而窺聖涯不徒口耳且必用力於實踐則曰希聖希賢功夫可循循而詣矣余過曲江得見所未見茅塞豁然尹番禺而始創黌舍者此諸葛君也珏其名淳祐五年三月朔跋西山真先生送李教桂高序士生遐陬學無名師誦無全書得於氣禀或秀而文職教者復不屑誨士習日降而庳豈顓士之咎哉莫逺於蒼梧有陳欽明左氏為博士視閩歐陽詹始舉進士且先數百年而恩人士至今湮晦其間豈無瑰奇不模不範無以玉而成也溫陵李君茂先繇膠庠登雋科以先正嘗教授於恩勇踐前志逹尊真先生有言侈其行勉其以實理淑諸人以實學充諸已蓋厚於其偏方之士而周於望當世之賢皆樂教英才盛心也茂先可為師者而溫知不廢青襟叩請洪鐘應之學者能心契意領矩步規趨固無異登西山之堂而親承謦咳也異日卓然以道鳴世淵源蓋有自來者番禺子弟逺從胡安定游恩之士坐聞長者之餘論幸矣亦可見先生之言之教所被者逺矣敬書詔後俟摳趨墻仞而質正焉跋陳侯贈曹貢元士圭詩儒將雍容氣象與武夫不同孔明七擒孟獲而卒縱之非力不能殺不忍耳總管陳侯以文武兼材假右科發身䇿勳北垂浩然賦歸淡如也汀氓憑險裒凶天朝起侯付以外閫撲屯蜂蹂聚蟻叱咤頃耳尚欲招致而生之涵澄一意宇宙並量筆之詩章布宣盛德視競病之句陋矣安得渤海解刀張嬰面縳刃不血而功全此詩季將軍一諾也曹邱生善游揚之紹定己丑良月朔跋第二首手劒要盟曹子也望轍視旗亦曹子也磜寇阻兵曹君士圭請於郡身蹈狡窟曉以逆順禍福此舉甚誼而壯陳侯延之玉帳間從容札所為詩以贈空巢成禽之句非戾拊柔之意蓋不執安之之說而廢勝之之畫此正元戎高處萬一􅂒鼯怙終罔悛則兵其可已乎夫茍不可已也則曹君又將移其前日之憑軾口伐者而櫜鞬相從矣此詩㫖也跋魏鶴山贈醫者曾貫詩宋清氏以子厚傳之聞姜大中以轉物翁詞之著二醫皆工已疾而不祈人之酬者也長洲曾君客五羊大書其門曰病且貧者診乎我藥施之是不忝鶴山贈句矣淳祐甲辰仲春跋魏鶴山題尹商卿自信齊詩伊川先生曰孔孟之門人不敢信已而信其師之說朱文公曰信者真知其理之如此而無毫髮之疑也尹君試思之書杜去非所藏西山帖西山嘉與人士接遺墨落四方最多杜正甫所藏帖則許之深勉之力其人蓋可想而知也跋録曹吳雍所藏鄒南谷書墨樞密南谷鄒先生名德穹博海內人士所宗垂五十年矣平日於一字之褒不輕與人春秋法也曩由夕郎拜帥西廣南海吳公純臣古君子人也以憲節同寅其子雍寶藏乃翁所得先生書所得褒語則清通仁厚而已辭甚不費而曲盡繡衣公平生所為士大夫作時樣書尺頌德或纍百言觀此可少愧矣吳氏子資稟頴特於此四字克肖而齒方少里人李昴英為先生門人輒發明言外之㫖曰清也通也厚也皆仁中有也宜益克己使人欲淨盡天理混融以全吾固有之仁所到豈易量哉先生聞舊同僚之有子必亦喜淳祐二年五月望跋陳光庭所藏蔣實齊遺墨細數在世繇科級梯貴顯凡幾能全節始終有幾容容溫飽固不足算乖初心而謬末路良可憫惜方老奸擅權以區區官爵籠天下士鄙夫爭吞炭為啞以媒進取一世習熟謂敢言為狂實齊蔣公始召忽大聲長鳴於仗馬問聵者愕默者愧正論命脉賴以挽回其憂時愛主之忠甚至於病且死不渝也科目得如此士庶亦不沗陳君元實布衣時登其門最久而密貯遺墨盈幅讀之凛凛猶有生氣元實今尉增江甚公甚亷甚恕使家稍抑之羣邑人叩臺府乞留非術驅利誘使然觀其字與公之名齊同益信端人端友平日相資講切皆實理也百里人心德之不忘其實學功用小驗云嘉禧戊戌臘跋吳都統所藏菊坡先生帖清獻崔公護坤維晚必自出伺烽火至報稍急輒通夕不寐思所以應乃心無頃刻忘邉憂也指縱諸將每手筆驛以授情通如家人而人樂為之用都統吳侯彥公所識擢薦之之詞曰宣力邉防輕財得士卒心介胄之士才且亷世不多得公以清勤身帥之驗也是時全蜀如金甌無少玷缺續貂以狗而貽禍遂至於不可救藥吳侯久已擯去流落天南邂逅共談西事慷慨憤激有老馬千里志歸斯人於鄉國使經理殘碎地豈不愈於用新進輩哉同時有李侯紳受知於公後以死節聞公知人之明類此故併識之淳祐三年良月文溪集卷四
